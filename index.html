<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Redline v2.5 - Fixed</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #ff2d55; --primary: #5856d6; --bg: #050505; 
            --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
        }
        
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 0% 0%, #1a1a2e 0%, #050505 50%); }

        .app-shell { height: 100vh; display: flex; flex-direction: column; display: none; }
        .top-nav { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 500; }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; background: linear-gradient(to right, #ff2d55, #5856d6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 200px; scrollbar-width: none; }
        .view-active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- TABS --- */
        .tab-nav { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-link { opacity: 0.4; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .tab-active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 8px; }

        /* --- COMPONENTS --- */
        .user-row { background: var(--card); border-radius: 25px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid transparent; }
        .pfp-img { width: 55px; height: 55px; border-radius: 20px; object-fit: cover; background: #222; }
        .last-msg { font-size: 12px; opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

        .chat-container { background: var(--card); border-radius: 30px; padding: 20px; border: 1px solid var(--border); height: 400px; display: flex; flex-direction: column; margin-bottom: 20px; }
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; scrollbar-width: none; }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 22px; margin-bottom: 8px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .mine { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        /* --- INPUTS --- */
        .input-area { position: fixed; bottom: 105px; left: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .msg-input { flex: 1; padding: 16px; border-radius: 22px; border: 1px solid var(--border); background: rgba(20,20,20,0.95); color: white; outline: none; }
        .send-btn { background: var(--accent); border: none; border-radius: 20px; width: 55px; color: white; font-size: 20px; cursor: pointer; }

        /* --- NAVIGATION --- */
        .bottom-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 70px; background: rgba(20,20,20,0.9); backdrop-filter: blur(25px); border-radius: 30px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { font-size: 26px; opacity: 0.3; cursor: pointer; padding: 10px; }
        .nav-active { opacity: 1; color: var(--accent); }

        #chatOverlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:10005; flex-direction:column; }
        .config-box { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        input[type="text"], input[type="password"] { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin-top: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="authLayer" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--card); padding:40px; border-radius:40px; text-align:center; width:80%;">
        <div class="logo" style="font-size:32px; margin-bottom:20px;">NEXUS</div>
        <input type="text" id="regName" placeholder="Ton Surnom">
        <button onclick="signUp()" style="width:100%; padding:15px; border-radius:15px; background:var(--accent); color:white; font-weight:800; border:none; margin-top:15px;">ENTRER</button>
    </div>
</div>

<div class="app-shell" id="app">
    <div class="top-nav">
        <div class="logo">NEXUS</div>
        <img id="myAvatar" src="" style="width:45px; height:45px; border-radius:15px; border:2px solid var(--accent); object-fit:cover;">
    </div>

    <div id="viewCouple" class="view view-active">
        <div class="chat-container">
            <b>Cocon Privé ❤️</b>
            <div id="coupleMsgs" class="msg-list"></div>
        </div>
        <div class="input-area" id="inputCouple">
            <input type="text" id="coupleIn" class="msg-input" placeholder="Écris à ton amour...">
            <button class="send-btn" onclick="pushMsg('couple')">➔</button>
        </div>
    </div>

    <div id="viewFriends" class="view">
        <div class="tab-nav">
            <div id="tab1" class="tab-link tab-active" onclick="switchSocialTab('chats')">DISCUSSIONS</div>
            <div id="tab2" class="tab-link" onclick="switchSocialTab('discover')">DÉCOUVRIR</div>
        </div>
        <div id="sectionChats"><div id="activeChatsList"></div></div>
        <div id="sectionDiscover" style="display:none;"><div id="allUsersList"></div></div>

        <div id="chatOverlay">
            <div class="top-nav" style="background:var(--card); border-bottom:1px solid var(--border);">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
                <b id="chatName">Chat</b>
                <span></span>
            </div>
            <div id="friendChatList" class="msg-list" style="padding: 20px;"></div>
            <div class="input-area" style="bottom: 30px; z-index:10006;">
                <input type="text" id="chatIn" class="msg-input" placeholder="Ton message...">
                <button class="send-btn" style="background:var(--primary)" onclick="pushMsg('direct')">➔</button>
            </div>
        </div>
    </div>

    <div id="viewSettings" class="view">
        <h3>Configuration</h3>
        <div class="config-box">
            <input type="text" id="setPartner" placeholder="Surnom partenaire">
            <input type="password" id="setCoupleCode" placeholder="Code Secret">
            <button onclick="saveSettings()" style="width:100%; padding:15px; background:var(--accent); color:white; border-radius:15px; border:none; font-weight:800; margin-top:15px;">ENREGISTRER</button>
        </div>
        <button onclick="localStorage.clear();location.reload();" style="width:100%; background:none; color:#555; border:none; margin-top:20px;">Déconnexion</button>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item nav-active" onclick="nav('viewCouple', this)">❤</div>
        <div class="nav-item" onclick="nav('viewFriends', this)">🌎</div>
        <div class="nav-item" onclick="nav('viewSettings', this)">⚙</div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Version mise à jour pour le stockage local
    const STORAGE_KEY = 'nx_redline_v2_5';
    let user = JSON.parse(localStorage.getItem(STORAGE_KEY));
    let activeChatId = null, otherUserId = null;

    if(user) { 
        document.getElementById('authLayer').style.display='none'; 
        document.getElementById('app').style.display='flex'; 
        init(); 
    }

    function signUp() {
        const n = document.getElementById('regName').value;
        if(n) {
            const data = { name: n, id: 'u'+Date.now(), pfp: 'https://ui-avatars.com/api/?name='+n, code: '', partner: '' };
            db.ref('users/'+data.id).set(data);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            location.reload();
        }
    }

    function init() {
        document.getElementById('myAvatar').src = user.pfp || "";
        document.getElementById('setPartner').value = user.partner || "";
        document.getElementById('setCoupleCode').value = user.code || "";

        // Écouteur en temps réel pour l'utilisateur
        db.ref('users/'+user.id).on('value', s => { 
            if(s.exists()) {
                user = s.val(); 
                localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
            }
        });

        // Charger tous les utilisateurs
        db.ref('users').on('value', s => {
            const l = document.getElementById('allUsersList'); l.innerHTML = "";
            s.forEach(c => {
                const u = c.val();
                if(u.id !== user.id) {
                    l.innerHTML += `<div class="user-row" onclick="openDirect('${u.id}', '${u.name}')"><img src="${u.pfp}" class="pfp-img"><div><b>${u.name}</b><br><small style="opacity:0.4">Lancer un chat</small></div></div>`;
                }
            });
        });

        // Charger les discussions actives
        db.ref('users/'+user.id+'/lastChats').on('value', s => {
            const l = document.getElementById('activeChatsList'); l.innerHTML = "";
            if(!s.exists()) return l.innerHTML = "<p style='opacity:0.2;text-align:center;margin-top:50px;'>Aucun message</p>";
            s.forEach(c => {
                const d = c.val();
                db.ref('users/'+d.with).once('value', us => {
                    const u = us.val();
                    l.innerHTML = `<div class="user-row" onclick="openDirect('${u.id}', '${u.name}')"><img src="${u.pfp}" class="pfp-img"><div style="flex:1"><div style="display:flex;justify-content:space-between"><b>${u.name}</b></div><div class="last-msg">${d.lastTxt}</div></div></div>` + l.innerHTML;
                });
            });
        });

        // Chat de couple
        if(user.code) {
            db.ref('couples/'+user.code+'/chat').limitToLast(30).on('value', s => {
                const b = document.getElementById('coupleMsgs'); b.innerHTML = "";
                s.forEach(c => b.innerHTML += `<div class="chat-bubble ${c.val().sid===user.id?'mine':'theirs'}">${c.val().txt}</div>`);
                b.scrollTop = b.scrollHeight;
            });
        }
    }

    function pushMsg(mode) {
        const input = document.getElementById(mode === 'couple' ? 'coupleIn' : 'chatIn');
        const val = input.value.trim();
        if(!val) return;

        if(mode === 'couple') {
            if(!user.code) return alert("Configure un code secret d'abord !");
            db.ref('couples/'+user.code+'/chat').push({ sid: user.id, txt: val });
        } else {
            db.ref('directs/'+activeChatId).push({ sid: user.id, txt: val });
            db.ref('users/'+user.id+'/lastChats/'+otherUserId).set({ with: otherUserId, lastTxt: val });
            db.ref('users/'+otherUserId+'/lastChats/'+user.id).set({ with: user.id, lastTxt: val });
        }
        input.value = "";
    }

    function saveSettings() {
        const p = document.getElementById('setPartner').value;
        const c = document.getElementById('setCoupleCode').value.toLowerCase();
        db.ref('users/'+user.id).update({ partner: p, code: c }).then(() => {
            user.partner = p; user.code = c;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
            alert("Nexus mis à jour !");
            location.reload();
        });
    }

    function openDirect(id, name) {
        otherUserId = id; activeChatId = user.id < id ? user.id+'_'+id : id+'_'+user.id;
        document.getElementById('chatOverlay').style.display = 'flex';
        document.getElementById('chatName').innerText = name;
        db.ref('directs/'+activeChatId).on('value', s => {
            const b = document.getElementById('friendChatList'); b.innerHTML = "";
            s.forEach(c => b.innerHTML += `<div class="chat-bubble ${c.val().sid===user.id?'mine':'theirs'}">${c.val().txt}</div>`);
            b.scrollTop = b.scrollHeight;
        });
    }

    function nav(id, el) {
        document.getElementById('inputCouple').style.display = (id === 'viewCouple') ? 'flex' : 'none';
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        document.getElementById(id).classList.add('view-active'); el.classList.add('nav-active');
    }
    function closeChat() { document.getElementById('chatOverlay').style.display = 'none'; }
    function switchSocialTab(t) {
        document.getElementById('sectionChats').style.display = (t==='chats'?'block':'none');
        document.getElementById('sectionDiscover').style.display = (t==='discover'?'block':'none');
        document.getElementById('tab1').className = (t==='chats'?'tab-link tab-active':'tab-link');
        document.getElementById('tab2').className = (t==='discover'?'tab-link tab-active':'tab-link');
    }
</script>
</body>
</html>
