<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v55 - Temps Réel Absolu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* --- DESIGN ORIGINAL PRÉSERVÉ --- */
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3; --online: #25D366;
            --gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        }
        
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; 
            height: 100vh; overflow: hidden; background-attachment: fixed;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); background: var(--love); } 100% { transform: scale(1); } }
        .recording { animation: pulse 0.8s infinite; background: var(--love) !important; }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 50px; height: 50px; border: 4px solid var(--card); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabs { display: flex; gap: 10px; margin-top: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 20px; font-size: 13px; background: var(--card); transition: 0.3s; }
        .tab.active { background: var(--accent); color: #000; font-weight: 600; }

        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 15px; }
        .pfp { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; background: #2a2a40; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .chat-head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 22px; max-width: 80%; font-size: 14.5px; position: relative; cursor: pointer; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 10px; margin-top: 6px; display: flex; justify-content: flex-end; gap: 5px; opacity: 0.7; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 340px; padding: 30px; border-radius: 40px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 20px; color: white; margin: 15px 0; text-align: center; }
        .option-btn { width: 100%; padding: 16px; margin-top: 12px; border-radius: 20px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; }
        
        /* Widget Cocon Style */
        .cocon-widget { background: rgba(255, 75, 110, 0.1); border: 1px solid var(--love); padding: 15px; border-radius: 25px; margin-bottom: 20px; text-align: center; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; z-index: 50; }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="splash"><div class="loader"></div></div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--accent); font-family:'Pacifico';">...</h3>
        <div id="modalBody"></div>
        <div id="modalActions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" style="background:var(--card)" onclick="triggerBack()">Annuler</button>
            <button class="option-btn" style="background:var(--accent); color:black" id="modalConfirmBtn">Valider</button>
        </div>
    </div>
</div>

<div id="authLayer" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:10000; align-items:center; justify-content:center; padding:25px;">
    <div style="background:var(--card); padding:40px 30px; border-radius:45px; width:100%; text-align:center;">
        <div id="loginUI">
            <h2 style="font-family:'Pacifico'; color:var(--accent);">Bienvenue</h2>
            <input type="tel" class="modal-input" placeholder="Numéro" id="lPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="lPass">
            <button class="option-btn" style="background:var(--accent); color:black;" onclick="login()">ENTRER</button>
            <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:12px; opacity:0.6;">Pas de compte ? Créer</p>
        </div>
        <div id="regUI" style="display:none;">
            <h2 style="font-family:'Pacifico'; color:var(--accent);">Nouveau Profil</h2>
            <input type="text" class="modal-input" placeholder="Pseudo" id="rPseudo">
            <input type="tel" class="modal-input" placeholder="Numéro" id="rPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="rPass">
            <button class="option-btn" style="background:var(--accent); color:black;" onclick="register()">CRÉER</button>
            <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:12px; opacity:0.6;">Déjà inscrit ? Connexion</p>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <div style="display:flex; align-items:center; justify-content:space-between;">
            <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
            <div id="globalStatus" style="font-size:11px; padding:5px 12px; background:var(--card); border-radius:15px; color:var(--online);">● Connecté</div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Le Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div><div class="fab" onclick="addFriend()">+</div></div>

    <div id="vCocon" class="view">
        <div id="coconWidgetArea" class="cocon-widget" style="display:none;">
            <small style="color:var(--love)">🌹 Message pour toi :</small>
            <p id="widgetNoteDisp" style="margin:8px 0 0 0; font-size:17px; font-weight:600;">...</p>
        </div>
        <div style="background:var(--gradient); padding:35px; border-radius:35px; text-align:center; margin-bottom:25px;">
            <h3 style="margin:0; font-family:'Pacifico';">Notre Éternité</h3>
            <div style="display:flex; justify-content:center; gap:15px; margin-top:20px;">
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px;"><b id="d-day" style="font-size:24px">0</b><br><small>Jours</small></div>
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px;"><b id="d-hour" style="font-size:24px">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button onclick="askCoconCode()" style="width:100%; padding:20px; border-radius:25px; border:2px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold;">DÉVERROUILLER</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpPreview" class="pfp" style="width:110px; height:110px; margin:0 auto 25px; border:3px solid var(--accent);" onclick="document.getElementById('pfpInput').click()">👤</div>
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="uploadFile(this, 'pfp')">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center;" onclick="openEdit('pseudo')"><b>Pseudo</b></div>
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center;" onclick="openEdit('code')"><b>Code Cocon</b></div>
            <div style="background:linear-gradient(135deg, var(--accent), var(--love)); padding:20px; border-radius:25px; text-align:center; grid-column:span 2; color:black; font-weight:bold;" onclick="sendGlobalNote()">💌 Envoyer un mot doux au widget</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); margin-top:20px;">Quitter</button>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="chat-head">
        <span onclick="triggerBack()" style="font-size:24px;">←</span>
        <div class="pfp" id="cHeadPfp" style="width:45px; height:45px; margin:0"></div>
        <div style="flex:1"><b id="cName">...</b><br><small id="cStatus">...</small></div>
    </div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.2);">
        <button class="option-btn" style="width:45px; height:45px; border-radius:50%; margin:0;" onclick="document.getElementById('imgIn').click()">🖼️</button>
        <button class="option-btn" style="width:45px; height:45px; border-radius:50%; margin:0;" id="micBtn">🎤</button>
        <input type="file" id="imgIn" hidden onchange="uploadFile(this, 'msg')">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:12px 20px; border-radius:25px; color:white;">
        <button onclick="sendMsg('msgs')" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="chat-head" style="background:var(--love); color:white;"><span onclick="triggerBack()" style="font-size:24px;">←</span><b style="flex:1; text-align:center;">🌹 Cocon</b></div>
    <div class="msg-area" id="coArea"></div>
    <div style="padding:15px; display:flex; gap:10px;"><input type="text" id="coIn" placeholder="Secret..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;"><button onclick="sendMsg('cocon')" style="background:var(--love); border:none; width:50px; height:50px; border-radius:50%;">➔</button></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null, currentPeerId = null, activeChatPath = null, audioUnlocked = false, stateStack = [];
    let mediaRecorder, audioChunks = [];

    window.onload = () => { if(user) setupApp(); else { document.getElementById('splash').style.display='none'; document.getElementById('authLayer').style.display='flex'; } };

    function setupApp() {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        if(user.pfp) document.getElementById('pfpPreview').innerHTML = `<img src="${user.pfp}">`;
        
        handlePresenceSystem(); // Nouveau système temps réel
        loadContacts();
        updateTimer();
        setInterval(updateTimer, 60000);
        listenGlobalNote();
        setupAudioEvents();
    }

    // --- PRÉSENCE TEMPS RÉEL (IMMÉDIAT) ---
    function handlePresenceSystem() {
        const myPresenceRef = db.ref('presence/' + user.id);
        const offsetRef = db.ref(".info/serverTimeOffset");

        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === false) return;
            // Quand je me déconnecte (fermeture app), Firebase met à jour automatiquement
            myPresenceRef.onDisconnect().set({ status: 'offline', last: firebase.database.ServerValue.TIMESTAMP });
            myPresenceRef.set({ status: 'online', last: firebase.database.ServerValue.TIMESTAMP });
        });
    }

    function watchStatus(id) {
        db.ref('presence/' + id).on('value', s => {
            const data = s.val();
            const el = document.getElementById('cStatus');
            if(!data) return el.innerText = "hors-ligne";
            
            if(data.status === 'online') {
                el.innerText = "en ligne";
                el.style.color = "var(--online)";
            } else {
                const date = new Date(data.last);
                el.innerText = "en ligne il y a " + date.getHours() + ":" + (date.getMinutes()<10?'0':'') + date.getMinutes();
                el.style.color = "white";
            }
        });
    }

    // --- MESSAGERIE INSTANTANÉE ---
    function syncMessages(path, target, areaId) {
        if(activeChatPath) db.ref(activeChatPath).off();
        activeChatPath = path + '/' + target;
        const area = document.getElementById(areaId); area.innerHTML = "";
        
        // .on('child_added') est instantané (reçoit le nouveau message dès qu'il est écrit)
        db.ref(activeChatPath).on('child_added', snap => {
            const m = snap.val(); const isMe = m.sid === user.id;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${isMe ? 'm-me' : 'm-they'}`;
            bubble.id = "msg_" + snap.key;
            
            let content = m.type === 'img' ? `<img src="${m.txt}" style="width:100%; border-radius:15px;">` : 
                          m.type === 'audio' ? `<audio controls src="${m.txt}" style="width:100%"></audio>` : m.txt;
            
            bubble.innerHTML = `${content}<div class="msg-meta">${new Date(m.t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} ${isMe?(m.seen?'✓✓':'✓'):''}</div>`;
            bubble.onclick = () => openMsgOptions(activeChatPath, snap.key, isMe, m.txt, m.t);
            
            area.appendChild(bubble);
            area.scrollTop = area.scrollHeight;
            if(!isMe && !m.seen) db.ref(activeChatPath+'/'+snap.key).update({seen:true});
        });

        db.ref(activeChatPath).on('child_removed', snap => { document.getElementById("msg_" + snap.key)?.remove(); });
    }

    // --- OPTIONS MESSAGES (30 MIN) ---
    function openMsgOptions(path, id, isMe, txt, time) {
        const diff = (Date.now() - time) / 60000;
        let h = `<button class="option-btn" onclick="copyText('${txt}')">📋 Copier</button>`;
        h += `<button class="option-btn" onclick="deleteMsg('${path}','${id}', false)">🗑️ Supprimer pour moi</button>`;
        if(isMe && diff < 30) {
            h += `<button class="option-btn" onclick="editMsg('${path}','${id}','${txt}')">✏️ Modifier</button>`;
            h += `<button class="option-btn" style="color:var(--love)" onclick="deleteMsg('${path}','${id}', true)">🚫 Supprimer pour tous</button>`;
        }
        openModal("Message", h);
    }

    function editMsg(path, id, oldTxt) {
        triggerBack();
        openModal("Modifier", `<input id="modalInput" class="modal-input" value="${oldTxt}">`, (v) => {
            db.ref(path+'/'+id).update({txt: v, edited: true});
            location.reload();
        });
    }

    function deleteMsg(path, id, all) { if(all) db.ref(path+'/'+id).remove(); else document.getElementById("msg_"+id).remove(); triggerBack(); }

    // --- WIDGET COCON ---
    function sendGlobalNote() {
        openModal("Note Cocon", `<input id="modalInput" class="modal-input" placeholder="Ton mot doux...">`, (v) => {
            db.ref('notes/'+user.id).set({txt: v, t: Date.now()});
            triggerBack();
        });
    }

    function listenGlobalNote() {
        db.ref('users/'+user.id+'/contacts').once('value', s => {
            s.forEach(snap => {
                db.ref('notes/'+snap.key).on('value', ns => {
                    if(ns.exists()) {
                        document.getElementById('coconWidgetArea').style.display = 'block';
                        document.getElementById('widgetNoteDisp').innerText = ns.val().txt;
                    }
                });
            });
        });
    }

    // --- AUDIO / PERMISSIONS ---
    function setupAudioEvents() {
        const btn = document.getElementById('micBtn');
        btn.onpointerdown = (e) => { e.preventDefault(); startRecord(); };
        btn.onpointerup = (e) => { e.preventDefault(); stopRecord(); };
    }

    async function startRecord() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                const reader = new FileReader();
                reader.onload = (e) => db.ref('msgs/'+activeId).push({ sid: user.id, txt: e.target.result, t: Date.now(), type: 'audio', seen: false });
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start(); document.getElementById('micBtn').classList.add('recording');
        } catch(e) { alert("Micro non autorisé ou HTTPS manquant."); }
    }

    function stopRecord() { if(mediaRecorder && mediaRecorder.state !== "inactive") { mediaRecorder.stop(); document.getElementById('micBtn').classList.remove('recording'); } }

    // --- UTILITAIRES ---
    function openChat(id, name, pfp) {
        currentPeerId = id; activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('cHeadPfp').innerHTML = pfp ? `<img src="${pfp}">` : name[0];
        document.getElementById('chatBox').style.display = 'flex';
        pushState('chatBox'); watchStatus(id); syncMessages('msgs', activeId, 'mArea');
    }

    function sendMsg(mode) {
        const inp = document.getElementById(mode === 'msgs' ? 'mIn' : 'coIn');
        if(!inp.value.trim()) return;
        db.ref(mode === 'msgs' ? 'msgs/'+activeId : 'cocon/'+use.code).push({ sid: user.id, txt: inp.value, t: Date.now(), type: 'text', seen: false });
        inp.value = "";
    }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display = 'flex'; pushState('modal');
        document.getElementById('modalConfirmBtn').onclick = () => { if(a) a(document.getElementById('modalInput')?.value); else triggerBack(); };
    }

    function triggerBack() { history.back(); }
    function pushState(id) { stateStack.push(id); history.pushState({id}, ""); }
    window.onpopstate = () => {
        const last = stateStack.pop();
        if(last === 'modal') document.getElementById('customModal').style.display = 'none';
        else { document.getElementById('chatBox').style.display = 'none'; document.getElementById('coconBox').style.display = 'none'; }
    };

    function login() {
        const id = "u_" + document.getElementById('lPhone').value;
        db.ref('users/'+id).once('value', s => {
            if(s.exists() && s.val().pass === document.getElementById('lPass').value) {
                user = s.val(); localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload();
            } else alert("Erreur");
        });
    }

    function register() {
        const id = "u_" + document.getElementById('rPhone').value;
        const nu = { id, pseudo: document.getElementById('rPseudo').value, pass: document.getElementById('rPass').value, code: '0000', startDate: new Date().toISOString() };
        db.ref('users/'+id).set(nu).then(() => { user = nu; localStorage.setItem('nu_v33_user', JSON.stringify(nu)); location.reload(); });
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}','${u.pfp}')"><div class="pfp">${u.pfp?`<img src="${u.pfp}">`:u.pseudo[0]}</div><div><b>${u.pseudo}</b></div></div>`;
                });
            });
        });
    }

    function addFriend() {
        openModal("Ajouter", `<input type="tel" id="modalInput" class="modal-input" placeholder="Numéro">`, (tel) => {
            const id = "u_"+tel; db.ref('users/'+id).once('value', s => {
                if(s.exists()) { db.ref(`users/${user.id}/contacts/${id}`).set(true); db.ref(`users/${id}/contacts/${user.id}`).set(true); triggerBack(); }
            });
        });
    }

    function openEdit(f, d) {
        openModal("Modifier", `<input type="${d?'date':'text'}" id="modalInput" class="modal-input">`, (v) => {
            db.ref('users/'+user.id).update({[f]:v}); user[f]=v; localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload();
        });
    }

    function askCoconCode() {
        openModal("Sécurisé", `<input type="password" id="modalInput" class="modal-input" placeholder="Code secret">`, (val) => {
            if(val === user.code) { triggerBack(); document.getElementById('coconBox').style.display='flex'; pushState('coconBox'); syncMessages('cocon', user.code, 'coArea'); }
        });
    }

    function uploadFile(input, mode) {
        const reader = new FileReader();
        reader.onload = (e) => {
            if(mode === 'pfp') {
                db.ref('users/'+user.id).update({pfp: e.target.result}); user.pfp = e.target.result;
                localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload();
            } else db.ref('msgs/'+activeId).push({ sid: user.id, txt: e.target.result, t: Date.now(), type: 'img', seen: false });
        };
        reader.readAsDataURL(input.files[0]);
    }

    function updateTimer() { if(!user.startDate) return; const diff = new Date() - new Date(user.startDate); document.getElementById('d-day').innerText = Math.floor(diff/86400000); document.getElementById('d-hour').innerText = Math.floor((diff/3600000)%24); }
    function switchV(id, el) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
    function unlockAudio() { audioUnlocked = true; }
    function logout() { localStorage.clear(); location.reload(); }
    function copyText(t) { navigator.clipboard.writeText(t); triggerBack(); }
</script>
