<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus v4.1 - Gabon Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff2d55; --primary: #5856d6; --bg: #050505; --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        
        /* ECRAN ACCUEIL / AUTH */
        #authLayer { position:fixed; inset:0; background:#000; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
        .auth-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 35px; width: 100%; max-width: 320px; text-align: center; }
        .tab-auth { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 15px; }
        .btn-tab { flex: 1; padding: 10px; border-radius: 12px; border: none; background: none; color: white; font-size: 12px; cursor: pointer; }
        .tab-active { background: var(--accent); font-weight: 800; }

        /* APP LOGIC */
        .app-shell { height: 100vh; display: flex; flex-direction: column; display: none; }
        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 200px; }
        .view-active { display: block; animation: fadeIn 0.4s; }
        
        /* CHAT STYLE */
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .bubble-container { display: flex; flex-direction: column; max-width: 80%; }
        .mine { align-self: flex-end; align-items: flex-end; }
        .theirs { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.4; position: relative; }
        .mine .bubble { background: var(--primary); border-bottom-right-radius: 4px; color: white; }
        .theirs .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .time { font-size: 9px; opacity: 0.4; margin-top: 4px; }

        /* NAV */
        .bottom-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 70px; background: rgba(15,15,15,0.95); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 5000; }
        .nav-item { font-size: 24px; opacity: 0.3; }
        .nav-active { opacity: 1; color: var(--accent); }

        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: #111; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="authLayer">
    <div class="auth-card">
        <div style="font-size:28px; font-weight:800; margin-bottom:20px; letter-spacing:-1px;">NEXUS</div>
        <div class="tab-auth">
            <button id="btnConn" class="btn-tab tab-active" onclick="toggleAuth('login')">CONNEXION</button>
            <button id="btnInsc" class="btn-tab" onclick="toggleAuth('signup')">S'INSCRIRE</button>
        </div>
        
        <input type="text" id="authName" placeholder="Ton Surnom">
        <input type="password" id="authPass" placeholder="Mot de passe">
        <button class="btn-main" id="mainAuthBtn" onclick="handleAuth()">ENTRER</button>
    </div>
</div>

<div class="app-shell" id="app">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
        <div style="font-weight: 800; color: var(--accent);">NEXUS</div>
        <img id="myAvatar" src="" style="width:35px; height:35px; border-radius:10px; object-fit:cover; border:2px solid var(--accent);">
    </div>

    <div id="vWorld" class="view view-active">
        <div style="margin-bottom: 20px; display: flex; gap: 15px;">
            <span onclick="setTab('chats')" id="tChats" style="color:var(--accent); font-weight:800; border-bottom:2px solid var(--accent);">DISCUSSIONS</span>
            <span onclick="setTab('disc')" id="tDisc" style="opacity:0.4;">DÉCOUVRIR</span>
        </div>
        <div id="listChats"></div>
        <div id="listDisc" style="display:none;"></div>
    </div>

    <div id="vCouple" class="view">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn-tab" style="background:var(--card); border:1px solid var(--border);" onclick="document.getElementById('fileIn').click()">📷 Photo</button>
            <button class="btn-tab" style="background:var(--card); border:1px solid var(--border);" onclick="sendGame()">🎮 Défi</button>
            <input type="file" id="fileIn" hidden accept="image/*" onchange="uploadImg(this)">
        </div>
        <div id="coupleTyping" style="font-size:11px; color:var(--accent); margin-bottom:5px; height:15px;"></div>
        <div id="coupleBox" class="msg-list" style="height:350px; background:var(--card); border-radius:25px; border:1px solid var(--border);"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <input type="text" id="cIn" placeholder="Message secret..." style="margin:0;" oninput="emitTyping()">
            <button onclick="pushMsg('couple')" style="background:var(--accent); border:none; width:55px; border-radius:15px; color:white;">➔</button>
        </div>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item nav-active" onclick="nv('vWorld', this)">🌎</div>
        <div class="nav-item" onclick="nv('vCouple', this)">❤</div>
        <div class="nav-item" onclick="location.reload()">⚙</div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let authMode = 'login';
    let user = JSON.parse(localStorage.getItem('nexus_user'));

    function toggleAuth(mode) {
        authMode = mode;
        document.getElementById('btnConn').className = mode === 'login' ? 'btn-tab tab-active' : 'btn-tab';
        document.getElementById('btnInsc').className = mode === 'signup' ? 'btn-tab tab-active' : 'btn-tab';
        document.getElementById('mainAuthBtn').innerText = mode === 'login' ? 'SE CONNECTER' : 'CRÉER MON COMPTE';
    }

    function handleAuth() {
        const n = document.getElementById('authName').value;
        const p = document.getElementById('authPass').value;
        if(!n || !p) return alert("Remplis les champs !");

        if(authMode === 'signup') {
            const id = 'u' + Date.now();
            const newUser = { id, name: n, pass: p, pfp: 'https://ui-avatars.com/api/?name='+n, code: '', meet: '', blocked: {} };
            db.ref('users/'+id).set(newUser).then(() => start(newUser));
        } else {
            db.ref('users').orderByChild('name').equalTo(n).once('value', s => {
                if(s.exists()) {
                    const u = Object.values(s.val())[0];
                    if(u.pass === p) start(u); else alert("Mot de passe incorrect");
                } else alert("Utilisateur inconnu");
            });
        }
    }

    function start(u) {
        user = u;
        localStorage.setItem('nexus_user', JSON.stringify(u));
        document.getElementById('authLayer').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('myAvatar').src = u.pfp;
        initApp();
    }

    if(user) start(user);

    function initApp() {
        // Liste Découverte
        db.ref('users').on('value', s => {
            const l = document.getElementById('listDisc'); l.innerHTML = "";
            s.forEach(c => {
                const u = c.val();
                if(u.id !== user.id) l.innerHTML += `<div style="background:var(--card); padding:15px; border-radius:20px; margin-bottom:10px; display:flex; align-items:center; gap:10px;"><img src="${u.pfp}" style="width:40px; height:40px; border-radius:10px;"><b>${u.name}</b></div>`;
            });
        });

        // Chat Couple
        if(user.code) {
            db.ref('couples/'+user.code+'/chat').on('value', s => {
                const b = document.getElementById('coupleBox'); b.innerHTML = "";
                s.forEach(c => {
                    const m = c.val();
                    const time = new Date(m.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    const content = m.type === 'img' ? `<img src="${m.txt}" style="width:100%; border-radius:15px;">` : m.txt;
                    b.innerHTML += `<div class="bubble-container ${m.sid===user.id?'mine':'theirs'}"><div class="bubble">${content}</div><div class="time">${time}</div></div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
            
            db.ref('couples/'+user.code+'/typing').on('value', s => {
                const t = s.val();
                document.getElementById('coupleTyping').innerText = (t && t !== user.id) ? "Alicia écrit..." : "";
            });
        }
    }

    function pushMsg(mode) {
        const i = document.getElementById('cIn');
        if(!i.value || !user.code) return;
        db.ref('couples/'+user.code+'/chat').push({ sid: user.id, txt: i.value, t: Date.now() });
        db.ref('couples/'+user.code+'/typing').set(false);
        i.value = "";
    }

    function uploadImg(el) {
        const reader = new FileReader();
        reader.onload = () => {
            db.ref('couples/'+user.code+'/chat').push({ sid: user.id, txt: reader.result, type: 'img', t: Date.now() });
        };
        reader.readAsDataURL(el.files[0]);
    }

    function sendGame() {
        const defis = ["Action : Selfie grimace !", "Vérité : Ta plus grosse bêtise ?", "Action : Envoie un vocal de 5s", "Vérité : Ton premier crush ?"];
        const d = defis[Math.floor(Math.random()*defis.length)];
        db.ref('couples/'+user.code+'/chat').push({ sid: 'sys', txt: "🎲 DÉFI : " + d, t: Date.now() });
    }

    function emitTyping() { if(user.code) { db.ref('couples/'+user.code+'/typing').set(user.id); setTimeout(() => db.ref('couples/'+user.code+'/typing').set(false), 3000); } }
    function nv(id, el) { document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active')); document.getElementById(id).classList.add('view-active'); el.classList.add('nav-active'); }
    function setTab(t) {
        document.getElementById('listChats').style.display = t === 'chats' ? 'block' : 'none';
        document.getElementById('listDisc').style.display = t === 'disc' ? 'block' : 'none';
        document.getElementById('tChats').style.opacity = t === 'chats' ? '1' : '0.4';
        document.getElementById('tDisc').style.opacity = t === 'disc' ? '1' : '0.4';
    }
</script>
</body>
</html>
