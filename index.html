<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.41</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3; --online: #25D366;
        }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: var(--bg); color: white; height: 100vh; overflow: hidden; 
            background-size: cover; background-position: center;
        }
        #splash { position: fixed; inset: 0; background: #0f0c29; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.2s ease-in-out forwards; animation-delay: 1.2s; }
        @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.85); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); transition: 0.3s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; transform: scale(1.05); }
        
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }
        
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px); }
        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #2a2a40; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #chatBox, #coconBox { position: fixed; inset: 0; background: inherit; background-color: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; position: relative; animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; backdrop-filter: blur(5px); }
        .msg-meta { font-size: 10px; margin-top: 5px; opacity: 0.7; display: flex; justify-content: flex-end; gap: 4px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 30px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: white; margin: 10px 0; box-sizing: border-box; }
        
        .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 50; }
        
        .media-btn { background: var(--card); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; }
        .recording { background: var(--love) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="splash"><div class="loader"></div><p>Initialisation de votre univers...</p></div>

<div id="vWidgetFull" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:30000; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
    <div style="font-family:'Pacifico'; color:var(--love); font-size:30px; margin-bottom:30px;">Pour toi... 💖</div>
    <div id="widgetText" style="font-size:22px; color:white; background:var(--card); padding:30px; border-radius:35px; border:2px solid var(--love); width:80%;">...</div>
    <button onclick="document.getElementById('vWidgetFull').style.display='none'" style="margin-top:40px; background:var(--card); border:none; color:white; padding:15px 30px; border-radius:20px;">Retour</button>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--accent);">...</h3>
        <div id="modalError" class="error-msg" style="color:var(--love); font-size:12px;"></div>
        <div id="modalBody"></div>
        <div id="modalActions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="tab" style="background:var(--card); color:white" onclick="triggerBack()">Fermer</button>
            <button class="tab active" id="modalConfirmBtn">Valider</button>
        </div>
    </div>
</div>

<div id="authLayer" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--card); padding:40px 25px; border-radius:40px; width:100%; max-width:340px; text-align:center;">
        <div id="loginUI">
            <h2 style="font-family:'Pacifico'; color:var(--accent)">Connexion</h2>
            <input type="tel" class="modal-input" placeholder="Numéro" id="lPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="lPass">
            <button class="tab active" style="width:100%; margin-top:10px" onclick="login()">ENTRER</button>
            <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:12px; opacity:0.6;">Créer un compte</p>
        </div>
        <div id="regUI" style="display:none;">
            <h2 style="font-family:'Pacifico'; color:var(--accent)">Bienvenue</h2>
            <input type="text" class="modal-input" placeholder="Pseudo" id="rPseudo">
            <input type="tel" class="modal-input" placeholder="Numéro" id="rPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="rPass">
            <button class="tab active" style="width:100%; margin-top:10px" onclick="register()">C'EST PARTI</button>
            <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:12px; opacity:0.6;">Déjà inscrit ?</p>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div><div class="fab" onclick="addFriend()">+</div></div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:30px; border-radius:35px; text-align:center; margin-bottom:25px;">
            <div style="font-size:45px">💑</div>
            <h3 style="margin:10px 0">Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:15px;">
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px;"><b id="d-day" style="font-size:24px">0</b><br><small>Jours</small></div>
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px;"><b id="d-hour" style="font-size:24px">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button onclick="askCoconCode()" style="width:100%; padding:22px; border-radius:28px; border:2px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold;">💖 OUVRIR LE COCON</button>
    </div>

    <div id="vSet" class="view">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="contact-item" style="grid-column: span 2; justify-content: center; height: 100px;" onclick="document.getElementById('pfpInput').click()" id="pfpPreview">👤</div>
            <input type="file" id="pfpInput" hidden accept="image/*" onchange="handlePfp(event)">
            
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center;" onclick="openEdit('pseudo')">Pseudo</div>
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center;" onclick="openEdit('code')">Code Cocon</div>
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center; grid-column: span 2; border: 1px solid var(--accent);" onclick="setCustomTheme()">🎨 Changer le Fond d'écran</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); margin-top:20px; font-weight:bold;">Déconnexion</button>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="head"><span onclick="triggerBack()" style="font-size:24px;">←</span><b id="cName">...</b></div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:8px; align-items:center; background:rgba(0,0,0,0.3);">
        <button class="media-btn" onclick="document.getElementById('imgIn').click()">🖼️</button>
        <button class="media-btn" id="micBtn" ontouchstart="startRecord()" ontouchend="stopRecord()">🎤</button>
        <input type="file" id="imgIn" hidden accept="image/*" onchange="sendImg('msgs')">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:12px 18px; border-radius:25px; color:white;">
        <button onclick="send('msgs')" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; color:black;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="head" style="background:var(--love)"><span onclick="triggerBack()" style="font-size:24px;">←</span><b>🌹 Cocon Privé</b></div>
    <div class="msg-area" id="coArea"></div>
    <div style="padding:15px; display:flex; gap:10px;">
        <button class="media-btn" onclick="document.getElementById('imgInCo').click()">🖼️</button>
        <input type="file" id="imgInCo" hidden accept="image/*" onchange="sendImg('cocon')">
        <input type="text" id="coIn" placeholder="Secret..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;">
        <button onclick="send('cocon')" style="background:var(--love); border:none; width:50px; height:50px; border-radius:50%;">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v41_user'));
    let activeId = null;
    let stateStack = [];
    let mediaRecorder;
    let audioChunks = [];

    // --- INITIALISATION ---
    function start() {
        document.getElementById('authLayer').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        applyTheme(user.theme);
        loadContacts();
        loadTimer();
    }

    // --- NAVIGATION ---
    function pushState(id) { stateStack.push(id); history.pushState({id}, ""); }
    function triggerBack() { history.back(); }
    window.onpopstate = () => {
        const last = stateStack.pop();
        if(last === 'modal') document.getElementById('customModal').style.display = 'none';
        else if(last === 'chatBox') document.getElementById('chatBox').style.display = 'none';
        else if(last === 'coconBox') document.getElementById('coconBox').style.display = 'none';
    };

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    // --- MESSAGERIE ---
    function openChat(id, name) {
        activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display='flex';
        pushState('chatBox');
        sync('msgs', activeId, 'mArea');
    }

    function sync(path, target, areaId) {
        db.ref(path+'/'+target).off();
        db.ref(path+'/'+target).on('value', s => {
            const area = document.getElementById(areaId); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val(), isMe = m.sid===user.id;
                let content = m.type === 'img' ? `<img src="${m.txt}" style="width:100%; border-radius:15px;" onclick="viewPhoto('${m.txt}')">` : 
                              (m.type === 'audio' ? `<audio controls style="width:100%"><source src="${m.txt}"></audio>` : m.txt);
                
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">${content}<div class="msg-meta">${new Date(m.ts).getHours()}:${new Date(m.ts).getMinutes()}</div></div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function send(path) {
        const isCocon = (path==='cocon');
        const inp = isCocon ? document.getElementById('coIn') : document.getElementById('mIn');
        const target = isCocon ? "cocon_" + user.code : activeId;
        if(!inp.value.trim()) return;
        db.ref(path+'/'+target).push({ sid:user.id, txt:inp.value.trim(), ts:Date.now(), type:'text' });
        inp.value = "";
    }

    function sendImg(path) {
        const file = (path === 'cocon' ? document.getElementById('imgInCo') : document.getElementById('imgIn')).files[0];
        if(!file) return;
        const target = (path === 'cocon') ? "cocon_" + user.code : activeId;
        const reader = new FileReader();
        reader.onload = (e) => {
            db.ref(path+'/'+target).push({ sid:user.id, txt:e.target.result, ts:Date.now(), type:'img' });
        };
        reader.readAsDataURL(file);
    }

    // --- THEME ---
    function setCustomTheme() {
        openModal("Thème", `
            <p style="font-size:12px">Entrez une couleur (ex: #ff4b6e) ou l'URL d'une image</p>
            <input type="text" id="modalInput" class="modal-input" placeholder="Couleur ou Lien Image">
        `, (val) => {
            db.ref('users/'+user.id).update({theme: val});
            user.theme = val;
            applyTheme(val);
            localStorage.setItem('nu_v41_user', JSON.stringify(user));
            triggerBack();
        });
    }

    function applyTheme(t) {
        if(!t) return;
        if(t.startsWith('http') || t.startsWith('data:image')) {
            document.body.style.backgroundImage = `url('${t}')`;
        } else {
            document.body.style.backgroundImage = 'none';
            document.body.style.backgroundColor = t;
        }
    }

    // --- COCON ---
    function askCoconCode() {
        openModal("Code Secret", `<input type="tel" id="modalInput" class="modal-input" style="-webkit-text-security: disc;">`, (c) => {
            if(c === user.code) {
                document.getElementById('coconBox').style.display='flex';
                pushState('coconBox');
                sync('cocon', "cocon_" + user.code, 'coArea');
                document.getElementById('customModal').style.display = 'none';
            } else alert("Code erroné");
        });
    }

    // --- FONCTIONS SYSTÈME ---
    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display = 'flex';
        pushState('modal');
        document.getElementById('modalConfirmBtn').onclick = () => a(document.getElementById('modalInput').value);
    }

    function login() {
        const ph = document.getElementById('lPhone').value.replace(/\D/g,''), pa = document.getElementById('lPass').value;
        db.ref('users/u_'+ph).once('value', s => {
            if(s.exists() && s.val().pass === pa) {
                user = s.val(); localStorage.setItem('nu_v41_user', JSON.stringify(user)); start();
            } else alert("Identifiants incorrects");
        });
    }

    function register() {
        const ps = document.getElementById('rPseudo').value, ph = document.getElementById('rPhone').value.replace(/\D/g,''), pa = document.getElementById('rPass').value, id = "u_"+ph;
        const data = {id, pseudo:ps, pass:pa, code:'0000', startDate:Date.now(), theme:'#0f0c29', contacts:{}};
        db.ref('users/'+id).set(data).then(() => toggleAuth(true));
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}')">
                        <div class="contact-pfp">${u.pseudo[0]}</div>
                        <b>${u.pseudo}</b>
                    </div>`;
                });
            });
        });
    }

    function loadTimer() {
        setInterval(() => {
            const diff = Date.now() - user.startDate;
            document.getElementById('d-day').innerText = Math.floor(diff / 86400000);
            document.getElementById('d-hour').innerText = Math.floor((diff % 86400000) / 3600000);
        }, 1000);
    }

    function addFriend() {
        openModal("Ajouter un proche", `<input type="tel" id="modalInput" class="modal-input" placeholder="Numéro">`, (tel) => {
            const id = "u_"+tel.replace(/\D/g,'');
            db.ref('users/'+id).once('value', s => {
                if(s.exists()) {
                    db.ref(`users/${user.id}/contacts/${id}`).set(true);
                    db.ref(`users/${id}/contacts/${user.id}`).set(true);
                    triggerBack();
                } else alert("Utilisateur introuvable");
            });
        });
    }

    function toggleAuth(l) { document.getElementById('loginUI').style.display=l?'block':'none'; document.getElementById('regUI').style.display=l?'none':'block'; }
    function logout() { localStorage.clear(); location.reload(); }
    function unlockAudio() {}

    window.onload = () => { if(user) start(); else { document.getElementById('splash').style.display = 'none'; document.getElementById('authLayer').style.display = 'flex'; } };
</script>
</body>
</html>
