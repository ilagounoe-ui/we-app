<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v42</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3; --online: #25D366;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-size: cover; background-position: center; transition: background 0.5s ease; }
        
        /* Animation pour le Cocon */
        @keyframes unlockScan {
            0% { border-color: var(--accent); box-shadow: 0 0 5px var(--accent); }
            50% { border-color: var(--love); box-shadow: 0 0 20px var(--love); }
            100% { border-color: var(--accent); box-shadow: 0 0 5px var(--accent); }
        }
        .unlocking { animation: unlockScan 0.5s ease-in-out infinite; }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); transition: 0.3s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; transform: scale(1.05); }
        
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }
        
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #2a2a40; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .opt-dots { margin-left: auto; padding: 10px; font-size: 22px; cursor: pointer; color: var(--accent); }
        
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); }
        
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; position: relative; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 10px; margin-top: 5px; display: flex; justify-content: flex-end; gap: 5px; opacity: 0.7; }
        .check-blue { color: var(--check); font-weight: bold; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 30px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: white; margin: 10px 0; text-align: center; box-sizing: border-box; }
        .option-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 18px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; z-index: 50; }
        #vWidgetFull { display:none; position:fixed; inset:0; background:var(--bg); z-index:30000; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
        .media-btn { background: var(--card); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .recording { background: var(--love) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="splash"><div class="loader"></div></div>

<div id="vWidgetFull">
    <div style="font-family:'Pacifico'; color:var(--love); font-size:30px; margin-bottom:30px;">L'Univers te dit... 💖</div>
    <div id="widgetText" style="font-size:22px; color:white; background:var(--card); padding:30px; border-radius:35px; border:2px solid var(--love); min-height:150px; display:flex; align-items:center; justify-content:center; width:80%;">...</div>
    <button onclick="document.getElementById('vWidgetFull').style.display='none'" style="margin-top:40px; background:var(--card); border:none; color:white; padding:15px 30px; border-radius:20px; font-weight:bold;">Retour</button>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content" id="modalFrame">
        <h3 id="modalTitle" style="color:var(--accent); margin:0 0 10px 0;">...</h3>
        <div id="modalError" style="color:var(--love); font-size:12px; font-weight:bold; margin-bottom:10px;"></div>
        <div id="modalBody"></div>
        <div id="modalActions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" style="justify-content:center; background:var(--card)" onclick="triggerBack()">Annuler</button>
            <button class="option-btn" style="justify-content:center; background:var(--accent); color:black" id="modalConfirmBtn">OK</button>
        </div>
    </div>
</div>

<div id="authLayer" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--card); padding:40px 25px; border-radius:40px; width:100%; max-width:340px; text-align:center;">
        <div id="loginUI">
            <h2 style="font-family:'Pacifico'; color:var(--accent)">Connexion</h2>
            <input type="tel" class="modal-input" placeholder="Numéro" id="lPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="lPass">
            <button class="option-btn" style="background:var(--accent); color:black; justify-content:center;" onclick="login()">ENTRER</button>
            <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:12px; opacity:0.6; cursor:pointer;">Pas de compte ? S'inscrire</p>
        </div>
        <div id="regUI" style="display:none;">
            <h2 style="font-family:'Pacifico'; color:var(--accent)">Nouveau Profil</h2>
            <input type="text" class="modal-input" placeholder="Pseudo" id="rPseudo">
            <input type="tel" class="modal-input" placeholder="Numéro" id="rPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="rPass">
            <button class="option-btn" style="background:var(--accent); color:black; justify-content:center;" onclick="register()">CRÉER</button>
            <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:12px; opacity:0.6; cursor:pointer;">Déjà inscrit ? Connexion</p>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div><div class="fab" onclick="addFriend()">+</div></div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:30px; border-radius:35px; text-align:center; margin-bottom:25px;">
            <div style="font-size:45px">💑</div>
            <h3 style="margin:10px 0">Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:15px; margin-top:15px;">
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px; min-width:80px;"><b id="d-day" style="font-size:24px">0</b><br><small>Jours</small></div>
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px; min-width:80px;"><b id="d-hour" style="font-size:24px">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button onclick="askCoconCode()" style="width:100%; padding:22px; border-radius:28px; border:2px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold;">💖 OUVRIR LE COCON</button>
        <button onclick="checkMood()" style="width:100%; padding:15px; border-radius:28px; border:none; background:var(--card); color:white; font-weight:bold; margin-top:15px;">🌟 Besoin d'un mot doux ?</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpPreview" class="contact-pfp" style="width:110px; height:110px; margin:0 auto 20px; border:3px solid var(--accent); font-size:40px;" onclick="if(user.pfp) viewPhoto(user.pfp)">👤</div>
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="handlePfp(event)">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center;" onclick="openEdit('pseudo')">Pseudo</div>
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center;" onclick="document.getElementById('pfpInput').click()">Photo</div>
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center;" onclick="openEdit('code')">Code Secret</div>
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center;" onclick="openEdit('startDate', true)">Date</div>
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center; grid-column:span 2; border: 1px solid var(--accent);" onclick="openNotificationSettings()">🔔 Sons & Notifications</div>
            <div style="background:var(--card); padding:20px; border-radius:25px; text-align:center; grid-column:span 2;" onclick="changeWall()">🎨 Fond d'écran</div>
            <div style="background:linear-gradient(135deg, var(--accent), var(--love)); padding:20px; border-radius:25px; text-align:center; grid-column:span 2; color:black; font-weight:bold;" onclick="sendLoveNote()">💌 Envoyer un mot doux</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); font-weight:bold; margin-top:20px;">Déconnexion</button>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="head">
        <span onclick="triggerBack()" style="font-size:24px; cursor:pointer;">←</span>
        <div style="flex:1">
            <b id="cName">...</b><br>
            <small id="cStatus" style="font-size:10px; opacity:0.8;"></small>
        </div>
    </div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:8px; background:rgba(0,0,0,0.2);">
        <button class="media-btn" onclick="document.getElementById('imgIn').click()">🖼️</button>
        <button class="media-btn" id="micBtn" ontouchstart="startRecord()" ontouchend="stopRecord()">🎤</button>
        <input type="file" id="imgIn" hidden accept="image/*" onchange="sendMedia('img', this)">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:12px; border-radius:25px; color:white;">
        <button onclick="sendMsg('msgs')" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="head" style="background:var(--love)"><span onclick="triggerBack()" style="font-size:24px; cursor:pointer;">←</span><b>🌹 Cocon Privé</b></div>
    <div class="msg-area" id="coArea"></div>
    <div style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.2);">
        <button class="media-btn" onclick="document.getElementById('imgInCo').click()">🖼️</button>
        <input type="file" id="imgInCo" hidden accept="image/*" onchange="sendMedia('img', this, 'cocon')">
        <input type="text" id="coIn" placeholder="Secret..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;">
        <button onclick="sendMsg('cocon')" style="background:var(--love); border:none; width:50px; height:50px; border-radius:50%;">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null;
    let audioUnlocked = false;
    let stateStack = []; 
    let mediaRecorder;
    let audioChunks = [];
    let activeChatPath = null;

    const sounds = {
        'pop': 'https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3',
        'cocon': 'https://notificationsounds.com/storage/sounds/file-sounds-1121-love-is-in-the-air.mp3'
    };

    function unlockAudio() { if(!audioUnlocked) { new Audio(sounds.pop).play().then(()=>audioUnlocked=true).catch(()=>{}); } }

    // --- NAVIGATION ---
    function pushState(id) { stateStack.push(id); history.pushState({id: id}, ""); }
    function triggerBack() { history.back(); }
    window.onpopstate = () => {
        const last = stateStack.pop();
        if(last === 'modal') document.getElementById('customModal').style.display = 'none';
        else if(last === 'chatBox' || last === 'coconBox') {
            document.getElementById('chatBox').style.display = 'none';
            document.getElementById('coconBox').style.display = 'none';
            if(activeChatPath) db.ref(activeChatPath).off();
            db.ref('presence/' + activeId.replace(user.id,'').replace('_','')).off();
        }
    };

    // --- PRÉSENCE ---
    function updatePresence() {
        if(!user) return;
        const ref = db.ref('presence/' + user.id);
        ref.set({ status: 'online', last: Date.now() });
        ref.onDisconnect().set({ status: 'offline', last: Date.now() });
    }

    function watchStatus(contactId) {
        db.ref('presence/' + contactId).on('value', s => {
            const p = s.val();
            const el = document.getElementById('cStatus');
            if(!el) return;
            if(p && p.status === 'online') el.innerHTML = `<span style="color:var(--online)">● en ligne</span>`;
            else if(p) {
                const diff = Math.floor((Date.now() - p.last) / 60000);
                el.innerText = diff < 1 ? "vu à l'instant" : "vu il y a " + (diff < 60 ? diff + "m" : Math.floor(diff/60) + "h");
            } else el.innerText = "hors-ligne";
        });
    }

    // --- OPTIONS CONTACTS ---
    function openContactOptions(event, contactId) {
        event.stopPropagation();
        let opts = `
            <button class="option-btn" onclick="viewPhotoOfContact('${contactId}')">🖼️ Voir la photo</button>
            <button class="option-btn" style="color:var(--love)" onclick="confirmDeleteContact('${contactId}')">🗑️ Supprimer</button>
        `;
        openModal("Options Contact", opts, null);
    }

    function viewPhotoOfContact(id) {
        db.ref('users/' + id + '/pfp').once('value', s => {
            if(s.val()) viewPhoto(s.val());
            else alert("Pas de photo");
        });
    }

    function confirmDeleteContact(id) {
        if(confirm("Supprimer ?")) { db.ref(`users/${user.id}/contacts/${id}`).remove(); triggerBack(); }
    }

    // --- COCON ---
    function askCoconCode() {
        openModal("Cocon Secret", `<input type="password" id="modalInput" class="modal-input" placeholder="Code">`, (val) => {
            if(val === user.code) {
                document.getElementById('modalFrame').classList.add('unlocking');
                setTimeout(() => {
                    document.getElementById('customModal').style.display = 'none';
                    stateStack.pop();
                    document.getElementById('coconBox').style.display = 'flex';
                    pushState('coconBox');
                    sync('cocon', user.code, 'coArea');
                    document.getElementById('modalFrame').classList.remove('unlocking');
                }, 600);
            } else document.getElementById('modalError').innerText = "Code incorrect ❌";
        });
    }

    // --- MESSAGES & CHECKS ---
    function sync(path, target, areaId) {
        if (activeChatPath) db.ref(activeChatPath).off();
        activeChatPath = path + '/' + target;
        db.ref(activeChatPath).on('value', s => {
            const area = document.getElementById(areaId); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val(); const isMe = m.sid === user.id;
                if(!isMe && !m.seen) db.ref(activeChatPath + '/' + snap.key).update({ seen: true });

                let content = m.txt;
                if(m.type === 'img') content = `<img src="${m.txt}" style="width:100%; border-radius:10px;" onclick="viewPhoto('${m.txt}')">`;
                if(m.type === 'audio') content = `<audio controls src="${m.txt}" style="width:200px;"></audio>`;

                const time = m.t ? new Date(m.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                area.innerHTML += `
                    <div class="bubble ${isMe ? 'm-me' : 'm-they'}">
                        ${content}
                        <div class="msg-meta"><span>${time}</span>${isMe ? `<span class="${m.seen?'check-blue':''}">✓✓</span>`:''}</div>
                    </div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg(mode) {
        const inp = document.getElementById(mode === 'msgs' ? 'mIn' : 'coIn');
        if(!inp.value.trim()) return;
        const path = mode === 'msgs' ? 'msgs/'+activeId : 'cocon/'+user.code;
        db.ref(path).push({ sid: user.id, txt: inp.value, t: Date.now(), type: 'text', seen: false });
        inp.value = "";
            }

    function sendMedia(type, input, mode = 'msgs') {
        const file = input.files[0]; const reader = new FileReader();
        reader.onload = (e) => {
            const path = mode === 'msgs' ? 'msgs/'+activeId : 'cocon/'+user.code;
            db.ref(path).push({ sid: user.id, txt: e.target.result, t: Date.now(), type: type, seen: false });
        }; reader.readAsDataURL(file);
    }

    // --- UTILS ---
    function openChat(id, name) {
        activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display = 'flex';
        pushState('chatBox'); watchStatus(id); sync('msgs', activeId, 'mArea');
    }

    function checkMood() {
        db.ref('loveNotes').limitToLast(1).once('value', s => {
            let note = "Tu es mon univers. 💖";
            s.forEach(snap => { note = snap.val().txt; });
            document.getElementById('widgetText').innerText = note;
            document.getElementById('vWidgetFull').style.display = 'flex';
        });
    }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('modalError').innerText = "";
        document.getElementById('customModal').style.display = 'flex';
        pushState('modal');
        if(a) {
            document.getElementById('modalActions').style.display = 'flex';
            document.getElementById('modalConfirmBtn').onclick = () => a(document.getElementById('modalInput')?.value);
        } else document.getElementById('modalActions').style.display = 'none';
    }

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val(); if(!u) return;
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}')">
                        <div class="contact-pfp">${u.pfp?`<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:u.pseudo[0]}</div>
                        <div style="flex:1"><b>${u.pseudo}</b></div>
                        <div class="opt-dots" onclick="openContactOptions(event, '${u.id}')">⋮</div>
                    </div>`;
                });
            });
        });
    }

    function start() {
        document.getElementById('splash').style.display='none';
        document.getElementById('authLayer').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        updatePresence(); loadContacts();
        if(user.startDate) setInterval(() => {
            const diff = new Date() - new Date(user.startDate);
            document.getElementById('d-day').innerText = Math.floor(diff/86400000);
            document.getElementById('d-hour').innerText = Math.floor((diff/3600000)%24);
        }, 1000);
    }

    function login() {
        const ph = "u_" + document.getElementById('lPhone').value.replace(/\D/g,'');
        const ps = document.getElementById('lPass').value;
        db.ref('users/'+ph).once('value', s => {
            if(s.exists() && s.val().pass === ps) {
                user = s.val(); localStorage.setItem('nu_v33_user', JSON.stringify(user));
                location.reload();
            } else alert("Erreur identifiants");
        });
    }

    function register() {
        const ph = "u_" + document.getElementById('rPhone').value.replace(/\D/g,'');
        const nu = { id: ph, pseudo: document.getElementById('rPseudo').value, pass: document.getElementById('rPass').value, pfp:'', code:'', startDate:'', wall:'' };
        db.ref('users/'+ph).set(nu).then(() => { user=nu; localStorage.setItem('nu_v33_user', JSON.stringify(nu)); location.reload(); });
    }

    window.onload = () => { if(user) start(); else { document.getElementById('splash').style.display='none'; document.getElementById('authLayer').style.display='flex'; } };
    
    function startRecord() { 
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            mediaRecorder = new MediaRecorder(stream); mediaRecorder.start();
            document.getElementById('micBtn').classList.add('recording');
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        });
    }
    function stopRecord() {
        if(!mediaRecorder) return;
        mediaRecorder.stop(); document.getElementById('micBtn').classList.remove('recording');
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/mp3' });
            const reader = new FileReader();
            reader.onload = (e) => db.ref('msgs/'+activeId).push({ sid: user.id, txt: e.target.result, t: Date.now(), type: 'audio', seen: false });
            reader.readAsDataURL(blob); audioChunks = [];
        };
    }
    
    function toggleAuth(isLogin) { document.getElementById('loginUI').style.display = isLogin ? 'block' : 'none'; document.getElementById('regUI').style.display = isLogin ? 'none' : 'block'; }
    function logout() { localStorage.clear(); location.reload(); }
    function openEdit(f, d=false) { openModal("Modifier", `<input type="${d?'date':'text'}" id="modalInput" class="modal-input">`, (v) => { db.ref('users/'+user.id).update({[f]:v}).then(() => { user[f]=v; localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload(); }); }); }
    function sendLoveNote() { openModal("Petit mot", `<input type="text" id="modalInput" class="modal-input" placeholder="Ton message...">`, (v) => { db.ref('loveNotes').push({txt:v, t:Date.now()}); triggerBack(); }); }
    function viewPhoto(p) { openModal("Photo", `<img src="${p}" style="width:100%; border-radius:15px">`, null); }
    function addFriend() { openModal("Ajouter", `<input type="tel" id="modalInput" class="modal-input" placeholder="Numéro">`, (tel) => { const id = "u_"+tel.replace(/\D/g,''); db.ref('users/'+id).once('value', s => { if(s.exists()) { db.ref(`users/${user.id}/contacts/${id}`).set(true); db.ref(`users/${id}/contacts/${user.id}`).set(true); triggerBack(); } else { document.getElementById('modalError').innerText="Inconnu"; } }); }); }
</script>
</body>
</html>
