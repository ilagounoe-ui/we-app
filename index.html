<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Notre Univers 💖</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ff9a9e">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="94a99c728e9fab72bb967717213d2490.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --accent: #ff4da6;
            --bg-grad: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%);
        }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Poppins', sans-serif; background: var(--bg-grad); overflow: hidden; color: white;
        }

        /* --- ÉCRAN D'INSTALLATION (OVERLAY) --- */
        #installOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-grad); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; transition: 0.5s;
        }
        .install-card {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            padding: 40px 20px; border-radius: 30px; width: 80%; max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .install-logo { width: 100px; height: 100px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-install { 
            background: white; color: var(--accent); border: none; 
            padding: 15px 30px; border-radius: 50px; font-weight: 700; 
            margin-top: 20px; cursor: pointer; width: 100%; font-size: 14px;
        }
        .btn-skip { margin-top: 20px; font-size: 12px; opacity: 0.7; cursor: pointer; text-decoration: underline; }

        /* --- LE RESTE DU DESIGN (TON CODE ACTUEL) --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: url('94a99c728e9fab72bb967717213d2490.jpg') center/cover;
            filter: blur(12px) brightness(0.7); z-index: -1;
        }
        .card {
            background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 40px;
            width: 90%; max-width: 380px; height: 620px; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header { padding: 35px 20px 15px; text-align: center; }
        .profile-img { width: 95px; height: 95px; border-radius: 50%; border: 4px solid white; object-fit: cover; }
        .content { flex: 1; overflow-y: auto; padding: 10px 25px; text-align: center; }
        .page { display: none; }
        .active { display: block; }
        .box { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 25px; margin-bottom: 20px; }
        button { background: linear-gradient(135deg, #ff4da6 0%, #ff7eb9 100%); border: none; padding: 15px; border-radius: 50px; color: white; font-weight: 700; width: 100%; cursor: pointer; }
        textarea, input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; padding: 12px; box-sizing: border-box; margin-bottom: 12px; }
        .nav { display: flex; justify-content: space-around; padding: 20px 10px; background: rgba(0, 0, 0, 0.3); border-radius: 0 0 40px 40px; }
        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.4; transition: 0.4s; }
        .nav-item.active-nav { opacity: 1; transform: scale(1.3); }
    </style>
</head>
<body>

    <div id="installOverlay">
        <div class="install-card">
            <img src="94a99c728e9fab72bb967717213d2490.jpg" class="install-logo">
            <h2 style="margin:0;">Notre Univers</h2>
            <p style="font-size: 13px; opacity: 0.9;">Installe l'application pour rester connecté à ton amour ❤️</p>
            <button id="btnInstall" class="btn-install">TÉLÉCHARGER L'APPLI</button>
            <div class="btn-skip" onclick="closeOverlay()">Déjà installée / Plus tard</div>
        </div>
    </div>

    <div class="card">
        <div class="header">
            <img id="pfp" class="profile-img" src="" style="display:none;">
            <h2 id="userName" style="margin: 10px 0 5px;">Nous 💞</h2>
            <small id="ensembleDepuis"></small>
        </div>
        <div class="content">
            <div id="home" class="page active">
                <div class="box">
                    <p style="margin:0; font-size: 12px; opacity: 0.6;">Message de ton amour</p>
                    <p id="motDouxDisplay" style="font-style: italic; font-weight: 600; margin-top:12px; font-size: 18px;"></p>
                </div>
                <button onclick="sparkle()">❤️ Envoyer des cœurs</button>
            </div>
            </div>
        <div class="nav">
            <div class="nav-item active-nav" onclick="showPage('home', this)">🏠</div>
            </div>
    </div>

<script>
    // --- LOGIQUE D'INSTALLATION ---
    let deferredPrompt;
    const btnInstall = document.getElementById('btnInstall');
    const overlay = document.getElementById('installOverlay');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Le téléphone est prêt à installer, on montre le bouton
        btnInstall.style.display = "block";
    });

    btnInstall.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                console.log('App installée !');
                closeOverlay();
            }
            deferredPrompt = null;
        } else {
            alert("Pour installer : clique sur les 3 points en haut à droite de Chrome, puis sur 'Installer l'application'.");
        }
    });

    function closeOverlay() {
        overlay.style.opacity = "0";
        setTimeout(() => overlay.style.display = "none", 500);
    }

    // Vérifie si l'appli est déjà lancée en mode "App"
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        overlay.style.display = "none";
    }

    // --- TON CODE FIREBASE (Garde le même que précédemment ici) ---
    // ... (apiKey, databaseURL, db.ref('motDoux').on...)
</script>
</body>
</html>
