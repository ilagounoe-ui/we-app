    <style>
        * { 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
            box-sizing: border-box; 
        }
        
        :root { 
            --accent: #d0a8ff; 
            --accent-glow: rgba(208, 168, 255, 0.4);
            --bg: #05040a; 
            --card: rgba(30, 25, 45, 0.95); 
            --glass-border: rgba(255, 255, 255, 0.08); 
            --love: #ff4b6e; 
            --love-glow: rgba(255, 75, 110, 0.4);
            --check: #00d2ff; 
            --text-sub: #b3b3b3; 
            --online: #25D366;
            --gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bubble-me: linear-gradient(135deg, #d0a8ff 0%, #a66cfb 100%);
            --notif-vibrant: #00e5ff;
            --notif-glow: rgba(0, 225, 255, 0.25);
        }
        
        html, body { 
            margin: 0; 
            padding: 0; 
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: white; 
            background-size: cover; 
            background-position: center; 
            transition: background 0.5s ease;
        }

        .masquer-texte { -webkit-text-security: disc; }
        .pwd-wrapper { position: relative; width: 100%; }
        .pwd-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); cursor: pointer; padding: 5px; z-index: 5; transition: 0.2s; }
        .pwd-eye:active { color: var(--accent); transform: translateY(-50%) scale(0.9); }

        .stellar-dust-particle {
            position: fixed; width: 4px; height: 4px; background: var(--accent); border-radius: 50%;
            pointer-events: none; z-index: 100000; box-shadow: 0 0 8px var(--accent), 0 0 12px white;
            animation: dustAnim 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes dustAnim { 0% { transform: translate(0, 0) scale(1.5); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

        /* styles truncated for brevity in commit message */
    </style>
</head>
