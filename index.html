<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Histoire 💖</title>
    <style>
        :root {
            --accent: #ff7eb9;
            --gradient: linear-gradient(135deg, #ff7eb9 0%, #ffc1e3 100%);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            overflow: hidden;
        }

        /* Fond avec dégradé doux et image */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at top right, rgba(255, 126, 185, 0.2), transparent),
                radial-gradient(circle at bottom left, rgba(122, 252, 255, 0.1), transparent),
                url('94a99c728e9fab72bb967717213d2490.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.7);
            z-index: -1;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            padding: 40px 25px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #profilePic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            margin: -85px auto 20px auto;
            display: none;
            box-shadow: 0 10px 20px rgba(255, 126, 185, 0.4);
        }

        h1 { font-size: 26px; margin: 5px 0; color: white; font-weight: 600; }
        p { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 20px; }

        .days-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .days-count {
            display: block;
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: var(--gradient);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 8px 15px rgba(255, 126, 185, 0.3);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(255, 126, 185, 0.4); }
        button:active { transform: scale(0.96); }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 13px;
            font-weight: 400;
            margin-top: 10px;
            box-shadow: none;
        }

        input[type="date"] {
            width: 80%;
            padding: 12px;
            border-radius: 15px;
            border: none;
            background: rgba(255,255,255,0.9);
            margin-bottom: 15px;
            font-family: inherit;
        }

        .heart {
            position: fixed;
            top: -10%;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1000;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="card">
    <img id="profilePic" src="" alt="Notre Photo">

    <div id="selection">
        <h1>Coucou ! ✨</h1>
        <p>Qui se connecte aujourd'hui ?</p>
        <button onclick="start('Lui')">🙋‍♂️ C'est Lui</button>
        <button onclick="start('Elle')">🙋‍♀️ C'est Elle</button>
    </div>

    <div id="main" style="display:none;">
        <h1 id="welcomeTitle">💖 Nous</h1>
        <div class="days-container">
            <span class="days-count" id="dayValue">0</span>
            <span style="font-size: 14px; opacity: 0.8;">jours de bonheur 💞</span>
        </div>
        
        <button onclick="sparkleHearts()">❤️ Je pense à toi</button>
        
        <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
            <button class="btn-outline" onclick="showConfig()">⚙️ Personnaliser</button>
            <button class="btn-outline" onclick="location.reload()">↩ Changer de profil</button>
        </div>
    </div>

    <div id="config" style="display:none;">
        <h1>Réglages 💞</h1>
        <p>Modifier votre date ou votre photo</p>
        <input type="date" id="dateInput">
        <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="handlePhoto(this)">
        <button class="btn-outline" onclick="document.getElementById('photoInput').click()">📸 Choisir une photo</button>
        <button onclick="saveAll()">Enregistrer</button>
    </div>
</div>

<script>
    // Chargement initial
    const savedPhoto = localStorage.getItem("couple_img");
    if(savedPhoto) {
        const img = document.getElementById("profilePic");
        img.src = savedPhoto;
        img.style.display = "block";
    }

    function start(who) {
        document.getElementById("selection").style.display = "none";
        document.getElementById("main").style.display = "block";
        document.getElementById("welcomeTitle").innerText = who === 'Elle' ? "Ma Reine 👑" : "Salut BG ⚡";
        checkData();
    }

    function handlePhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem("couple_img", e.target.result);
                document.getElementById("profilePic").src = e.target.result;
                document.getElementById("profilePic").style.display = "block";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveAll() {
        const date = document.getElementById("dateInput").value;
        if(date) localStorage.setItem("couple_date", date);
        document.getElementById("config").style.display = "none";
        document.getElementById("main").style.display = "block";
        checkData();
    }

    function checkData() {
        const date = localStorage.getItem("couple_date");
        if(!date) {
            showConfig();
        } else {
            const diff = Math.floor((new Date() - new Date(date)) / 86400000);
            document.getElementById("dayValue").innerText = diff;
        }
    }

    function showConfig() {
        document.getElementById("main").style.display = "none";
        document.getElementById("config").style.display = "block";
    }

    function sparkleHearts() {
        for (let i = 0; i < 35; i++) {
            setTimeout(() => {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerText = ['❤️', '💖', '💕', '✨', '🌸'][Math.floor(Math.random() * 5)];
                h.style.left = Math.random() * 100 + "vw";
                h.style.fontSize = (Math.random() * 20 + 20) + "px";
                h.style.animationDuration = (Math.random() * 2 + 3) + "s";
                h.style.opacity = Math.random();
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, i * 100);
        }
    }
</script>
</body>
</html>
