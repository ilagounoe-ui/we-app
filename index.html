<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre Univers v.35</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>

:root{
--accent:#bb86fc;
--bg:#0f0c29;
--card:rgba(255,255,255,0.08);
--love:#ff4b6e;
--text-sub:#b3b3b3;
}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
color:white;
height:100vh;
overflow:hidden;
}

/* messages */

.msg-area{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:8px;
}

.bubble{
padding:10px 15px;
border-radius:20px;
max-width:75%;
font-size:14px;
}

.m-me{
align-self:flex-end;
background:var(--accent);
color:black;
}

.m-they{
align-self:flex-start;
background:var(--card);
}

.msg-meta{
font-size:9px;
margin-top:4px;
opacity:0.7;
}

</style>
</head>

<body>

<div id="chatBox">

<div class="head">
<span onclick="closeO('chatBox')">←</span>
<b id="cName"></b>
</div>

<div class="msg-area" id="mArea"></div>

<div id="replyPreview" style="display:none;padding:8px 15px;font-size:12px;background:rgba(255,255,255,0.05);">
<span id="replyText"></span>
<span onclick="cancelReply()" style="float:right">✖</span>
</div>

<div style="padding:15px;display:flex;gap:10px;">
<input type="text" id="mIn" style="flex:1;background:var(--card);border:none;padding:12px;border-radius:20px;color:white;">
<button onclick="send('msgs')" style="background:var(--accent);border:none;width:45px;border-radius:50%">➔</button>
</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs",
databaseURL:"https://notre-univers-d71a3-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=JSON.parse(localStorage.getItem("nu_v33_user"));

let activeId=null;

let replyTo=null;
let editMsgId=null;

let pinnedChats=JSON.parse(localStorage.getItem("nu_pinned")||"[]");
let blockedUsers=JSON.parse(localStorage.getItem("nu_blocked")||"[]");

let holdTimer;

/* ouvrir chat */

function openChat(id,name){

activeId=[user.id,id].sort().join("_");

document.getElementById("cName").innerText=name;

document.getElementById("chatBox").style.display="flex";

sync("msgs",activeId,"mArea");

}

/* synchronisation messages */

function sync(path,target,areaId){

db.ref(path+"/"+target).on("value",s=>{

const area=document.getElementById(areaId);

area.innerHTML="";

s.forEach(snap=>{

const m=snap.val();
const id=snap.key;

const isMe=m.sid===user.id;

const time=new Date(m.t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});

let replyHTML="";

if(m.reply){

replyHTML=`
<div style="font-size:11px;opacity:0.6;border-left:2px solid var(--accent);padding-left:5px;margin-bottom:3px;">
${m.reply}
</div>`;

}

area.innerHTML+=`

<div class="bubble ${isMe?"m-me":"m-they"}"

oncontextmenu="openMsgMenu('${id}','${m.txt}')"

ontouchstart="holdMsg(event,'${id}','${m.txt}')">

${replyHTML}

${m.txt}

<div class="msg-meta">

${time}

${isMe?"✓✓":""}

</div>

</div>

`;

});

area.scrollTop=area.scrollHeight;

});

}

/* envoyer message */

function send(path){

const inp=document.getElementById("mIn");

const target=activeId;

if(!inp.value.trim())return;

if(editMsgId){

db.ref(path+"/"+target+"/"+editMsgId).update({

txt:inp.value.trim()

});

editMsgId=null;

}else{

db.ref(path+"/"+target).push({

sid:user.id,

txt:inp.value.trim(),

reply:replyTo,

t:Date.now()

});

}

replyTo=null;

document.getElementById("replyPreview").style.display="none";

inp.value="";

}

/* appui long */

function holdMsg(e,id,text){

holdTimer=setTimeout(()=>{

openMsgMenu(id,text);

},600);

}

document.addEventListener("touchend",()=>{

clearTimeout(holdTimer);

});

/* menu message */

function openMsgMenu(id,text){

const choice=prompt(

"1 Répondre\n2 Modifier\n3 Supprimer"

);

if(choice=="1"){

replyTo=text;

document.getElementById("replyPreview").style.display="block";

document.getElementById("replyText").innerText=text;

}

if(choice=="2"){

editMsgId=id;

document.getElementById("mIn").value=text;

}

if(choice=="3"){

db.ref("msgs/"+activeId+"/"+id).remove();

}

}

/* annuler réponse */

function cancelReply(){

replyTo=null;

document.getElementById("replyPreview").style.display="none";

}

/* menu conversation */

function chatMenu(id){

const choice=prompt(

"1 Supprimer\n2 Bloquer\n3 Épingler"

);

if(choice=="1"){

const chatId=[user.id,id].sort().join("_");

db.ref("msgs/"+chatId).remove();

}

if(choice=="2"){

blockedUsers.push(id);

localStorage.setItem("nu_blocked",JSON.stringify(blockedUsers));

}

if(choice=="3"){

pinnedChats.push(id);

localStorage.setItem("nu_pinned",JSON.stringify(pinnedChats));

}

}

/* fermer */

function closeO(id){

document.getElementById(id).style.display="none";

}

</script>

</body>
</html>
