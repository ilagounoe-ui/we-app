<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.15</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --wa-green: #25D366; --soft-pink: #ffafbd; --love-pink: #ff4b6e;
            --bg-mignon: #fff5f7; --text-dark: #4a4a4a; --panel-bg: #ffffff;
            --bubble-me: #ffdae0; --bubble-them: #ffffff;
        }
        
        body { 
            margin: 0; font-family: 'Quicksand', sans-serif; 
            background: var(--bg-mignon); color: var(--text-dark); 
            height: 100vh; overflow: hidden; 
        }

        /* --- AUTHENTIFICATION DOUCE --- */
        #authLayer { position: fixed; inset:0; background: linear-gradient(to bottom, var(--soft-pink), #ffc3a0); z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 340px; text-align: center; background: white; padding: 40px 25px; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .auth-card h1 { font-family: 'Pacifico', cursive; color: var(--love-pink); font-size: 32px; margin-bottom: 30px; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: #f0f0f0; border-radius: 20px; padding: 5px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 15px; font-weight: 700; color: #888; transition: 0.3s; }
        .auth-tab.active { background: white; color: var(--love-pink); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .auth-card input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #ffeef0; background: #fff9fa; box-sizing: border-box; outline: none; font-size: 16px; font-family: inherit; }

        /* --- STRUCTURE STYLE WHATSAPP --- */
        .header { background: white; padding: 50px 20px 15px; border-bottom: 1px solid #ffeef0; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; color: var(--love-pink); font-family: 'Pacifico', cursive; margin: 0; }
        
        .view { height: calc(100vh - 135px); overflow-y: auto; display: none; padding-bottom: 90px; }
        .view-active { display: block; }

        /* --- LISTE DE DISCUSSIONS --- */
        .chat-item { display: flex; padding: 15px 20px; align-items: center; border-bottom: 1px solid #fff0f3; cursor: pointer; transition: 0.2s; }
        .chat-item:active { background: #fff0f3; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .chat-info { flex: 1; }
        .chat-info b { font-size: 17px; color: #333; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #2ecc71; }
        .offline { background: #bdc3c7; }

        /* --- MESSAGES MIGNONS --- */
        .msg-container { display: flex; flex-direction: column; padding: 15px; gap: 8px; background: #fff9fa; height: calc(100vh - 215px); overflow-y: auto; }
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 75%; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); line-height: 1.4; }
        .mine { align-self: flex-end; background: var(--bubble-me); border-bottom-right-radius: 5px; color: #5a3e44; }
        .theirs { align-self: flex-start; background: var(--bubble-them); border-bottom-left-radius: 5px; color: #4a4a4a; }
        .m-meta { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }
        .seen { color: #3498db; margin-left: 3px; }

        /* --- PARAMÈTRES RÉELS (STYLE WHATSAPP) --- */
        .profile-section { text-align: center; padding: 30px 20px; background: white; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; margin-bottom: 20px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--soft-pink); margin-bottom: 10px; }
        .settings-list { padding: 0 20px; }
        .setting-item { background: white; padding: 15px 20px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .setting-icon { font-size: 20px; }
        .setting-label { flex: 1; font-weight: 600; }

        /* --- NAVIGATION --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ffeef0; }
        .nav-tab { color: #bbb; text-align: center; font-weight: 600; font-size: 11px; cursor: pointer; }
        .nav-tab.active { color: var(--love-pink); }
        .nav-tab span { font-size: 24px; display: block; margin-bottom: 3px; }

        /* --- INPUT AREA --- */
        .input-area { background: white; padding: 15px; display: flex; align-items: center; gap: 10px; position: fixed; bottom: 75px; width: 100%; box-sizing: border-box; }
        .input-area input { flex: 1; background: #fdf2f4; border: none; padding: 12px 20px; border-radius: 25px; outline: none; font-family: inherit; }
        .send-btn { background: var(--love-pink); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .btn-logout { color: var(--love-pink); font-weight: 700; margin-top: 20px; display: block; text-align: center; }
        #friendOverlay { position: fixed; inset: 0; background: var(--bg-mignon); z-index: 10000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="authLayer">
    <div class="auth-card">
        <h1>Notre Univers</h1>
        <div class="auth-tabs">
            <div id="tabLogin" class="auth-tab active" onclick="setAuthMode('login')">Connexion</div>
            <div id="tabSignup" class="auth-tab" onclick="setAuthMode('signup')">S'inscrire</div>
        </div>
        <input type="text" id="aName" placeholder="Ton Surnom">
        <input type="password" id="aPass" placeholder="Ton mot de passe">
        <button onclick="handleAuth()" class="send-btn" style="width:100%; border-radius:20px; font-weight:700;">COMMENCER</button>
    </div>
</div>

<div id="app" style="display:none;">
    
    <div id="vChats" class="view view-active">
        <div class="header"><h1>Discussions</h1></div>
        <div id="chatList"></div>
    </div>

    <div id="vCocon" class="view">
        <div class="header"><h1>Cocon Privé</h1></div>
        <div id="coconLock" style="text-align:center; padding-top:100px;">
            <span style="font-size:60px;">🗝️</span>
            <p style="font-weight:600; margin: 20px 0;">Entrez votre code secret</p>
            <input type="password" id="unlockCode" style="width:200px; text-align:center; padding:12px; border-radius:15px; border:1px solid var(--soft-pink); outline:none;">
            <br><br>
            <button class="send-btn" style="width:150px; border-radius:15px; margin:0 auto;" onclick="openCocon()">OUVRIR</button>
        </div>
        <div id="coconRoom" style="display:none;">
            <div id="cBox" class="msg-container"></div>
            <div class="input-area">
                <input type="text" id="cInput" placeholder="Message doux...">
                <button class="send-btn" onclick="sendCoconMsg()">💖</button>
            </div>
        </div>
    </div>

    <div id="vSettings" class="view">
        <div class="header"><h1>Réglages</h1></div>
        <div class="profile-section">
            <img id="myAvatar" src="" class="profile-avatar">
            <h2 id="myName" style="margin:10px 0 5px;">Surnom</h2>
            <p id="myStatus" style="font-size:13px; color:#888; margin:0;">Occupé(e)</p>
        </div>
        <div class="settings-list">
            <div class="setting-item" onclick="changePfp()">
                <span class="setting-icon">📸</span>
                <span class="setting-label">Changer ma photo</span>
            </div>
            <div class="setting-item" onclick="changeCode()">
                <span class="setting-icon">🔐</span>
                <span class="setting-label">Code du Cocon</span>
            </div>
            <div class="setting-item">
                <span class="setting-icon">🔔</span>
                <span class="setting-label">Notifications</span>
            </div>
            <a href="#" class="btn-logout" onclick="logout()">Se déconnecter</a>
        </div>
    </div>

    <nav class="bottom-nav">
        <div id="tabChats" class="nav-tab active" onclick="showV('vChats', this)"><span>💬</span>Chats</div>
        <div id="tabCocon" class="nav-tab" onclick="showV('vCocon', this)"><span>🌸</span>Cocon</div>
        <div id="tabSettings" class="nav-tab" onclick="showV('vSettings', this)"><span>⚙️</span>Profil</div>
    </nav>
</div>

<div id="friendOverlay">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <span onclick="closeFriend()" style="font-size:24px; cursor:pointer;">←</span>
            <img id="fAvatar" src="" class="avatar" style="width:35px; height:35px; margin:0;">
            <div><b id="fName">Ami</b><br><span id="fOnline" style="font-size:10px; color:#2ecc71;">En ligne</span></div>
        </div>
    </div>
    <div id="fBox" class="msg-container"></div>
    <div class="input-area" style="bottom:0;">
        <input type="text" id="fInput" placeholder="Ecrire...">
        <button class="send-btn" onclick="sendFriendMsg()">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v15_user'));
    let currentFriendId = null;
    let authMode = 'login';

    function setAuthMode(m) { authMode = m; document.getElementById('tabLogin').classList.toggle('active', m==='login'); document.getElementById('tabSignup').classList.toggle('active', m==='signup'); }

    async function handleAuth() {
        const n = document.getElementById('aName').value.trim();
        const p = document.getElementById('aPass').value;
        if(!n || !p) return;
        const s = await db.ref('users').orderByChild('name').equalTo(n).once('value');
        if(authMode === 'login') {
            if(s.exists()){
                const u = Object.values(s.val())[0];
                if(u.pass === p) connect(u); else alert("Pass incorrect");
            } else alert("Inconnu");
        } else {
            if(s.exists()) alert("Existe déjà");
            else {
                const nu = { id:'u'+Date.now(), name:n, pass:p, pfp:'https://ui-avatars.com/api/?name='+n+'&background=random', code:'1234', online:true };
                await db.ref('users/'+nu.id).set(nu); connect(nu);
            }
        }
    }

    function connect(u) {
        user = u; localStorage.setItem('nu_v15_user', JSON.stringify(u));
        document.getElementById('authLayer').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        db.ref('users/'+user.id).update({online: true});
        window.onbeforeunload = () => db.ref('users/'+user.id).update({online: false});
        initApp();
    }

    function initApp() {
        document.getElementById('myName').innerText = user.name;
        document.getElementById('myAvatar').src = user.pfp;
        loadUserList();
    }

    function loadUserList() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                const u = snap.val(); if(u.id === user.id) return;
                list.innerHTML += `
                    <div class="chat-item" onclick="openFriend('${u.id}', '${u.name}', '${u.pfp}')">
                        <img src="${u.pfp}" class="avatar">
                        <div class="chat-info">
                            <b>${u.name}</b><br>
                            <span class="status-dot ${u.online?'online':'offline'}"></span>
                            <small>${u.online?'En ligne':'Hors ligne'}</small>
                        </div>
                    </div>`;
            });
        });
    }

    function showV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.getElementById(id).classList.add('view-active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if(id !== 'vCocon') {
            document.getElementById('coconLock').style.display = 'block';
            document.getElementById('coconRoom').style.display = 'none';
        }
    }

    function openFriend(id, name, pfp) {
        currentFriendId = [user.id, id].sort().join('_');
        document.getElementById('fName').innerText = name;
        document.getElementById('fAvatar').src = pfp;
        document.getElementById('friendOverlay').style.display = 'flex';
        db.ref('chats/'+currentFriendId).on('value', s => {
            const b = document.getElementById('fBox'); b.innerHTML = "";
            s.forEach(snap => { const m = snap.val(); renderM(b, m, m.sid === user.id); });
            b.scrollTop = b.scrollHeight;
        });
    }

    function renderM(b, m, mine) {
        const t = new Date(m.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        b.innerHTML += `<div class="bubble ${mine?'mine':'theirs'}">${m.txt}<div class="m-meta">${t}</div></div>`;
    }

    function sendFriendMsg() {
        const i = document.getElementById('fInput'); if(!i.value.trim()) return;
        db.ref('chats/'+currentFriendId).push({sid:user.id, txt:i.value.trim(), t:Date.now()});
        i.value = "";
    }

    function openCocon() {
        if(document.getElementById('unlockCode').value === user.code) {
            document.getElementById('coconLock').style.display = 'none';
            document.getElementById('coconRoom').style.display = 'block';
            db.ref('cocon/'+user.code).on('value', s => {
                const b = document.getElementById('cBox'); b.innerHTML = "";
                s.forEach(snap => { const m = snap.val(); renderM(b, m, m.sid === user.id); });
                b.scrollTop = b.scrollHeight;
            });
        } else alert("Mauvais code !");
    }

    function closeFriend() { document.getElementById('friendOverlay').style.display='none'; }
    function logout() { db.ref('users/'+user.id).update({online: false}); localStorage.clear(); location.reload(); }

    function changePfp() { const p = prompt("URL de ta nouvelle photo :"); if(p) { db.ref('users/'+user.id).update({pfp:p}); user.pfp = p; initApp(); } }
    function changeCode() { const c = prompt("Nouveau code secret :"); if(c) { db.ref('users/'+user.id).update({code:c}); user.code = c; } }
</script>
</body>
</html>
