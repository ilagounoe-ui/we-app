<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v41.2 - Ultra</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        :root { 
            --accent: #ff4b6e; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --text-sub: #b3b3b3; 
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-size: cover; background-position: center; transition: 0.5s; }
        
        /* Splash & Loader */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .loader { width: 45px; height: 45px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Navigation */
        .main-header { padding: 50px 20px 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 10px; padding: 10px 20px; background: rgba(0,0,0,0.2); }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 20px; font-size: 13px; background: var(--card); transition: 0.3s; opacity: 0.6; }
        .tab.active { background: var(--accent); color: white; opacity: 1; font-weight: bold; transform: scale(1.05); }

        /* Views */
        .view { display: none; padding: 20px; height: calc(100vh - 190px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Contacts & Menu Options */
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #2a2a40; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .opt-dots { margin-left: auto; padding: 10px; font-size: 22px; color: var(--accent); cursor: pointer; }
        
        /* Dropdown Menu */
        .drop-menu { position: absolute; right: 20px; top: 55px; background: #1a1a2e; border: 1px solid var(--accent); border-radius: 15px; z-index: 500; display: none; min-width: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .drop-item { padding: 12px 15px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); color: white; }
        .drop-item:last-child { border: none; color: var(--love); }

        /* Chat Boxes */
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; position: relative; line-height: 1.4; }
        .m-me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        
        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 30px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: white; margin: 10px 0; box-sizing: border-box; text-align: center; }
        .option-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 18px; border: none; background: var(--accent); color: white; font-weight: 600; }

        .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 10px 25px rgba(255,75,110,0.3); }
        #vWidgetFull { display:none; position:fixed; inset:0; background:var(--bg); z-index:30000; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
    </style>
</head>
<body onclick="closeAllMenus()">

<div id="splash"><div class="loader"></div><h2 style="font-family:'Pacifico'; color:var(--accent); margin-top:20px;">Notre Univers</h2></div>

<div id="vWidgetFull">
    <div style="font-family:'Pacifico'; color:var(--love); font-size:28px; margin-bottom:20px;">L'Univers te murmure...</div>
    <div id="widgetText" style="font-size:19px; line-height:1.6; color:white; background:var(--card); padding:30px; border-radius:35px; border:2px solid var(--love); width:85%;">...</div>
    <button onclick="document.getElementById('vWidgetFull').style.display='none'" class="option-btn" style="width:150px; margin-top:30px; background:var(--card)">Retour</button>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--accent); margin:0 0 15px 0;">...</h3>
        <div id="modalBody"></div>
        <div id="modalActions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" style="background:var(--card)" onclick="closeModal()">Annuler</button>
            <button class="option-btn" id="modalConfirmBtn">OK</button>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div id="uInitial" style="background:var(--card); width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold;">..</div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
        <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
        <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
    </div>

    <div id="vChats" class="view active">
        <div id="chatList"></div>
        <div class="fab" onclick="addFriend()">+</div>
    </div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:30px; border-radius:35px; text-align:center; margin-bottom:25px;">
            <div style="font-size:45px">💑</div>
            <h3 style="margin:10px 0">Unis depuis <span id="d-day">0</span> jours</h3>
        </div>
        <button onclick="askCoconCode()" class="option-btn" style="height:80px; background:rgba(255,255,255,0.05); border:2px dashed var(--love); color:var(--love);">💖 OUVRIR LE COCON</button>
        
        <h4 style="margin-top:30px; opacity:0.8;">Besoin de réconfort ?</h4>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="tab" style="padding:25px; font-size:24px;" onclick="getSweet('sad')">😢</div>
            <div class="tab" style="padding:25px; font-size:24px;" onclick="getSweet('love')">🥰</div>
            <div class="tab" style="padding:25px; font-size:24px;" onclick="getSweet('need')">🫂</div>
            <div class="tab" style="padding:25px; font-size:24px;" onclick="getSweet('happy')">✨</div>
        </div>
    </div>

    <div id="vSet" class="view">
        <center>
            <div id="pfpPreview" class="contact-pfp" style="width:110px; height:110px; border:3px solid var(--accent); font-size:40px;">👤</div>
            <button class="option-btn" style="width:200px; font-size:12px; background:var(--card);" onclick="document.getElementById('pfpInput').click()">Changer ma photo</button>
            <input type="file" id="pfpInput" hidden accept="image/*" onchange="handlePfp(event)">
        </center>

        <div style="margin-top:25px; background:var(--card); padding:20px; border-radius:30px;">
            <label style="font-size:11px; opacity:0.5; margin-left:10px;">MES INFORMATIONS</label>
            <input type="text" id="setPseudo" class="modal-input" placeholder="Mon Pseudo">
            <input type="date" id="setDate" class="modal-input">
            <input type="text" id="setCode" class="modal-input" placeholder="Code Secret Cocon">
            <input type="text" id="setPartner" class="modal-input" placeholder="Pseudo du Partenaire">
        </div>

        <button class="option-btn" onclick="saveAll()" style="margin-top:20px; height:60px; font-size:16px;">ENREGISTRER TOUT</button>
        <button class="option-btn" onclick="showInfo()" style="background:var(--card); color:var(--accent);">ℹ️ Infos Compte</button>
        <center><p onclick="logout()" style="color:var(--love); margin-top:30px; font-weight:bold; font-size:14px;">Déconnexion</p></center>
    </div>
</div>

<div id="chatBox">
    <div class="head"><span onclick="closeChat()" style="font-size:26px;">←</span><b id="cName">...</b></div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.3);">
        <input type="text" id="mIn" placeholder="Écris ici..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;">
        <button onclick="send('msgs')" style="background:var(--accent); border:none; width:50px; height:50px; border-radius:50%; font-size:20px; color:white;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="head" style="background:var(--love)"><span onclick="closeCocon()" style="font-size:26px;">←</span><b>🌹 Notre Cocon Privé</b></div>
    <div class="msg-area" id="coArea"></div>
    <div style="padding:15px; display:flex; gap:10px;">
        <input type="text" id="coIn" placeholder="Message secret..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;">
        <button onclick="send('cocon')" style="background:var(--love); border:none; width:50px; height:50px; border-radius:50%; font-size:20px; color:white;">➔</button>
    </div>
</div>

<script>
    // --- FIREBASE INIT ---
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v41_user'));
    let activeId = null;
    let activePath = null;

    // --- NAVIGATION ---
    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function openChat(id, name) {
        activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display = 'flex';
        sync('msgs', activeId, 'mArea');
    }
    function closeChat() { document.getElementById('chatBox').style.display='none'; if(activePath) db.ref(activePath).off(); }

    function openCoconPrivé() {
        if(user.code) {
            document.getElementById('coconBox').style.display='flex';
            sync('cocon', user.code, 'coArea');
        } else alert("Configure ton code dans les réglages !");
    }
    function closeCocon() { document.getElementById('coconBox').style.display='none'; if(activePath) db.ref(activePath).off(); }

    // --- GESTION DES OPTIONS (LES 3 POINTS) ---
    function openMenu(e, id) {
        e.stopPropagation();
        closeAllMenus();
        document.getElementById('menu_'+id).style.display = 'block';
    }
    function closeAllMenus() { document.querySelectorAll('.drop-menu').forEach(m => m.style.display='none'); }

    function clearChat(id) { if(confirm("Effacer tous les messages ?")) db.ref('msgs/'+[user.id, id].sort().join('_')).remove(); }
    function blockUser(id) { if(confirm("Bloquer ce contact ?")) db.ref('users/'+user.id+'/blocked/'+id).set(true); }

    // --- SYNC & SEND ---
    function sync(path, target, areaId) {
        if(activePath) db.ref(activePath).off();
        activePath = path + '/' + target;
        const area = document.getElementById(areaId);
        db.ref(activePath).limitToLast(30).on('value', s => {
            area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                const isMe = m.sid === user.id;
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">${m.txt}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function send(mode) {
        const inp = mode === 'msgs' ? document.getElementById('mIn') : document.getElementById('coIn');
        if(!inp.value.trim()) return;
        const p = mode === 'msgs' ? 'msgs/'+activeId : 'cocon/'+user.code;
        db.ref(p).push({ sid: user.id, txt: inp.value, t: Date.now() });
        inp.value = "";
    }

    // --- MOTS DOUX (TES PHRASES) ---
    function getSweet(mood) {
        const words = {
            sad: ["Ferme les yeux, je te serre très fort contre mon cœur. 🫂", "Je suis là, je ne te lâche pas. Ta peine est la mienne.", "Respire doucement, mon amour. Je t'aime."],
            love: ["Tu es mon plus beau cadeau du ciel. ✨", "Chaque seconde avec toi est un trésor.", "Je t'aime plus que l'Univers lui-même."],
            need: ["J'arrive avec des câlins infinis ! 🏃‍♂️💨", "Quoi qu'il arrive, je suis ton refuge.", "T'es jamais seule, je suis juste là."],
            happy: ["Ton sourire illumine ma vie ! 🌟", "Continue de briller, t'es merveilleuse.", "Je suis si fier de toi !"]
        };
        const list = words[mood];
        document.getElementById('widgetText').innerText = list[Math.floor(Math.random()*list.length)];
        document.getElementById('vWidgetFull').style.display = 'flex';
    }

    // --- RÉGLAGES ---
    function saveAll() {
        const up = { 
            pseudo: document.getElementById('setPseudo').value,
            startDate: document.getElementById('setDate').value,
            code: document.getElementById('setCode').value,
            partner: document.getElementById('setPartner').value
        };
        db.ref('users/'+user.id).update(up).then(() => {
            alert("Tout est enregistré ! ✨");
            localStorage.setItem('nu_v41_user', JSON.stringify({...user, ...up}));
            location.reload();
        });
    }

    function showInfo() {
        const info = `
            <div style="text-align:left; font-size:13px; line-height:2;">
                <b>Pseudo :</b> ${user.pseudo}<br>
                <b>ID Compte :</b> ${user.id}<br>
                <b>Code Cocon :</b> ${user.code || "Aucun"}<br>
                <b>Ensemble depuis :</b> ${user.startDate || "Non défini"}
            </div>
        `;
        openModal("Fiche Compte", info, null);
    }

    // --- UI HELPERS ---
    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display = 'flex';
        document.getElementById('modalConfirmBtn').onclick = () => { if(a) a(); closeModal(); };
        document.getElementById('modalActions').style.display = a ? 'flex' : 'none';
    }
    function closeModal() { document.getElementById('customModal').style.display='none'; }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val(); if(!u) return;
                    list.innerHTML += `
                        <div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}')">
                            <div class="contact-pfp">${(u.pseudo||"U")[0]}</div>
                            <b>${u.pseudo}</b>
                            <div class="opt-dots" onclick="openMenu(event, '${u.id}')">⋮</div>
                            <div class="drop-menu" id="menu_${u.id}">
                                <div class="drop-item" onclick="clearChat('${u.id}')">🧹 Vider le chat</div>
                                <div class="drop-item" onclick="blockUser('${u.id}')">🚫 Bloquer</div>
                            </div>
                        </div>`;
                });
            });
        });
    }

    window.onload = () => {
        if(user) {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash').style.display='none'; }, 500);
            document.getElementById('mainApp').style.display='block';
            document.getElementById('uNameDisp').innerText = user.pseudo;
            document.getElementById('uInitial').innerText = user.pseudo[0].toUpperCase();
            
            // Pré-remplir les réglages
            document.getElementById('setPseudo').value = user.pseudo || "";
            document.getElementById('setDate').value = user.startDate || "";
            document.getElementById('setCode').value = user.code || "";
            document.getElementById('setPartner').value = user.partner || "";
            
            if(user.startDate) {
                const diff = Math.floor((new Date() - new Date(user.startDate)) / (1000*60*60*24));
                document.getElementById('d-day').innerText = diff;
            }
            loadContacts();
        }
    };
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
