<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nous 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-size: cover;
  background-position: center;
  font-family: Arial, sans-serif;
  color: white;
  transition: background 1s ease;
}

body::before {
  content: "";
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background-size: cover;
  background-position: center;
  filter: blur(5px) brightness(0.7);
  z-index: -1;
  transition: background-image 1s ease;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:85%;
  max-width:350px;
  box-shadow:0 0 20px rgba(255,0,128,0.3);
  position: relative;
  z-index: 1;
}

h1{ margin-top:0; font-size:26px; }

button{
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:#ff4da6;
  color:white;
  margin-top:15px;
  cursor:pointer;
  transition:0.3s;
  width: 100%;
}

.secondary{ background:gray; }

.days{ font-size:20px; margin:20px 0; }

.profile-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">

  <div id="selection">
    <h1>Qui est-ce ? ✨</h1>
    <button class="profile-btn" onclick="ouvrirSite('Lui')">🙋‍♂️ C'est Lui</button>
    <button class="profile-btn" onclick="ouvrirSite('Elle')">🙋‍♀️ C'est Elle</button>
  </div>

  <div id="contenu" style="display:none;">
    <h1 id="titreBienvenue">💖 Nous</h1>
    <p id="petitMessage"></p>

    <div id="setup" style="display:none;">
      <p>Choisis notre date 💞</p>
      <input type="date" id="dateInput" style="padding:10px; border-radius:10px;">
      <br>
      <button onclick="saveDate()">Enregistrer</button>
    </div>

    <div id="main">
      <p class="days" id="days"></p>
      <button onclick="love()">❤️ Je pense à toi</button>
      <br>
      <button class="secondary" onclick="editDate()">🔄 Modifier la date</button>
      <br>
      <button class="secondary" style="margin-top:5px; font-size:12px;" onclick="changerFond()">🌸 Changer le fond</button>
      <br>
      <button class="secondary" style="margin-top:5px; font-size:12px;" onclick="location.reload()">↩ Changer de profil</button>
      <br><br>
      <!-- Lecteur Spotify -->
      <iframe src="https://open.spotify.com/embed/track/1cek46u96NSWBTwqOTayTO" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
    </div>
  </div>

</div>

<script>
// Table des fonds
const fonds = [
  '94a99c728e9fab72bb967717213d2490.jpg', / nuit
  'a57e1c7c289e7753975d60a58fb6f6df.jpg' / jour
];
let indexFond = 0;

function changerFond(){
  indexFond = (indexFond + 1) % fonds.length;
  document.body.style.backgroundImage = `url('${fonds[indexFond]}')`;
  document.body.style.transition = "background 1s ease";
  document.querySelector('body::before');
  document.querySelector('body::before').style.backgroundImage = `url('${fonds[indexFond]}')`;
}

// Fond initial via pseudo-element pour effet flou
function setFondInitial(){
  document.body.style.backgroundImage = `url('${fonds[indexFond]}')`;
  const before = document.createElement('style');
  before.innerHTML = `body::before { background-image: url('${fonds[indexFond]}'); }`;
  document.head.appendChild(before);
}

setFondInitial();

function ouvrirSite(qui) {
    document.getElementById("selection").style.display = "none";
    document.getElementById("contenu").style.display = "block";
    
    const message = document.getElementById("petitMessage");
    const titre = document.getElementById("titreBienvenue");

    if(qui === 'Elle') {
        titre.innerText = "Coucou ma Reine 👑";
        message.innerText = "Ravi de te revoir !";
    } else {
        titre.innerText = "Salut BG ⚡";
        message.innerText = "Prêt pour une nouvelle journée ?";
    }

    showMain();
}

function calculateDays(dateString){
  let startDate = new Date(dateString);
  let today = new Date();
  let difference = today - startDate;
  return Math.floor(difference / (1000 * 60 * 60 * 24));
}

function saveDate(){
  let date = document.getElementById("dateInput").value;
  if(date){
    localStorage.setItem("coupleDate", date);
    showMain();
  }
}

function editDate(){
  document.getElementById("main").style.display = "none";
  document.getElementById("setup").style.display = "block";
}

function showMain(){
  let savedDate = localStorage.getItem("coupleDate");
  if(savedDate){
    let days = calculateDays(savedDate);
    document.getElementById("days").innerText = "Ensemble depuis " + days + " jours 💞";
    document.getElementById("setup").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    document.getElementById("main").style.display = "none";
    document.getElementById("setup").style.display = "block";
  }
}

function love(){
  alert("Ton message a été envoyé 💘");
}
</script>

</body>
</html>
