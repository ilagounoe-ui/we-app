<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Ultimate v7.2</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff2d55; --primary: #5856d6; --bg: #050505; --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* SPLASH SCREEN ELITE */
        #splash { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        .loader-logo { font-size: 50px; font-weight: 800; letter-spacing: -3px; background: linear-gradient(45deg, var(--accent), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 2s infinite; }

        /* DESIGN GLASSMORPHISM */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .app-shell { height: 100vh; display: flex; flex-direction: column; display: none; }
        .top-nav { padding: 50px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 120px; }
        .view-active { display: block; animation: slideUp 0.5s cubic-bezier(0.1, 0.9, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* MESSAGES & HEURE */
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 15px; border-radius: 30px; }
        .bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
        .mine { align-self: flex-end; align-items: flex-end; }
        .theirs { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 14px 18px; border-radius: 22px; font-size: 15px; line-height: 1.4; }
        .mine .bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: var(--card); border-bottom-left-radius: 4px; }
        .m-time { font-size: 9px; opacity: 0.3; margin-top: 4px; padding: 0 5px; }

        /* COMPARTIMENT JEUX */
        .game-shelf { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .game-card { flex: 0 0 110px; padding: 12px; border-radius: 18px; text-align: center; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--card); }

        /* EMOJIS FLOTTANTS */
        .floating-heart { position: fixed; bottom: 100px; font-size: 28px; animation: floatUp 2s forwards; z-index: 1000; pointer-events: none; }
        @keyframes floatUp { from { transform: translateY(0) scale(1); opacity: 1; } to { transform: translateY(-400px) scale(2.5); opacity: 0; } }

        /* INPUTS & BOUTONS */
        .btn-main { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 800; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .bottom-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 5000; }
        .nav-item { font-size: 26px; transition: 0.3s; filter: grayscale(1) opacity(0.3); }
        .nav-active { filter: grayscale(0) opacity(1); transform: translateY(-5px); }
    </style>
</head>
<body>

<div id="splash">
    <div class="loader-logo">NEXUS</div>
</div>

<div id="authLayer" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center; padding:30px;">
    <div class="glass" style="padding: 40px; border-radius: 45px; width: 100%; max-width: 320px; text-align: center;">
        <div style="font-size:32px; font-weight:800; margin-bottom:30px;">NEXUS</div>
        <input type="text" id="aName" placeholder="Surnom">
        <input type="password" id="aPass" placeholder="Mot de passe">
        <button class="btn-main" onclick="handleAuth()">ENTRER</button>
    </div>
</div>

<div class="app-shell" id="app">
    <div class="top-nav">
        <div style="font-weight: 800; font-size: 24px;">NEXUS</div>
        <img id="myAvatar" src="" style="width:45px; height:45px; border-radius:18px; border:2px solid var(--accent); object-fit:cover;">
    </div>

    <div id="vWorld" class="view view-active">
        <div style="display: flex; gap: 20px; margin-bottom: 25px; font-size: 14px; font-weight: 700;">
            <span onclick="setTab('chats')" id="tC" style="color:var(--accent);">DISCUSSIONS</span>
            <span onclick="setTab('disc')" id="tD" style="opacity:0.3;">DÉCOUVRIR</span>
        </div>
        <div id="listChats"></div>
        <div id="listDisc" style="display:none;"></div>
    </div>

    <div id="vCouple" class="view">
        <div id="dayCounter" style="background:linear-gradient(90deg, var(--accent), var(--primary)); padding:18px; border-radius:22px; text-align:center; font-weight:800; font-size:14px; margin-bottom:20px; box-shadow: 0 10px 20px rgba(255, 45, 85, 0.2);"></div>
        
        <div class="game-shelf">
            <div class="game-card glass" onclick="playGame('Action')">🔥 Action</div>
            <div class="game-card glass" onclick="playGame('Vérité')">👁️ Vérité</div>
            <div class="game-card glass" onclick="playGame('Défi')">🎯 Défi</div>
        </div>

        <div id="cBox" class="msg-list glass" style="height:calc(100vh - 480px);"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <input type="text" id="cInput" placeholder="Message..." style="margin:0;">
            <button onclick="sendMsg()" class="btn-main" style="width:65px;">➔</button>
        </div>
    </div>

    <div id="vSets" class="view">
        <h2 style="font-weight:800; margin-bottom:25px;">Réglages</h2>
        <div class="glass" style="padding:25px; border-radius:30px; margin-bottom:20px;">
            <input type="password" id="setCode" placeholder="Code Couple">
            <input type="date" id="setMeet">
            <button onclick="saveSets()" class="btn-main">SAUVEGARDER</button>
        </div>
        <div id="blockedList" class="glass" style="border-radius:25px; padding:15px;"></div>
        <button onclick="localStorage.clear();location.reload();" style="width:100%; background:none; border:none; color:grey; margin-top:30px; font-size:11px;">DÉCONNEXION</button>
    </div>

    <nav class="bottom-bar glass">
        <div class="nav-item nav-active" onclick="nv('vWorld', this)">🌎</div>
        <div class="nav-item" onclick="nv('vCouple', this)">❤️</div>
        <div class="nav-item" onclick="nv('vSets', this)">⚙️</div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nexus_v7_2'));

    // NOTIFICATIONS SYSTEM
    function askNotify() {
        if ("Notification" in window) {
            Notification.requestPermission();
        }
    }

    function sendNotify() {
        if (Notification.permission === "granted" && document.hidden) {
            new Notification("Nexus", {
                body: "Vous avez reçu un nouveau message",
                icon: "https://ui-avatars.com/api/?background=ff2d55&color=fff&name=N"
            });
        }
    }

    window.onload = () => { 
        setTimeout(() => { document.getElementById('splash').style.display='none'; }, 2000); 
        askNotify();
    };

    // AUTH & CORE
    async function handleAuth() {
        const n = document.getElementById('aName').value.trim().toLowerCase();
        const p = document.getElementById('aPass').value;
        const s = await db.ref('users').orderByChild('name').equalTo(n).once('value');
        if(s.exists()){
            const u = Object.values(s.val())[0];
            if(u.pass === p) login(u);
        } else {
            const nu = { id:'u'+Date.now(), name:n, pass:p, pfp:'https://ui-avatars.com/api/?name='+n, code:'', blocked:{} };
            await db.ref('users/'+nu.id).set(nu);
            login(nu);
        }
    }

    function login(u) {
        user = u;
        localStorage.setItem('nexus_v7_2', JSON.stringify(u));
        document.getElementById('authLayer').style.display='none';
        document.getElementById('app').style.display='flex';
        initApp();
    }

    if(user) login(user);

    function initApp() {
        document.getElementById('myAvatar').src = user.pfp;
        document.getElementById('setCode').value = user.code || "";
        document.getElementById('setMeet').value = user.meet || "";
        
        if(user.code) {
            db.ref('couples/'+user.code+'/chat').limitToLast(1).on('child_added', snap => {
                const m = snap.val();
                if(m.sid !== user.id && (Date.now() - m.t < 5000)) {
                    sendNotify();
                    if ("vibrate" in navigator) navigator.vibrate(80);
                }
            });

            db.ref('couples/'+user.code+'/chat').limitToLast(20).on('value', s => {
                const b = document.getElementById('cBox'); b.innerHTML = "";
                s.forEach(snap => {
                    const m = snap.val();
                    const mine = m.sid === user.id;
                    const time = new Date(m.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    b.innerHTML += `
                        <div class="bubble-wrap ${mine?'mine':'theirs'}">
                            <div class="bubble ${m.sid==='sys'?'glass':''}">${m.txt}</div>
                            <div class="m-time">${time}</div>
                        </div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
            updateCounter();
        }
        loadWorld();
    }

    function sendMsg() {
        const i = document.getElementById('cInput');
        if(!i.value || !user.code) return;
        if(i.value.includes('❤️')) spawnHeart();
        db.ref('couples/'+user.code+'/chat').push({ sid:user.id, txt:i.value, t:Date.now() });
        i.value = "";
    }

    function spawnHeart() {
        const h = document.createElement('div');
        h.className = 'floating-heart'; h.innerText = '❤️';
        h.style.left = Math.random() * 80 + 10 + '%';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 2000);
    }

    function playGame(type) {
        const list = {
            'Action': ["Fais un compliment original", "Envoie une photo de l'endroit où tu es", "Appelle-moi 1 minute"],
            'Vérité': ["Quel est ton plus beau souvenir de nous ?", "Ta plus grande qualité ?", "Ton rêve le plus fou ?"],
            'Défi': ["Le premier qui répond a gagné", "Écris un poème en 3 mots", "Ne dis pas 'non' pendant 10 min"]
        };
        const res = list[type][Math.floor(Math.random()*3)];
        db.ref('couples/'+user.code+'/chat').push({ sid:'sys', txt: `✨ ${type.toUpperCase()} : ${res}`, t:Date.now() });
    }

    function updateCounter() {
        if(!user.meet) return;
        const diff = Math.floor((new Date() - new Date(user.meet)) / (1000*60*60*24));
        document.getElementById('dayCounter').innerText = `✨ ${diff} JOURS DE BONHEUR ✨`;
    }

    function loadWorld() {
        db.ref('users').on('value', s => {
            const d = document.getElementById('listDisc'); const bList = document.getElementById('blockedList');
            d.innerHTML = ""; bList.innerHTML = "";
            s.forEach(snap => {
                const u = snap.val();
                if(u.id === user.id) return;
                if(user.blocked && user.blocked[u.id]) {
                    bList.innerHTML += `<div style="padding:10px; font-size:12px; display:flex; justify-content:space-between;">${u.name} <span onclick="unblock('${u.id}')" style="color:var(--accent);">Débloquer</span></div>`;
                } else {
                    d.innerHTML += `<div class="glass" style="padding:15px; border-radius:20px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <b>${u.name}</b><button onclick="blockUser('${u.id}')" style="background:none; border:none; color:var(--accent); font-size:10px;">BLOQUER</button>
                    </div>`;
                }
            });
        });
    }

    function blockUser(id) {
        db.ref('users/'+user.id+'/blocked/'+id).set(true);
        user.blocked = user.blocked || {}; user.blocked[id] = true;
        localStorage.setItem('nexus_v7_2', JSON.stringify(user));
    }

    function unblock(id) {
        db.ref('users/'+user.id+'/blocked/'+id).remove();
        delete user.blocked[id];
        localStorage.setItem('nexus_v7_2', JSON.stringify(user));
    }

    function nv(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.getElementById(id).classList.add('view-active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        el.classList.add('nav-active');
    }

    function saveSets() {
        const up = { code: document.getElementById('setCode').value, meet: document.getElementById('setMeet').value };
        db.ref('users/'+user.id).update(up).then(() => {
            user = {...user, ...up};
            localStorage.setItem('nexus_v7_2', JSON.stringify(user));
            location.reload();
        });
    }

    function setTab(t) {
        document.getElementById('listChats').style.display = t==='chats'?'block':'none';
        document.getElementById('listDisc').style.display = t==='disc'?'block':'none';
        document.getElementById('tC').style.opacity = t==='chats'?'1':'0.3';
        document.getElementById('tD').style.opacity = t==='disc'?'1':'0.3';
    }
</script>
</body>
</html>
