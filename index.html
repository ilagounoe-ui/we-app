<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.42</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --online: #25D366;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; transition: 0.5s; }
        
        /* Thèmes */
        body.theme-default { background: #0f0c29; }
        body.theme-love { background: linear-gradient(to bottom, #420420, #000000); }
        body.theme-ocean { background: linear-gradient(to bottom, #001219, #005f73); }
        body.theme-forest { background: linear-gradient(to bottom, #081c15, #2d6a4f); }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .main-header { padding: 50px 20px 15px; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }

        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; cursor: pointer; }
        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        .wa-badge { background: var(--online); color: white; font-size: 10px; min-width: 20px; height: 20px; border-radius: 10px; display: none; align-items: center; justify-content: center; margin-left: 8px; }

        #chatBox, #coconBox { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; background: inherit; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; position: relative; line-height: 1.4; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .msg-meta { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.7; }

        .media-btn { background: var(--card); border: none; width: 42px; height: 42px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        .recording { background: var(--love) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 25px; border-radius: 30px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; color: white; margin: 10px 0; }
        .option-btn { width: 100%; padding: 14px; margin-top: 8px; border-radius: 15px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; }
    </style>
</head>
<body class="theme-default" onclick="unlockAudio()">

<div id="splash"><div class="loader"></div></div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div><div style="position:fixed; bottom:30px; right:25px; width:60px; height:60px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:25px; color:#000; cursor:pointer;" onclick="addFriend()">+</div></div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:25px; border-radius:30px; text-align:center; margin-bottom:20px;">
            <div style="font-size:40px">💑</div>
            <h3>Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
                <div style="background:rgba(0,0,0,0.2); padding:12px; border-radius:15px; min-width:70px;"><b id="d-day" style="font-size:20px">0</b><br><small>Jours</small></div>
                <div style="background:rgba(0,0,0,0.2); padding:12px; border-radius:15px; min-width:70px;"><b id="d-hour" style="font-size:20px">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button onclick="askCoconCode()" style="width:100%; padding:20px; border-radius:25px; border:2px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold;">💖 OUVRIR LE COCON</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpPreview" class="contact-pfp" style="width:100px; height:100px; margin:0 auto 20px; border:3px solid var(--accent); font-size:35px; cursor:pointer;" onclick="document.getElementById('pfpInput').click()">👤</div>
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="handlePfp(event)">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div class="option-btn" style="text-align:center" onclick="openEdit('pseudo')">Pseudo</div>
            <div class="option-btn" style="text-align:center" onclick="openEdit('code')">Code Secret</div>
            <div class="option-btn" style="text-align:center" onclick="openEdit('startDate', true)">Date Unis</div>
            <div class="option-btn" style="text-align:center; background:var(--love)" onclick="changeTheme()">Thème 🎨</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); margin-top:20px; font-weight:bold;">Déconnexion</button>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="head"><span onclick="triggerBack()" style="font-size:24px; cursor:pointer;">←</span><b id="cName">...</b></div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:8px; align-items:center; background:rgba(0,0,0,0.2);">
        <button class="media-btn" onclick="document.getElementById('imgIn').click()">🖼️</button>
        <button class="media-btn" id="micBtn" ontouchstart="startRecord()" ontouchend="stopRecord()">🎤</button>
        <input type="file" id="imgIn" hidden accept="image/*" onchange="sendMedia('img', this)">
        <input type="text" id="mIn" placeholder="Ecrire..." style="flex:1; background:var(--card); border:none; padding:12px 18px; border-radius:25px; color:white;">
        <button onclick="sendMsg('msgs')" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="head" style="background:var(--love)"><span onclick="triggerBack()" style="font-size:24px; cursor:pointer;">←</span><b>🌹 Cocon Privé</b></div>
    <div class="msg-area" id="coArea"></div>
    <div style="padding:15px; display:flex; gap:8px;"><input type="text" id="coIn" placeholder="Secret..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;"><button onclick="sendMsg('cocon')" style="background:var(--love); border:none; width:50px; height:50px; border-radius:50%;">➔</button></div>
</div>

<div id="authLayer" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--card); padding:30px; border-radius:30px; width:100%; max-width:340px; text-align:center;">
        <h2 style="font-family:'Pacifico'; color:var(--accent)">Connexion</h2>
        <div id="loginUI">
            <input type="tel" class="modal-input" placeholder="Numéro" id="lPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="lPass">
            <button class="option-btn" style="background:var(--accent); color:black;" onclick="login()">ENTRER</button>
            <p onclick="toggleAuth(false)" style="font-size:12px; margin-top:15px; opacity:0.6;">Créer un compte</p>
        </div>
        <div id="regUI" style="display:none;">
            <input type="text" class="modal-input" placeholder="Pseudo" id="rPseudo">
            <input type="tel" class="modal-input" placeholder="Numéro" id="rPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="rPass">
            <button class="option-btn" style="background:var(--accent); color:black;" onclick="register()">CRÉER</button>
            <p onclick="toggleAuth(true)" style="font-size:12px; margin-top:15px; opacity:0.6;">Déjà inscrit ?</p>
        </div>
    </div>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--accent); margin-bottom:10px;">...</h3>
        <div id="modalBody"></div>
        <div id="modalActions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" onclick="triggerBack()">Annuler</button>
            <button class="option-btn" style="background:var(--accent); color:black" id="modalConfirmBtn">OK</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null, audioUnlocked = false, stateStack = [], mediaRecorder, audioChunks = [];
    const popSound = new Audio('https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3');

    function unlockAudio() { if(!audioUnlocked) { popSound.play().then(() => { popSound.pause(); popSound.currentTime=0; audioUnlocked=true; }); } }
    function pushState(id) { stateStack.push(id); history.pushState({id}, ""); }
    window.onpopstate = () => { 
        stateStack.pop(); 
        document.querySelectorAll('.modal-overlay, #chatBox, #coconBox').forEach(el => el.style.display='none'); 
    };
    function triggerBack() { history.back(); }

    function start() {
        document.getElementById('splash').style.display='none';
        document.getElementById('authLayer').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        document.getElementById('pfpPreview').innerHTML = getPfp(user);
        if("Notification" in window) Notification.requestPermission();
        loadTimer(); loadContacts(); applyTheme(user.theme || 'default');
    }

    function getPfp(u) { if(u.pfp) return `<img src="${u.pfp}" style="width:100%; height:100%; object-fit:cover;">`; return u.pseudo[0].toUpperCase(); }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val(); if(!u) return;
                    const ck = [user.id, u.id].sort().join('_');
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}')">
                        <div class="contact-pfp">${getPfp(u)}</div>
                        <div style="flex:1"><b>${u.pseudo}</b> <div class="wa-badge" id="badge-${u.id}">0</div></div>
                    </div>`;
                    
                    // Notifs temps réel
                    db.ref('msgs/'+ck).limitToLast(1).on('child_added', mSnap => {
                        const m = mSnap.val();
                        if(m.sid !== user.id && !m.read) {
                            if(audioUnlocked) popSound.play();
                            if(Notification.permission === "granted") new Notification(u.pseudo, { body: m.type==='text'?m.txt:'Nouveau média 📸' });
                        }
                    });

                    db.ref('msgs/'+ck).on('value', ms => {
                        let count = 0; ms.forEach(m => { if(m.val().sid !== user.id && !m.val().read) count++; });
                        const b = document.getElementById('badge-'+u.id); if(b) { b.innerText = count; b.style.display = count>0?'inline-flex':'none'; }
                    });
                });
            });
        });
    }

    function openChat(id, name) {
        activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display='flex';
        pushState('chatBox');
        db.ref('msgs/'+activeId).once('value', s => { s.forEach(snap => { if(snap.val().sid === id) snap.ref.update({read:true}); }); });
        sync('msgs', activeId, 'mArea');
    }

    // VERSION HYBRIDE STABLE (Tout récupérer)
    function sync(path, target, areaId) {
        const area = document.getElementById(areaId); 
        db.ref(path+'/'+target).off(); // Reset
        db.ref(path+'/'+target).on('value', s => {
            area.innerHTML = ""; // On vide pour être sûr
            s.forEach(snap => {
                const m = snap.val(), isMe = m.sid===user.id;
                const time = new Date(m.ts).getHours().toString().padStart(2,'0')+":"+new Date(m.ts).getMinutes().toString().padStart(2,'0');
                let content = m.txt;
                if(m.type==='img') content = `<img src="${m.txt}" style="width:100%; border-radius:12px; margin-top:5px;" onclick="window.open('${m.txt}')">`;
                if(m.type==='audio') content = `<audio controls style="width:180px; height:35px;"><source src="${m.txt}" type="audio/webm"></audio>`;
                
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">${content}<div class="msg-meta">${time} ${isMe?(m.read?'<span style="color:var(--check)">vu</span>':'✔'):''}</div></div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg(path) {
        const inp = path==='cocon'?document.getElementById('coIn'):document.getElementById('mIn');
        const target = path==='cocon'?"shared_cocon_"+user.code : activeId;
        if(!inp.value.trim()) return;
        db.ref(path+'/'+target).push({ sid:user.id, txt:inp.value.trim(), ts:Date.now(), read:false, type:'text' });
        inp.value = "";
    }

    function sendMedia(type, input) {
        const reader = new FileReader();
        reader.onload = (e) => db.ref('msgs/'+activeId).push({ sid:user.id, type, txt:e.target.result, ts:Date.now(), read:false });
        reader.readAsDataURL(input.files[0]);
    }

    async function startRecord() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream); audioChunks = [];
        document.getElementById('micBtn').classList.add('recording');
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
    }
    function stopRecord() {
        if(!mediaRecorder) return;
        mediaRecorder.stop();
        document.getElementById('micBtn').classList.remove('recording');
        mediaRecorder.onstop = () => {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(audioChunks));
            reader.onloadend = () => db.ref('msgs/'+activeId).push({ sid:user.id, type:'audio', txt:reader.result, ts:Date.now(), read:false });
        };
    }

    function changeTheme() {
        const themes = ['default', 'love', 'ocean', 'forest'];
        let next = themes[(themes.indexOf(user.theme || 'default') + 1) % themes.length];
        applyTheme(next); user.theme = next;
        localStorage.setItem('nu_v33_user', JSON.stringify(user));
        db.ref('users/'+user.id).update({theme: next});
    }
    function applyTheme(t) { document.body.className = 'theme-' + t; }

    function askCoconCode() {
        openModal("Code Secret", `<input type="tel" id="modalInput" class="modal-input" style="-webkit-text-security:disc">`, (c) => {
            if(c === String(user.code)) { 
                document.getElementById('coconBox').style.display='flex'; pushState('coconBox');
                sync('cocon', "shared_cocon_"+user.code, 'coArea');
            }
        });
    }

    function loadTimer() {
        db.ref('users/'+user.id+'/startDate').on('value', s => {
            const ds = s.val(); if(!ds) return;
            setInterval(() => {
                const diff = Date.now() - ds;
                document.getElementById('d-day').innerText = Math.floor(diff/86400000);
                document.getElementById('d-hour').innerText = Math.floor((diff%86400000)/3600000);
            }, 1000);
        });
    }

    function login() {
        const ph = "u_"+document.getElementById('lPhone').value.replace(/\D/g,'');
        db.ref('users/'+ph).once('value', s => {
            if(s.exists() && s.val().pass === document.getElementById('lPass').value) {
                user = s.val(); localStorage.setItem('nu_v33_user', JSON.stringify(user)); start();
            }
        });
    }
    function register() {
        const id = "u_"+document.getElementById('rPhone').value.replace(/\D/g,'');
        db.ref('users/'+id).set({id, pseudo:document.getElementById('rPseudo').value, pass:document.getElementById('rPass').value, code:'0000', startDate:Date.now(), contacts:{}, theme:'default'}).then(() => toggleAuth(true));
    }
    function logout() { localStorage.clear(); location.reload(); }
    function toggleAuth(l) { document.getElementById('loginUI').style.display=l?'block':'none'; document.getElementById('regUI').style.display=l?'none':'block'; }
    function openModal(t, b, a) { 
        document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = b; 
        document.getElementById('customModal').style.display='flex'; pushState('modal');
        document.getElementById('modalConfirmBtn').onclick = () => { a(document.getElementById('modalInput').value); triggerBack(); };
    }
    function addFriend() { openModal("Ajouter", `<input type="tel" id="modalInput" class="modal-input">`, (tel) => {
        const id = "u_"+tel.replace(/\D/g,'');
        db.ref('users/'+id).once('value', s => { if(s.exists()) { db.ref(`users/${user.id}/contacts/${id}`).set(true); db.ref(`users/${id}/contacts/${user.id}`).set(true); }});
    });}
    function openEdit(f, d=false) { openModal("Modifier", `<input type="${d?'date':'text'}" id="modalInput" class="modal-input">`, (v) => {
        let val = d ? new Date(v).getTime() : v; db.ref('users/'+user.id).update({[f]:val}).then(()=>location.reload());
    });}
    function handlePfp(e) {
        const r = new FileReader(); r.onload = (ev) => db.ref('users/'+user.id).update({pfp: ev.target.result}).then(()=>location.reload());
        r.readAsDataURL(e.target.files[0]);
    }
    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    window.onload = () => { if(user) start(); else { document.getElementById('splash').style.display='none'; document.getElementById('authLayer').style.display='flex'; } };
</script>
</body>
</html>
