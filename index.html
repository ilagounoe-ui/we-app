<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v4.6</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3; --online: #25D366;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-size: cover; background-position: center; transition: background 0.5s ease; }
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); transition: 0.3s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; transform: scale(1.05); }
        
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .view.active { display: block; }
        
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #2a2a40; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; position: relative; word-wrap: break-word; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 9px; margin-top: 4px; opacity: 0.7; display: flex; justify-content: flex-end; gap: 3px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 25px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: white; margin: 10px 0; box-sizing: border-box; text-align: center; }
        .option-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 18px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; cursor: pointer; }
        
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #000; z-index: 50; }
        #vWidgetFull { display:none; position:fixed; inset:0; background:var(--bg); z-index:30000; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
    </style>
</head>
<body>

<div id="splash"><div class="loader"></div><p style="margin-top:20px; font-family:'Pacifico'; color:var(--accent);">Chargement de ton Univers...</p></div>

<div id="vWidgetFull">
    <div style="font-family:'Pacifico'; color:var(--love); font-size:30px; margin-bottom:30px;">L'Univers te dit... 💖</div>
    <div id="widgetText" style="font-size:20px; color:white; background:var(--card); padding:30px; border-radius:35px; border:2px solid var(--love); min-height:120px; display:flex; align-items:center; justify-content:center; width:85%;">...</div>
    <button onclick="document.getElementById('vWidgetFull').style.display='none'" class="option-btn" style="width:150px; margin-top:30px;">Retour</button>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--accent); margin:0 0 10px 0;">...</h3>
        <div id="modalBody"></div>
        <div id="modalActions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" style="background:var(--card)" onclick="triggerBack()">Fermer</button>
            <button class="option-btn" style="background:var(--accent); color:black" id="modalConfirmBtn">Valider</button>
        </div>
    </div>
</div>

<div id="authLayer" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--card); padding:35px 25px; border-radius:40px; width:100%; max-width:320px; text-align:center;">
        <div id="loginUI">
            <h2 style="font-family:'Pacifico'; color:var(--accent)">Connexion</h2>
            <input type="tel" class="modal-input" placeholder="Numéro" id="lPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="lPass">
            <button class="option-btn" style="background:var(--accent); color:black" onclick="login()">ENTRER</button>
            <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:12px; opacity:0.6;">Nouveau ? Créer un compte</p>
        </div>
        <div id="regUI" style="display:none;">
            <h2 style="font-family:'Pacifico'; color:var(--accent)">Bienvenue</h2>
            <input type="text" class="modal-input" placeholder="Pseudo" id="rPseudo">
            <input type="tel" class="modal-input" placeholder="Numéro" id="rPhone">
            <input type="password" class="modal-input" placeholder="Mot de passe" id="rPass">
            <button class="option-btn" style="background:var(--accent); color:black" onclick="register()">S'INSCRIRE</button>
            <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:12px; opacity:0.6;">Déjà inscrit ? Connexion</p>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div><div class="fab" onclick="addFriend()">+</div></div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:25px; border-radius:35px; text-align:center; margin-bottom:20px;">
            <div style="font-size:40px">💑</div>
            <h3 style="margin:5px 0">Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
                <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:15px; min-width:70px;"><b id="d-day">0</b><br><small>Jours</small></div>
                <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:15px; min-width:70px;"><b id="d-hour">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button onclick="askCoconCode()" class="option-btn" style="border:2px dashed var(--love); background:var(--card); color:var(--love); height:80px;">💖 OUVRIR LE COCON</button>
        <button onclick="checkMood()" class="option-btn" style="margin-top:15px;">🌟 Besoin d'un mot doux ?</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpPreview" class="contact-pfp" style="width:100px; height:100px; margin:0 auto 20px; border:2px solid var(--accent); font-size:35px;">👤</div>
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="handlePfp(event)">
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div class="tab" onclick="openEdit('pseudo')">Pseudo</div>
            <div class="tab" onclick="document.getElementById('pfpInput').click()">Photo</div>
            <div class="tab" onclick="openEdit('code')">Code Cocon</div>
            <div class="tab" onclick="openEdit('startDate', true)">Date</div>
            <div class="tab" style="grid-column:span 2; background:var(--accent); color:black" onclick="askPhoneForInfo()">ℹ️ Infos Compte</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); font-weight:bold; margin-top:20px;">Déconnexion</button>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="head"><span onclick="triggerBack()" style="font-size:24px;">←</span><b id="cName">...</b></div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.2);">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:12px 18px; border-radius:25px; color:white;">
        <button onclick="send('msgs')" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; font-size:18px;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="head" style="background:var(--love)"><span onclick="triggerBack()" style="font-size:24px;">←</span><b>🌹 Cocon Privé</b></div>
    <div class="msg-area" id="coArea"></div>
    <div style="padding:15px; display:flex; gap:10px;">
        <input type="text" id="coIn" placeholder="Secret..." style="flex:1; background:var(--card); border:none; padding:12px 18px; border-radius:25px; color:white;">
        <button onclick="send('cocon')" style="background:var(--love); border:none; width:45px; height:45px; border-radius:50%; font-size:18px;">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null;
    let activeChatPath = null;
    let stateStack = [];

    function formatTime(ts) { const d = new Date(ts); return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0'); }
    function pushState(id) { stateStack.push(id); history.pushState({id}, ""); }
    function triggerBack() { history.back(); }
    window.onpopstate = () => { 
        const s = stateStack.pop();
        if(s==='modal') document.getElementById('customModal').style.display='none';
        else if(s==='chatBox') document.getElementById('chatBox').style.display='none';
        else if(s==='coconBox') document.getElementById('coconBox').style.display='none';
    };

    // --- AUTH ---
    function toggleAuth(isLogin) {
        document.getElementById('loginUI').style.display = isLogin ? 'block' : 'none';
        document.getElementById('regUI').style.display = isLogin ? 'none' : 'block';
    }
    function login() {
        const phone = "u_"+document.getElementById('lPhone').value.replace(/\D/g,'');
        const pass = document.getElementById('lPass').value;
        db.ref('users/'+phone).once('value', s => {
            if(s.exists() && s.val().pass === pass) {
                user = s.val(); localStorage.setItem('nu_v33_user', JSON.stringify(user));
                location.reload();
            } else alert("Erreur identifiants");
        });
    }
    function register() {
        const phone = "u_"+document.getElementById('rPhone').value.replace(/\D/g,'');
        const nu = { id: phone, pseudo: document.getElementById('rPseudo').value, pass: document.getElementById('rPass').value, joined: new Date().toLocaleDateString(), pfp:'', code:'', startDate:'' };
        db.ref('users/'+phone).set(nu).then(() => { user=nu; localStorage.setItem('nu_v33_user', JSON.stringify(nu)); location.reload(); });
    }

    // --- CORE ---
    function start() {
        document.getElementById('splash').style.display='none';
        document.getElementById('authLayer').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        document.getElementById('pfpPreview').innerHTML = getPfp(user);
        loadContacts(); loadTimer();
    }

    function getPfp(u) { if(u.pfp) return `<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover;">`; return (u.pseudo||"U")[0].toUpperCase(); }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val(); if(!u) return;
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}')">
                        <div class="contact-pfp">${getPfp(u)}</div>
                        <b>${u.pseudo}</b>
                    </div>`;
                });
            });
        });
    }

    function openChat(id, name) {
        activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display='flex';
        pushState('chatBox');
        sync('msgs', activeId, 'mArea');
    }

    function askCoconCode() {
        openModal("Cocon Privé", `<input type="password" id="modalInput" class="modal-input" placeholder="Code secret">`, (v) => {
            if(v === user.code) { 
                document.getElementById('coconBox').style.display='flex'; 
                pushState('coconBox'); 
                sync('cocon', user.code, 'coArea'); 
            } else alert("Code erroné");
        });
    }

    function sync(path, target, areaId) {
        if(activeChatPath) db.ref(activeChatPath).off();
        activeChatPath = path + '/' + target;
        const area = document.getElementById(areaId);
        db.ref(activeChatPath).limitToLast(25).on('value', s => {
            area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                const isMe = m.sid === user.id;
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">${m.txt}<div class="msg-meta">${formatTime(m.t)}</div></div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function send(mode) {
        const inp = mode === 'msgs' ? document.getElementById('mIn') : document.getElementById('coIn');
        if(!inp.value) return;
        const path = mode === 'msgs' ? 'msgs/'+activeId : 'cocon/'+user.code;
        db.ref(path).push({ sid: user.id, txt: inp.value, t: Date.now() });
        inp.value = "";
    }

    // --- MOTS DOUX ---
    function checkMood() {
        openModal("Humeur ?", `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <button class="option-btn" onclick="showSweet('happy')">🥰 Joie</button>
            <button class="option-btn" onclick="showSweet('love')">😊 Amour</button>
            <button class="option-btn" onclick="showSweet('sad')">😢 Triste</button>
            <button class="option-btn" onclick="showSweet('kiss')">😘 Bisou</button>
        </div>`, null);
    }
    function showSweet(t) {
        const w = {
            happy: ["Ton sourire est ma force 🌟", "Rayonne !"],
            love: ["Tu es mon univers 💖", "Je t'aime."],
            sad: ["Je suis là pour toi... 🫂", "Ça va aller."],
            kiss: ["Mwah ! 💋", "Un gros bisou !"]
        };
        document.getElementById('widgetText').innerText = w[t][Math.floor(Math.random()*w[t].length)];
        document.getElementById('vWidgetFull').style.display = 'flex';
        triggerBack();
    }

    // --- INFOS COMPTE ---
    function askPhoneForInfo() {
        openModal("Vérification", `Numéro pour voir les codes :<input type="tel" id="modalInput" class="modal-input">`, (n) => {
            if("u_"+n.replace(/\D/g,'') === user.id) {
                const body = `<div style="text-align:left; font-size:13px;">
                    <b>Pseudo:</b> ${user.pseudo}<br><b>Tel:</b> ${user.id.replace('u_','')}<br>
                    <b>Pass Compte:</b> ${user.pass}<br><b>Code Cocon:</b> ${user.code||'N/A'}<br>
                    <b>Date:</b> ${user.startDate ? new Date(user.startDate).toLocaleDateString() : 'N/A'}
                </div>`;
                openModal("Fiche Infos", body, null);
            }
        });
    }

    function openEdit(f, isD=false) { openModal("Modifier", `<input type="${isD?'date':'text'}" id="modalInput" class="modal-input">`, (v) => {
        let val = isD ? new Date(v).getTime() : v;
        db.ref('users/'+user.id).update({[f]:val}).then(() => { user[f]=val; localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload(); });
    }); }

    function openModal(t,b,a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display='flex';
        pushState('modal');
        document.getElementById('modalConfirmBtn').onclick = () => { if(a) a(document.getElementById('modalInput').value); };
        document.getElementById('modalActions').style.display = a ? 'flex' : 'none';
    }

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    function loadTimer() { if(user.startDate) setInterval(() => { const d = new Date() - new Date(user.startDate); document.getElementById('d-day').innerText = Math.floor(d/86400000); document.getElementById('d-hour').innerText = Math.floor((d/3600000)%24); }, 1000); }
    function logout() { localStorage.clear(); location.reload(); }
    window.onload = () => { if(user) start(); else { document.getElementById('splash').style.display='none'; document.getElementById('authLayer').style.display='flex'; } };
</script>
</body>
</html>
