<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.34 - Final Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3;
        }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- 1. PAGE DE CHARGEMENT --- */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s ease-out; }
        .loader { width: 35px; height: 35px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- NOTIFICATIONS --- */
        #notifBanner { position: fixed; top: -100px; left: 20px; right: 20px; background: var(--accent); color: #000; padding: 15px; border-radius: 20px; z-index: 30000; display: flex; align-items: center; gap: 12px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.5s; }
        #notifBanner.show { top: 50px; }
        .notif-dot { width: 10px; height: 10px; background: var(--love); border-radius: 50%; display: none; position: absolute; top: 5px; right: 5px; }

        /* --- MODALES --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 30px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: white; margin: 20px 0; outline: none; text-align: center; font-size: 18px; }

        /* --- AUTH DESIGN --- */
        #authLayer { position: fixed; inset: 0; background: linear-gradient(180deg, #0f0c29 0%, #1a1a2e 100%); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .auth-card { background: var(--card); padding: 35px 25px; border-radius: 35px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 340px; text-align: center; }
        .auth-logo { font-family: 'Pacifico', cursive; font-size: 32px; color: var(--accent); margin-bottom: 25px; }
        .auth-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 18px; color: white; outline: none; box-sizing: border-box; margin-bottom: 12px; }
        .auth-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 18px; font-weight: 700; cursor: pointer; }

        /* --- UI PRINCIPALE --- */
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); cursor: pointer; position: relative; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        /* --- BADGES MESSAGES (POINT) --- */
        .wa-badge { position: absolute; right: 15px; background: #25D366; color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold; }

        /* --- RÉGLAGES --- */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .set-card { background: var(--card); padding: 20px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .set-card i { font-size: 24px; display: block; margin-bottom: 8px; }

        /* --- PHOTO DE PROFIL --- */
        #pfpPreview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; display: block; border: 2px solid var(--accent); }

        .love-card { background: linear-gradient(135deg, #6a11cb, var(--love)); padding: 25px; border-radius: 30px; text-align: center; margin-bottom: 20px; }
        .counter-row { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .unit { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; min-width: 60px; }

        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; position: relative; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 5px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 5px; }
        .msg-meta { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.7; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; z-index: 100; }
    </style>
</head>
<body>

<div id="splash">
    <div class="auth-logo" style="font-size: 40px;">Notre Univers</div>
    <div class="loader"></div>
</div>

<div id="notifBanner">
    <span id="notifIcon">💬</span>
    <span id="notifText">Nouveau message reçu</span>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin:0; color:var(--accent)">Accès Sécurisé</h3>
        <input type="text" id="modalInput" class="modal-input" placeholder="...">
        <div style="display:flex; gap:10px;">
            <button class="auth-btn" style="background:var(--card); color:white" onclick="closeModal()">Annuler</button>
            <button class="auth-btn" id="modalConfirmBtn">Confirmer</button>
        </div>
    </div>
</div>

<div id="authLayer">
    <div class="auth-card" id="loginUI">
        <div class="auth-logo">Notre Univers</div>
        <input type="tel" class="auth-input" placeholder="Numéro" id="lPhone">
        <input type="password" class="auth-input" placeholder="Mot de passe" id="lPass">
        <button class="auth-btn" onclick="login()">CONNEXION 🪐</button>
        <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:12px; color:var(--text-sub)">Créer un compte</p>
    </div>
    <div class="auth-card" id="regUI" style="display:none;">
        <div class="auth-logo">Nouveau Profil</div>
        <input type="text" class="auth-input" placeholder="Pseudo" id="rPseudo">
        <input type="tel" class="auth-input" placeholder="Numéro" id="rPhone">
        <input type="password" class="auth-input" placeholder="Mot de passe" id="rPass">
        <button class="auth-btn" onclick="register()">S'INSCRIRE ✨</button>
        <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:12px; color:var(--text-sub)">Déjà inscrit ? Connexion</p>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" id="tabChats" onclick="switchV('vChats', this)">Chats <div class="notif-dot" id="dotChats"></div></div>
            <div class="tab" id="tabCocon" onclick="switchV('vCocon', this)">Cocon <div class="notif-dot" id="dotCocon"></div></div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div><div class="fab" onclick="addFriend()">+</div></div>

    <div id="vCocon" class="view">
        <div class="love-card">
            <div style="font-size:35px">💑</div>
            <h3 style="margin:10px 0">Unis depuis</h3>
            <div class="counter-row">
                <div class="unit"><b id="d-day">0</b><small>Jours</small></div>
                <div class="unit"><b id="d-hour">0</b><small>Heures</small></div>
            </div>
            <p id="sharedDate" style="font-size:11px; margin-top:10px; opacity:0.8">Calcul...</p>
        </div>
        <button onclick="askCoconCode()" style="width:100%; padding:20px; border-radius:25px; border:1px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold;">🌹 Ouvrir le Cocon</button>
    </div>

    <div id="vSet" class="view">
        <img id="pfpPreview" src="https://via.placeholder.com/150">
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="handlePfp(event)">
        <div class="settings-grid">
            <div class="set-card" onclick="openEdit('pseudo')"><i>👤</i><span>Pseudo</span></div>
            <div class="set-card" onclick="document.getElementById('pfpInput').click()"><i>📸</i><span>Photo</span></div>
            <div class="set-card" onclick="openEdit('code')"><i>🔑</i><span>Code Secret</span></div>
            <div class="set-card" onclick="openEdit('date')"><i>📅</i><span>Date</span></div>
            <div class="set-card" onclick="openEdit('pass')"><i>🔒</i><span>Mot de passe</span></div>
            <div class="set-card" onclick="logout()" style="color:#ff5252"><i>🚪</i><span>Quitter</span></div>
        </div>
    </div>
</div>

<div id="chatBox"><div class="head"><span onclick="closeO('chatBox')">←</span><b id="cName">...</b></div><div class="msg-area" id="mArea"></div><div style="padding:15px; display:flex; gap:10px;"><input type="text" id="mIn" style="flex:1; background:var(--card); border:none; padding:12px; border-radius:20px; color:white;"><button onclick="send('msgs')" style="background:var(--accent); border:none; width:45px; border-radius:50%">➔</button></div></div>
<div id="coconBox"><div class="head" style="background:var(--love)"><span onclick="closeO('coconBox')">←</span><b>🌹 Cocon</b></div><div class="msg-area" id="coArea"></div><div style="padding:15px; display:flex; gap:10px;"><input type="text" id="coIn" style="flex:1; background:var(--card); border:none; padding:12px; border-radius:20px; color:white;"><button onclick="send('cocon')" style="background:var(--love); border:none; width:45px; border-radius:50%">➔</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null;
    let isChatOpen = false;

    // --- CHARGEMENT ---
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                if(user) start(); else document.getElementById('authLayer').style.display='flex';
            }, 500);
        }, 1500);
    };

    function start() {
        document.getElementById('authLayer').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        if(user.pfp) document.getElementById('pfpPreview').src = user.pfp;
        loadTimer(); loadContacts(); listenGlobal();
    }

    // --- PHOTO GALERIE ---
    function handlePfp(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const base64 = ev.target.result;
            document.getElementById('pfpPreview').src = base64;
            db.ref('users/'+user.id).update({ pfp: base64 });
            user.pfp = base64;
            localStorage.setItem('nu_v33_user', JSON.stringify(user));
        };
        reader.readAsDataURL(file);
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    const chatKey = [user.id, u.id].sort().join('_');
                    list.innerHTML += `
                        <div style="position:relative; display:flex; align-items:center; padding:15px; background:var(--card); border-radius:20px; margin-bottom:10px;" onclick="openChat('${u.id}','${u.pseudo}')">
                            <img src="${u.pfp || 'https://via.placeholder.com/150'}" style="width:45px; height:45px; border-radius:50%; margin-right:15px; object-fit:cover;">
                            <b>${u.pseudo}</b>
                            <div class="wa-badge" id="badge-${u.id}">0</div>
                        </div>`;
                    
                    // Compteur messages non lus
                    db.ref('msgs/'+chatKey).on('value', ms => {
                        let count = 0;
                        ms.forEach(m => { if(m.val().sid !== user.id && !m.val().read) count++; });
                        const b = document.getElementById('badge-'+u.id);
                        if(b) { b.innerText = count; b.style.display = count > 0 ? 'flex' : 'none'; }
                    });
                });
            });
        });
    }

    // --- MATCHING AUTO ---
    function addFriend() {
        openModal("Ajouter un ami", "Numéro", (tel) => {
            const id = "u_" + tel.replace(/\D/g,'');
            db.ref('users/'+id).once('value', s => {
                if(s.exists()) {
                    db.ref(`users/${user.id}/contacts/${id}`).set(true);
                    db.ref(`users/${id}/contacts/${user.id}`).set(true); // MATCHING AUTO
                    alert("Ami ajouté !");
                }
            });
        });
    }

    function openChat(id, name) {
        isChatOpen = true;
        activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display='flex';
        
        db.ref('msgs/'+activeId).once('value', s => {
            s.forEach(snap => { if(snap.val().sid === id) db.ref('msgs/'+activeId+'/'+snap.key).update({read:true}); });
        });
        sync('msgs', activeId, 'mArea');
    }

    function send(path) {
        const inp = (path==='msgs')?document.getElementById('mIn'):document.getElementById('coIn');
        const target = (path==='msgs')?activeId:user.coconId;
        if(!inp.value.trim()) return;
        db.ref(path+'/'+target).push({ sid:user.id, txt:inp.value.trim(), t:Date.now(), read:false });
        inp.value = "";
    }

    // --- TOUTES TES AUTRES FONCTIONS RESTAURÉES ---
    function toggleAuth(showL) { document.getElementById('loginUI').style.display=showL?'block':'none'; document.getElementById('regUI').style.display=showL?'none':'block'; }
    async function register() {
        const ps = document.getElementById('rPseudo').value, ph = document.getElementById('rPhone').value, pa = document.getElementById('rPass').value;
        const id = "u_" + ph.replace(/\D/g,'');
        const coconId = "cocon_" + Math.random().toString(36).substr(2, 9);
        await db.ref('users/'+id).set({ id, phone:ph, pseudo:ps, pass:pa, pfp:'', code:'0000', coconId: coconId, startDate:Date.now(), contacts:{} });
        toggleAuth(true);
    }
    async function login() {
        const ph = document.getElementById('lPhone').value, pa = document.getElementById('lPass').value;
        const id = "u_" + ph.replace(/\D/g,'');
        const s = await db.ref('users/'+id).once('value');
        if(s.exists() && s.val().pass === pa) { user = s.val(); localStorage.setItem('nu_v33_user', JSON.stringify(user)); start(); }
    }
    function loadTimer() {
        db.ref('cocon_meta/'+user.coconId).on('value', s => {
            const data = s.val() || { startDate: user.startDate };
            const up = () => {
                const diff = Date.now() - data.startDate;
                document.getElementById('d-day').innerText = Math.floor(diff/86400000);
                document.getElementById('d-hour').innerText = Math.floor((diff/3600000)%24);
                document.getElementById('sharedDate').innerText = "Depuis le " + new Date(data.startDate).toLocaleDateString();
            };
            up(); setInterval(up, 60000);
        });
    }
    function askCoconCode() {
        openModal("Code Secret", "Entre le code", (code) => {
            if(code === user.code) {
                document.getElementById('coconBox').style.display='flex';
                sync('cocon', user.coconId, 'coArea');
            }
        });
    }
    function sync(path, target, areaId) {
        db.ref(path+'/'+target).on('value', s => {
            const area = document.getElementById(areaId); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val(), isMe = m.sid===user.id;
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">${m.txt}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }
    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    function openModal(t,p,a) {
        document.getElementById('modalTitle').innerText = t; document.getElementById('modalInput').placeholder = p;
        document.getElementById('customModal').style.display = 'flex';
        document.getElementById('modalConfirmBtn').onclick = () => { a(document.getElementById('modalInput').value); closeModal(); };
    }
    function closeO(id) { document.getElementById(id).style.display='none'; isChatOpen = false; }
    function logout() { localStorage.clear(); location.reload(); }
    function openEdit(type) {
        openModal("Modifier", type, (val) => {
            if(type==='date') db.ref('cocon_meta/'+user.coconId).update({startDate: new Date(val).getTime()});
            else { let up = {}; up[type]=val; db.ref('users/'+user.id).update(up); user[type]=val; }
            localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload();
        });
    }
</script>
</body>
</html>
