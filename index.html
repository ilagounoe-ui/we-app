<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Notre Univers v36</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>

:root{
--accent:#bb86fc;
--bg:#0f0c29;
--card:rgba(255,255,255,0.08);
--love:#ff4b6e;
--text-sub:#b3b3b3;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg);
color:white;
height:100vh;
overflow:hidden;
}

.bubble{
padding:10px 15px;
border-radius:20px;
max-width:75%;
font-size:14px;
position:relative;
}

.m-me{
align-self:flex-end;
background:var(--accent);
color:#000;
border-bottom-right-radius:5px;
}

.m-they{
align-self:flex-start;
background:var(--card);
border-bottom-left-radius:5px;
}

.msg-meta{
font-size:9px;
margin-top:4px;
display:flex;
justify-content:flex-end;
gap:4px;
opacity:0.7;
}

.msg-reply{
font-size:11px;
opacity:.7;
border-left:3px solid var(--accent);
padding-left:6px;
margin-bottom:4px;
}

.reactions{
margin-top:3px;
font-size:13px;
}

.record-btn{
background:var(--love);
border:none;
width:45px;
height:45px;
border-radius:50%;
font-size:18px;
}

.menu{
position:fixed;
bottom:0;
left:0;
right:0;
background:#1a1a2e;
padding:20px;
border-radius:30px 30px 0 0;
display:none;
z-index:20000;
}

.menu button{
width:100%;
background:var(--card);
border:none;
color:white;
padding:14px;
border-radius:18px;
margin-bottom:10px;
}

.reply-bar{
background:rgba(0,0,0,.4);
padding:6px 10px;
font-size:12px;
display:none;
}

.typing{
font-size:11px;
opacity:.7;
padding-left:10px;
}

</style>
</head>

<body>

<div id="replyBar" class="reply-bar"></div>

<div id="messageMenu" class="menu">
<button onclick="reactMsg('❤️')">❤️ Réagir</button>
<button onclick="reactMsg('🔥')">🔥 Réagir</button>
<button onclick="reactMsg('😂')">😂 Réagir</button>
<button onclick="replyMsg()">↩ Répondre</button>
<button onclick="editMsg()">✏ Modifier</button>
<button onclick="deleteMsg()">🗑 Supprimer</button>
<button onclick="closeMenu()">Fermer</button>
</div>

<div id="typingIndicator" class="typing"></div>

<div id="audioPreview" style="display:none;padding:10px">
<b>🎤 Enregistrement...</b>
</div>
<header class="main-header">
<h2 id="uNameDisp" style="margin:0;font-family:'Pacifico';color:var(--accent)">Pseudo</h2>

<div class="tabs">
<div class="tab active" id="tabChats" onclick="switchV('vChats',this)">Chats</div>
<div class="tab" onclick="switchV('vCocon',this)">Cocon</div>
<div class="tab" onclick="switchV('vSet',this)">Réglages</div>
</div>
</header>


<div id="vChats" class="view active">
<div id="chatList"></div>

<div class="fab" onclick="addFriend()">+</div>
</div>


<div id="vCocon" class="view">

<div class="love-card">

<div style="font-size:35px">💑</div>

<h3 style="margin:10px 0">Unis depuis</h3>

<div class="counter-row">

<div class="unit">
<b id="d-day">0</b>
<small>Jours</small>
</div>

<div class="unit">
<b id="d-hour">0</b>
<small>Heures</small>
</div>

</div>

<p id="sharedDate"
style="font-size:11px;margin-top:10px;opacity:.8">
Calcul...
</p>

</div>

<button onclick="askCoconCode()"
style="width:100%;padding:20px;border-radius:25px;border:1px dashed var(--love);background:var(--card);color:var(--love);font-weight:bold;">
🌹 Ouvrir le Cocon
</button>

</div>


<div id="vSet" class="view">

<div class="settings-grid">

<div class="set-card" onclick="openEdit('pseudo')">
👤
<br>Pseudo
</div>

<div class="set-card" onclick="openEdit('avatar')">
📸
<br>Avatar
</div>

<div class="set-card" onclick="openEdit('code')">
🔑
<br>Code secret
</div>

<div class="set-card" onclick="openEdit('date')">
📅
<br>Date
</div>

<div class="set-card" onclick="openEdit('pass')">
🔒
<br>Mot de passe
</div>

<div class="set-card"
onclick="logout()"
style="color:#ff5252">

🚪
<br>Quitter

</div>

</div>

</div>


<!-- CHAT NORMAL -->

<div id="chatBox"
style="display:none;flex-direction:column;height:100vh;position:fixed;inset:0;background:var(--bg);z-index:9999">

<div class="head"
style="padding:50px 20px 15px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;gap:15px">

<span onclick="closeO('chatBox')">←</span>

<b id="cName">...</b>

</div>


<div class="msg-area"
id="mArea"
style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px">

</div>

<div id="typingIndicatorChat"
class="typing"></div>


<div style="padding:15px;display:flex;gap:10px">

<input
type="text"
id="mIn"
placeholder="Message..."
style="flex:1;background:var(--card);border:none;padding:12px;border-radius:20px;color:white"
oninput="typing()">

<button onclick="send('msgs')"
style="background:var(--accent);border:none;width:45px;border-radius:50%">
➔
</button>

<button
class="record-btn"
onmousedown="startRec()"
onmouseup="stopRec()">

🎤

</button>

</div>

</div>


<!-- COCON -->

<div id="coconBox"
style="display:none;flex-direction:column;height:100vh;position:fixed;inset:0;background:var(--bg);z-index:9999">

<div class="head"
style="padding:50px 20px 15px;background:var(--love);display:flex;gap:15px">

<span onclick="closeO('coconBox')">←</span>

<b>🌹 Cocon</b>

</div>


<div class="msg-area"
id="coArea"
style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px">

</div>


<div style="padding:15px;display:flex;gap:10px">

<input
type="text"
id="coIn"
placeholder="Secret..."
style="flex:1;background:var(--card);border:none;padding:12px;border-radius:20px;color:white">

<button onclick="send('cocon')"
style="background:var(--love);border:none;width:45px;border-radius:50%">
➔
</button>

<button
class="record-btn"
onmousedown="startRecCocon()"
onmouseup="stopRecCocon()">

🎤

</button>

</div>

</div>
<script>

const firebaseConfig = {
apiKey:"AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs",
databaseURL:"https://notre-univers-d71a3-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=JSON.parse(localStorage.getItem("nu_v33_user"));

let activeId=null;
let replyTarget=null;
let selectedMsg=null;

let mediaRecorder;
let audioChunks=[];

function start(){

document.getElementById("authLayer").style.display="none";
document.getElementById("mainApp").style.display="block";

document.getElementById("uNameDisp").innerText=user.pseudo;

loadContacts();
}

if(user)start();



/* =========================
CHAT
========================= */

function openChat(id,name){

activeId=[user.id,id].sort().join("_");

document.getElementById("chatBox").style.display="flex";

document.getElementById("cName").innerText=name;

sync("msgs",activeId,"mArea");

}



function sync(path,target,areaId){

db.ref(path+"/"+target).on("value",s=>{

const area=document.getElementById(areaId);

area.innerHTML="";

s.forEach(sn=>{

const m=sn.val();

const id=sn.key;

const isMe=m.sid===user.id;

let replyHTML="";

if(m.reply){

replyHTML=`<div class="msg-reply">${m.reply}</div>`;

}

let reactHTML="";

if(m.react){

reactHTML=`<div class="reactions">${m.react}</div>`;

}

let audioHTML="";

if(m.audio){

audioHTML=`<audio controls src="${m.audio}"></audio>`;

}

const div=document.createElement("div");

div.className="bubble "+(isMe?"m-me":"m-they");

div.innerHTML=replyHTML+(m.txt||"")+audioHTML+reactHTML;

div.oncontextmenu=(e)=>{

e.preventDefault();

selectedMsg={id:id,data:m,path:path,target:target};

openMenu();

};

area.appendChild(div);

});

area.scrollTop=area.scrollHeight;

});

}



/* =========================
SEND MESSAGE
========================= */

function send(path){

const inp=(path==="msgs")?mIn:coIn;

const target=(path==="msgs")?activeId:user.coconId;

if(!inp.value.trim())return;

let data={

sid:user.id,
txt:inp.value,
t:Date.now()

};

if(replyTarget){

data.reply=replyTarget;

replyTarget=null;

document.getElementById("replyBar").style.display="none";

}

db.ref(path+"/"+target).push(data);

inp.value="";

}



/* =========================
MENU MESSAGE
========================= */

function openMenu(){

document.getElementById("messageMenu").style.display="block";

}

function closeMenu(){

document.getElementById("messageMenu").style.display="none";

}



function reactMsg(e){

db.ref(selectedMsg.path+"/"+selectedMsg.target+"/"+selectedMsg.id)
.update({react:e});

closeMenu();

}



function replyMsg(){

replyTarget=selectedMsg.data.txt;

document.getElementById("replyBar").innerText="Répondre : "+replyTarget;

document.getElementById("replyBar").style.display="block";

closeMenu();

}



function editMsg(){

let txt=prompt("Modifier",selectedMsg.data.txt);

if(!txt)return;

db.ref(selectedMsg.path+"/"+selectedMsg.target+"/"+selectedMsg.id)
.update({txt:txt});

closeMenu();

}



function deleteMsg(){

db.ref(selectedMsg.path+"/"+selectedMsg.target+"/"+selectedMsg.id)
.remove();

closeMenu();

}



/* =========================
TYPING
========================= */

function typing(){

db.ref("typing/"+activeId+"/"+user.id).set(true);

setTimeout(()=>{

db.ref("typing/"+activeId+"/"+user.id).remove();

},2000);

}



db.ref("typing").on("value",s=>{

let typingUsers=s.val();

if(!typingUsers)return;

if(typingUsers[activeId]){

for(let u in typingUsers[activeId]){

if(u!==user.id){

document.getElementById("typingIndicatorChat").innerText="écrit...";

return;

}

}

}

document.getElementById("typingIndicatorChat").innerText="";

});



/* =========================
AUDIO RECORD
========================= */

async function startRec(){

let stream=await navigator.mediaDevices.getUserMedia({audio:true});

mediaRecorder=new MediaRecorder(stream);

mediaRecorder.start();

audioChunks=[];

mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);

}



function stopRec(){

mediaRecorder.stop();

mediaRecorder.onstop=()=>{

const blob=new Blob(audioChunks);

const reader=new FileReader();

reader.readAsDataURL(blob);

reader.onloadend=()=>{

db.ref("msgs/"+activeId).push({

sid:user.id,
audio:reader.result,
t:Date.now()

});

};

};

}



async function startRecCocon(){

let stream=await navigator.mediaDevices.getUserMedia({audio:true});

mediaRecorder=new MediaRecorder(stream);

mediaRecorder.start();

audioChunks=[];

mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);

}



function stopRecCocon(){

mediaRecorder.stop();

mediaRecorder.onstop=()=>{

const blob=new Blob(audioChunks);

const reader=new FileReader();

reader.readAsDataURL(blob);

reader.onloadend=()=>{

db.ref("cocon/"+user.coconId).push({

sid:user.id,
audio:reader.result,
t:Date.now()

});

};

};

}



/* =========================
CONTACTS
========================= */

function loadContacts(){

db.ref("users/"+user.id+"/contacts").on("value",s=>{

let list=document.getElementById("chatList");

list.innerHTML="";

s.forEach(sn=>{

db.ref("users/"+sn.key).once("value",u=>{

let d=u.val();

let div=document.createElement("div");

div.style="display:flex;padding:15px;background:var(--card);border-radius:20px;margin-bottom:10px";

div.innerHTML="<b>"+d.pseudo+"</b>";

div.onclick=()=>openChat(d.id,d.pseudo);

list.appendChild(div);

});

});

});

}



</script>

</body>
</html>
