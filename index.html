<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --wa-green: #00a884; 
            --wa-bg: #111b21; 
            --wa-panel: #202c33; 
            --wa-bubble-me: #005c4b; 
            --wa-bubble-them: #202c33; 
            --wa-text: #e9edef;
            --wa-secondary: #8696a0;
            --wa-danger: #f15c6d;
            --love-pink: #ff4b6e;
            --love-bg: #1a0a0d;
            --auth-gradient: linear-gradient(135deg, #00a884 0%, #111b21 100%);
        }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* --- AUTHENTIFICATION ÉCLAIRCIE (v.10) --- */
        #authLayer { position: fixed; inset:0; background: var(--auth-gradient); z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { 
            width: 100%; max-width: 350px; text-align: center; background: rgba(255, 255, 255, 0.98); 
            padding: 40px 25px; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); color: #111b21;
        }
        .auth-card h1 { font-family: 'Pacifico', cursive; color: var(--wa-green); font-size: 32px; margin-bottom: 20px; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .auth-tab { flex: 1; padding: 12px; cursor: pointer; font-weight: 700; color: #999; transition: 0.3s; }
        .auth-tab.active { color: var(--wa-green); border-bottom: 4px solid var(--wa-green); }
        .auth-card input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #ddd; background: #f9f9f9; box-sizing: border-box; outline: none; font-size: 16px; }

        /* --- STRUCTURE APP --- */
        .header { background: var(--wa-panel); padding: 50px 16px 12px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header h1 { font-size: 22px; margin: 0; font-weight: 700; }
        .view { height: calc(100vh - 130px); overflow-y: auto; display: none; padding-bottom: 80px; }
        .view-active { display: block; }

        /* --- CHAT LIST --- */
        .chat-item { display: flex; padding: 15px 20px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: background 0.2s; }
        .chat-item:active { background: rgba(255,255,255,0.05); }
        .avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #374045; border: 1px solid rgba(255,255,255,0.1); }
        .chat-info { flex: 1; }
        .chat-info b { font-size: 17px; color: #fff; text-transform: capitalize; }
        .chat-info p { margin: 3px 0 0; font-size: 13px; color: var(--wa-secondary); }

        /* --- MESSAGES & CONFIRMATIONS (Double Check) --- */
        .msg-container { display: flex; flex-direction: column; padding: 15px; gap: 8px; background-color: #0b141a; height: calc(100vh - 200px); overflow-y: auto; scroll-behavior: smooth; }
        .bubble { padding: 10px 14px; border-radius: 14px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        .mine { align-self: flex-end; background: var(--wa-bubble-me); border-top-right-radius: 2px; }
        .theirs { align-self: flex-start; background: var(--wa-bubble-them); border-top-left-radius: 2px; }
        .m-meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .seen-check { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: bold; }
        .seen-blue { color: #53bdeb; } /* Double check bleu */

        /* --- MODE COCON --- */
        .cocon-active .header { background: #3d141b; border-bottom: 2px solid var(--love-pink); }
        .cocon-active .msg-container { background-color: var(--love-bg); background-image: url('https://www.transparenttextures.com/patterns/heart.png'); }
        .cocon-active .bubble.mine { background: var(--love-pink); }
        .cocon-active .nav-tab.active { color: var(--love-pink); }
        .typing-indicator { font-size: 11px; color: var(--wa-green); font-style: italic; margin-top: 2px; }
        .love-typing { color: var(--love-pink); }

        .counter-badge { background: rgba(255, 75, 110, 0.15); color: var(--love-pink); padding: 5px 15px; border-radius: 20px; font-weight: 700; border: 1px solid var(--love-pink); display: inline-block; animation: pulse 2.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* --- NAVIGATION --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--wa-panel); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-tab { color: var(--wa-secondary); font-size: 12px; text-align: center; opacity: 0.6; cursor: pointer; }
        .nav-tab.active { color: var(--wa-green); opacity: 1; font-weight: 700; }
        .nav-tab span { font-size: 24px; display: block; }

        /* --- INPUTS --- */
        .input-area { background: var(--wa-panel); padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: fixed; bottom: 65px; width: 100%; box-sizing: border-box; }
        .input-area input { flex: 1; background: #2a3942; border: none; padding: 14px 20px; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        .send-btn { background: var(--wa-green); border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: 0.3s; }
        .send-btn:active { transform: scale(0.9); }

        .lock-screen { position: absolute; inset: 0; background: var(--wa-bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #friendOverlay { position: fixed; inset: 0; background: var(--wa-bg); z-index: 10000; display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="authLayer">
    <div class="auth-card">
        <h1>Notre Univers</h1>
        <div class="auth-tabs">
            <div id="tabLogin" class="auth-tab active" onclick="setAuthMode('login')">Connexion</div>
            <div id="tabSignup" class="auth-tab" onclick="setAuthMode('signup')">S'inscrire</div>
        </div>
        <input type="text" id="aName" placeholder="Ton Surnom">
        <input type="password" id="aPass" placeholder="Mot de passe">
        <button onclick="handleAuth()" class="send-btn" style="width:100%; border-radius:15px; font-weight:700;">VALIDER</button>
    </div>
</div>

<div id="app" style="display:none;">
    
    <div id="vWorld" class="view view-active">
        <div class="header"><h1>Communauté</h1></div>
        <div id="listFriends"></div>
    </div>

    <div id="vCouple" class="view">
        <div id="lockCocon" class="lock-screen">
            <span style="font-size:70px; margin-bottom:20px;">🔐</span>
            <h2 style="font-family:'Pacifico'; color:var(--love-pink);">Espace Secret</h2>
            <input type="password" id="unlockCode" placeholder="Code secret..." style="width:230px; padding:16px; border-radius:15px; border:none; background:var(--wa-panel); color:white; text-align:center; margin: 20px 0; outline:none; font-size:18px;">
            <button class="send-btn" style="background:var(--love-pink); width:200px; border-radius:15px; font-weight:700;" onclick="verifyCocon()">DÉVERROUILLER</button>
        </div>
        
        <div id="coconContent" style="display:none;">
            <div class="header">
                <div style="display:flex; align-items:center; gap:12px;">
                    <span style="font-size:26px;">💖</span>
                    <div>
                        <h1 style="font-size:18px; font-family:'Pacifico';">Cocon Privé</h1>
                        <div id="dayCounter"></div>
                    </div>
                </div>
                <div id="coupleTyping" class="typing-indicator love-typing"></div>
            </div>
            <div id="cBox" class="msg-container"></div>
            <div class="input-area">
                <input type="text" id="cInput" placeholder="Message secret..." oninput="updateTyping('couple')">
                <button class="send-btn" style="background:var(--love-pink);" onclick="sendCoupleMsg()">❤️</button>
            </div>
        </div>
    </div>

    <div id="vSets" class="view">
        <div class="header"><h1>Réglages</h1></div>
        <div style="padding: 20px;">
            <div style="background:var(--wa-panel); padding:20px; border-radius:20px; margin-bottom:15px;">
                <label style="color:var(--wa-green); font-size:11px; font-weight:700; text-transform:uppercase;">Photo de profil (Lien URL)</label>
                <input type="text" id="setAvatar" style="width:100%; background:transparent; border:none; color:white; font-size:15px; margin-top:8px; outline:none;" placeholder="Lien image...">
            </div>
            <div style="background:var(--wa-panel); padding:20px; border-radius:20px; margin-bottom:15px;">
                <label style="color:var(--wa-green); font-size:11px; font-weight:700; text-transform:uppercase;">Code de déverrouillage</label>
                <input type="text" id="setCode" style="width:100%; background:transparent; border:none; color:white; font-size:18px; margin-top:8px; outline:none;">
            </div>
            <div style="background:var(--wa-panel); padding:20px; border-radius:20px; margin-bottom:20px;">
                <label style="color:var(--wa-green); font-size:11px; font-weight:700; text-transform:uppercase;">Date de rencontre</label>
                <input type="date" id="setMeet" style="width:100%; background:transparent; border:none; color:white; font-size:16px; margin-top:8px; outline:none; color-scheme:dark;">
            </div>
            <button class="send-btn" style="width:100%; border-radius:15px; font-weight:700;" onclick="saveSettings()">SAUVEGARDER</button>
            <p onclick="logout()" style="text-align:center; color:var(--wa-danger); margin-top:40px; font-size:14px; cursor:pointer; font-weight:700;">SE DÉCONNECTER</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-tab active" onclick="nv('vWorld', this)"><span>🌎</span>Monde</div>
        <div class="nav-tab" onclick="nv('vCouple', this)"><span>❤️</span>Cocon</div>
        <div class="nav-tab" onclick="nv('vSets', this)"><span>⚙️</span>Réglages</div>
    </nav>
</div>

<div id="friendOverlay">
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <span onclick="closeFriendChat()" style="font-size:30px; cursor:pointer;">←</span>
            <img id="fChatAvatar" src="" class="avatar" style="width:40px; height:40px; margin:0;">
            <div>
                <b id="fNameTitle" style="font-size:18px;">Ami</b>
                <div id="friendTyping" class="typing-indicator"></div>
            </div>
        </div>
    </div>
    <div id="fBox" class="msg-container"></div>
    <div class="input-area" style="bottom: 0;">
        <input type="text" id="fInput" placeholder="Message..." oninput="updateTyping('friend')">
        <button class="send-btn" onclick="sendFriendMsg()">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v11_user'));
    let authMode = 'login';
    let currentFCId = null;
    let isTyping = false;

    function setAuthMode(m) { authMode = m; document.getElementById('tabLogin').classList.toggle('active', m === 'login'); document.getElementById('tabSignup').classList.toggle('active', m === 'signup'); }

    async function handleAuth() {
        const n = document.getElementById('aName').value.trim().toLowerCase();
        const p = document.getElementById('aPass').value;
        if(!n || !p) return alert("Champs vides");
        const s = await db.ref('users').orderByChild('name').equalTo(n).once('value');
        if (authMode === 'login') {
            if (s.exists()) {
                const u = Object.values(s.val())[0];
                if (u.pass === p) login(u); else alert("Mot de passe incorrect");
            } else alert("Compte inconnu");
        } else {
            if (s.exists()) alert("Surnom déjà pris");
            else {
                const nu = { id:'u'+Date.now(), name:n, pass:p, pfp:'https://ui-avatars.com/api/?name='+n, code:'', meet:'' };
                await db.ref('users/'+nu.id).set(nu); login(nu);
            }
        }
    }

    function login(u) {
        user = u; localStorage.setItem('nu_v11_user', JSON.stringify(u));
        document.getElementById('authLayer').style.display='none'; document.getElementById('app').style.display='block';
        initApp();
    }

    function logout() { localStorage.removeItem('nu_v11_user'); location.reload(); }
    if(user) login(user);

    function initApp() {
        document.getElementById('setCode').value = user.code || "";
        document.getElementById('setMeet').value = user.meet || "";
        document.getElementById('setAvatar').value = user.pfp || "";
        loadFriends();
        if(user.code) {
            db.ref('couples/'+user.code+'/chat').on('value', s => {
                const b = document.getElementById('cBox'); b.innerHTML = "";
                s.forEach(snap => {
                    const m = snap.val();
                    renderMsg(b, m, m.sid === user.id);
                    if(m.sid !== user.id && !m.seen) db.ref('couples/'+user.code+'/chat/'+snap.key).update({seen:true});
                });
                b.scrollTop = b.scrollHeight;
            });
            db.ref('couples/'+user.code+'/typing').on('value', s => {
                const t = s.val();
                document.getElementById('coupleTyping').innerText = (t && t !== user.id) ? "est en train d'écrire..." : "";
            });
            updateCounter();
        }
    }

    function renderMsg(container, m, mine) {
        const t = new Date(m.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const seenClass = m.seen ? "seen-blue" : "";
        container.innerHTML += `
            <div class="bubble ${mine?'mine':'theirs'}">
                ${m.txt}
                <div class="m-meta">
                    ${t} ${mine ? `<span class="seen-check ${seenClass}">✔✔</span>` : ''}
                </div>
            </div>`;
    }

    function loadFriends() {
        db.ref('users').on('value', s => {
            const d = document.getElementById('listFriends'); d.innerHTML = "";
            s.forEach(snap => {
                const u = snap.val(); if(u.id === user.id) return;
                d.innerHTML += `<div class="chat-item" onclick="openFriendChat('${u.id}','${u.name}','${u.pfp}')"><img src="${u.pfp}" class="avatar"><div class="chat-info"><b>${u.name}</b><p>En ligne</p></div></div>`;
            });
        });
    }

    function openFriendChat(fId, fName, fPfp) {
        currentFCId = [user.id, fId].sort().join('_');
        document.getElementById('fNameTitle').innerText = fName;
        document.getElementById('fChatAvatar').src = fPfp;
        document.getElementById('friendOverlay').style.display = 'flex';
        db.ref('private_chats/'+currentFCId+'/chat').on('value', s => {
            const b = document.getElementById('fBox'); b.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                renderMsg(b, m, m.sid === user.id);
                if(m.sid !== user.id && !m.seen) db.ref('private_chats/'+currentFCId+'/chat/'+snap.key).update({seen:true});
            });
            b.scrollTop = b.scrollHeight;
        });
        db.ref('private_chats/'+currentFCId+'/typing').on('value', s => {
            const t = s.val();
            document.getElementById('friendTyping').innerText = (t && t !== user.id) ? "écrit..." : "";
        });
    }

    function updateTyping(mode) {
        const path = mode === 'couple' ? 'couples/'+user.code+'/typing' : 'private_chats/'+currentFCId+'/typing';
        if(!isTyping) {
            isTyping = true; db.ref(path).set(user.id);
            setTimeout(() => { isTyping = false; db.ref(path).set(null); }, 3000);
        }
    }

    function closeFriendChat() { document.getElementById('friendOverlay').style.display='none'; }

    function sendFriendMsg() {
        const i = document.getElementById('fInput'); if(!i.value.trim()) return;
        db.ref('private_chats/'+currentFCId+'/chat').push({sid:user.id, txt:i.value.trim(), t:Date.now(), seen:false});
        i.value = "";
    }

    function sendCoupleMsg() {
        const i = document.getElementById('cInput'); if(!i.value.trim()) return;
        db.ref('couples/'+user.code+'/chat').push({sid:user.id, txt:i.value.trim(), t:Date.now(), seen:false});
        i.value = "";
    }

    function nv(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.getElementById(id).classList.add('view-active');
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if(id === 'vCouple') document.body.classList.add('cocon-active');
        else { document.body.classList.remove('cocon-active'); document.getElementById('lockCocon').style.display = 'flex'; document.getElementById('coconContent').style.display = 'none'; }
    }

    function verifyCocon() {
        if(document.getElementById('unlockCode').value === user.code) {
            document.getElementById('lockCocon').style.display = 'none';
            document.getElementById('coconContent').style.display = 'block';
        } else alert("Code erroné.");
    }

    function updateCounter() {
        if(!user.meet) return;
        const diff = Math.floor((new Date() - new Date(user.meet)) / (1000*60*60*24));
        document.getElementById('dayCounter').innerHTML = `<span class="counter-badge">${diff} jours d'amour ✨</span>`;
    }

    function saveSettings() {
        const u = { code: document.getElementById('setCode').value.trim(), meet: document.getElementById('setMeet').value, pfp: document.getElementById('setAvatar').value.trim() };
        db.ref('users/'+user.id).update(u).then(() => { user = {...user, ...u}; localStorage.setItem('nu_v11_user', JSON.stringify(user)); location.reload(); });
    }
</script>
</body>
</html>
