<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Elite v7.3</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff2d55; --primary: #5856d6; --bg: #050505; --card: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12); }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* SPLASH */
        #splash { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .loader-logo { font-size: 50px; font-weight: 800; background: linear-gradient(45deg, var(--accent), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* UI SHELL */
        .app-shell { height: 100vh; display: flex; flex-direction: column; display: none; }
        .top-nav { padding: 50px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 120px; }
        .view-active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CONTACTS LIST (Correction de la capture) */
        .contact-item { background: var(--card); padding: 18px; border-radius: 22px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); transition: 0.2s; }
        .contact-item:active { transform: scale(0.98); background: rgba(255,255,255,0.12); }
        .options-btn { font-size: 22px; padding: 5px 15px; color: white; opacity: 0.6; cursor: pointer; }

        /* MESSAGES */
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 15px; }
        .bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
        .mine { align-self: flex-end; align-items: flex-end; }
        .theirs { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 14px 18px; border-radius: 22px; font-size: 15px; }
        .mine .bubble { background: var(--primary); border-bottom-right-radius: 4px; }
        .theirs .bubble { background: var(--card); border-bottom-left-radius: 4px; }
        .m-time { font-size: 9px; opacity: 0.3; margin-top: 4px; }

        /* NAV BAR (Plus visible que sur la capture) */
        .bottom-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--border); z-index: 5000; }
        .nav-item { font-size: 26px; opacity: 0.2; transition: 0.3s; }
        .nav-active { opacity: 1; transform: translateY(-5px); }
        
        .btn-main { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 800; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; margin-bottom: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="splash">
    <div class="loader-logo">NEXUS</div>
</div>

<div id="authLayer" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center; padding:30px;">
    <div class="glass" style="padding: 40px; border-radius: 45px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border);">
        <h2 style="font-weight:800; margin-bottom:25px;">NEXUS</h2>
        <input type="text" id="aName" placeholder="Surnom">
        <input type="password" id="aPass" placeholder="Mot de passe">
        <button class="btn-main" onclick="handleAuth()">ENTRER</button>
        <p style="font-size:10px; opacity:0.4; margin-top:20px;">Cliquez sur Entrer pour activer les notifications</p>
    </div>
</div>

<div class="app-shell" id="app">
    <div class="top-nav">
        <div style="font-weight: 800; font-size: 24px;">NEXUS</div>
        <img id="myAvatar" src="" style="width:45px; height:45px; border-radius:18px; border:2px solid var(--accent); object-fit:cover;">
    </div>

    <div id="vWorld" class="view view-active">
        <div style="display: flex; gap: 20px; margin-bottom: 25px; font-size: 14px; font-weight: 700;">
            <span onclick="setTab('chats')" id="tC" style="color:var(--accent);">MES CHATS</span>
            <span onclick="setTab('disc')" id="tD" style="opacity:0.3;">DÉCOUVRIR</span>
        </div>
        <div id="listChats"></div>
        <div id="listDisc" style="display:none;"></div>
    </div>

    <div id="vCouple" class="view">
        <div id="dayCounter" style="background:linear-gradient(90deg, var(--accent), var(--primary)); padding:18px; border-radius:22px; text-align:center; font-weight:800; font-size:14px; margin-bottom:20px;"></div>
        <div id="cBox" class="msg-list glass" style="height:calc(100vh - 420px); border-radius:30px;"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <input type="text" id="cInput" placeholder="Message..." style="margin:0;">
            <button onclick="sendMsg()" class="btn-main" style="width:65px; margin:0;">➔</button>
        </div>
    </div>

    <div id="vSets" class="view">
        <h2 style="font-weight:800; margin-bottom:25px;">Réglages</h2>
        <div class="glass" style="padding:25px; border-radius:30px; margin-bottom:20px; border:1px solid var(--border);">
            <p style="font-size:12px; opacity:0.5;">CODE COUPLE</p>
            <input type="password" id="setCode">
            <p style="font-size:12px; opacity:0.5;">DATE DE RENCONTRE</p>
            <input type="date" id="setMeet">
            <button onclick="saveSets()" class="btn-main">ENREGISTRER</button>
        </div>
        <button onclick="localStorage.clear();location.reload();" style="width:100%; background:none; border:none; color:grey; margin-top:20px; font-size:11px;">DÉCONNEXION</button>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item nav-active" onclick="nv('vWorld', this)">🌎</div>
        <div class="nav-item" onclick="nv('vCouple', this)">❤️</div>
        <div class="nav-item" onclick="nv('vSets', this)">⚙️</div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nexus_v7_3'));

    // --- CORRECTION NOTIFICATIONS ---
    function enableNotifications() {
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") console.log("Notifications activées");
            });
        }
    }

    function sendPush() {
        if (Notification.permission === "granted" && document.hidden) {
            try {
                new Notification("Nexus", { body: "Nouveau message reçu", icon: "https://ui-avatars.com/api/?name=N&background=ff2d55&color=fff" });
            } catch(e) { console.log("Erreur notification"); }
        }
    }

    window.onload = () => { setTimeout(() => { document.getElementById('splash').style.opacity='0'; setTimeout(()=>document.getElementById('splash').style.display='none',500); }, 1500); };

    // --- AUTH & CORE ---
    async function handleAuth() {
        enableNotifications(); // Activation forcée au clic
        const n = document.getElementById('aName').value.trim().toLowerCase();
        const p = document.getElementById('aPass').value;
        if(!n || !p) return;
        const s = await db.ref('users').orderByChild('name').equalTo(n).once('value');
        if(s.exists()){
            const u = Object.values(s.val())[0];
            if(u.pass === p) login(u);
            else alert("Code incorrect");
        } else {
            const nu = { id:'u'+Date.now(), name:n, pass:p, pfp:'https://ui-avatars.com/api/?background=5856d6&color=fff&name='+n, code:'' };
            await db.ref('users/'+nu.id).set(nu);
            login(nu);
        }
    }

    function login(u) {
        user = u;
        localStorage.setItem('nexus_v7_3', JSON.stringify(u));
        document.getElementById('authLayer').style.display='none';
        document.getElementById('app').style.display='flex';
        initApp();
    }

    if(user) login(user);

    function initApp() {
        document.getElementById('myAvatar').src = user.pfp;
        document.getElementById('setCode').value = user.code || "";
        document.getElementById('setMeet').value = user.meet || "";
        
        if(user.code) {
            // Listener pour les notifications
            db.ref('couples/'+user.code+'/chat').limitToLast(1).on('child_added', snap => {
                const m = snap.val();
                if(m.sid !== user.id && (Date.now() - m.t < 4000)) {
                    sendPush();
                    if ("vibrate" in navigator) navigator.vibrate(100);
                }
            });

            // Affichage du chat
            db.ref('couples/'+user.code+'/chat').limitToLast(20).on('value', s => {
                const b = document.getElementById('cBox'); b.innerHTML = "";
                s.forEach(snap => {
                    const m = snap.val();
                    const mine = m.sid === user.id;
                    const time = new Date(m.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    b.innerHTML += `
                        <div class="bubble-wrap ${mine?'mine':'theirs'}">
                            <div class="bubble">${m.txt}</div>
                            <div class="m-time">${time}</div>
                        </div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
            updateCounter();
        }
        loadWorld();
    }

    function loadWorld() {
        db.ref('users').on('value', s => {
            const d = document.getElementById('listDisc'); d.innerHTML = "";
            s.forEach(snap => {
                const u = snap.val();
                if(u.id === user.id) return;
                d.innerHTML += `
                    <div class="contact-item">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <img src="${u.pfp}" style="width:40px;height:40px;border-radius:12px;">
                            <b style="text-transform:capitalize;">${u.name}</b>
                        </div>
                        <div class="options-btn" onclick="openOptions('${u.id}')">⋮</div>
                    </div>`;
            });
        });
    }

    function openOptions(targetId) {
        if(confirm("Voulez-vous bloquer cet utilisateur ?")) {
            alert("Utilisateur bloqué.");
            // Logique de blocage ici si besoin
        }
    }

    function sendMsg() {
        const i = document.getElementById('cInput');
        if(!i.value || !user.code) return;
        db.ref('couples/'+user.code+'/chat').push({ sid:user.id, txt:i.value, t:Date.now() });
        i.value = "";
    }

    function updateCounter() {
        if(!user.meet) return;
        const diff = Math.floor((new Date() - new Date(user.meet)) / (1000*60*60*24));
        document.getElementById('dayCounter').innerText = `✨ ${diff} JOURS DE BONHEUR ✨`;
    }

    function nv(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.getElementById(id).classList.add('view-active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        el.classList.add('nav-active');
    }

    function saveSets() {
        const up = { code: document.getElementById('setCode').value, meet: document.getElementById('setMeet').value };
        db.ref('users/'+user.id).update(up).then(() => {
            user = {...user, ...up};
            localStorage.setItem('nexus_v7_3', JSON.stringify(user));
            alert("Nexus mis à jour !");
            location.reload();
        });
    }

    function setTab(t) {
        document.getElementById('listChats').style.display = t==='chats'?'block':'none';
        document.getElementById('listDisc').style.display = t==='disc'?'block':'none';
        document.getElementById('tC').style.opacity = t==='chats'?'1':'0.3';
        document.getElementById('tD').style.opacity = t==='disc'?'1':'0.3';
    }
</script>
</body>
</html>
