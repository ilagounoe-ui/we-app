<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.34 - Original Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --text-sub: #b3b3b3;
        }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- HEADER & TABS v34 --- */
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }
        
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        /* --- DESIGN DES RÉGLAGES EN CARRÉS (v34) --- */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .set-card-sq { background: var(--card); padding: 20px; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .set-card-sq i { font-size: 24px; }

        /* --- PHOTO DE PROFIL & ICÔNE PAR DÉFAUT --- */
        .pfp-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; }
        #myPfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); background: #1a1a2e; }
        /* L'icône par défaut si pas de photo */
        .default-avatar { width: 100%; height: 100%; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--accent); border: 3px solid var(--accent); }

        /* --- BULLLES v34 --- */
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; position: relative; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 5px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 5px; }

        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="mainApp">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Notre Univers</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Chats</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active">
        <div id="chatList"></div>
    </div>

    <div id="vCocon" class="view">
        <div class="set-card-sq" style="width:100%; box-sizing:border-box;" onclick="openCocon()">
            <span>🔒</span>
            <b>Espace Cocon Privé</b>
            <small style="opacity:0.6">Clique pour entrer</small>
        </div>
    </div>

    <div id="vSet" class="view">
        <div class="pfp-wrap" onclick="document.getElementById('pfpIn').click()">
            <img id="myPfp" src="" style="display:none;">
            <div id="defaultIcon" class="default-avatar">👤</div>
            <div style="position:absolute; bottom:5px; right:5px; background:var(--accent); border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; color:#000;">📸</div>
            <input type="file" id="pfpIn" accept="image/*" style="display:none" onchange="uploadPfp(event)">
        </div>

        <div class="settings-grid">
            <div class="set-card-sq"><span>👤</span><b id="setPseudo">Pseudo</b></div>
            <div class="set-card-sq"><span>📞</span><b id="setPhone">Numéro</b></div>
            <div class="set-card-sq" onclick="alert('Bientôt disponible')"><span>🎨</span><b>Thèmes</b></div>
            <div class="set-card-sq" onclick="logout()" style="color:var(--love)"><span>🚪</span><b>Quitter</b></div>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="head">
        <span onclick="closeO('chatBox')">←</span>
        <b id="cHeaderName">...</b>
    </div>
    <div id="mArea" class="msg-area"></div>
    <div style="padding:15px; display:flex; gap:10px;">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:12px; border-radius:20px; color:white;">
        <button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeKey = null;

    function start() {
        if(!user) return;
        document.getElementById('setPseudo').innerText = user.pseudo;
        document.getElementById('setPhone').innerText = user.phone;
        updatePfpDisplay(user.pfp);
        loadChats();
    }

    // Gestion propre de l'affichage photo
    function updatePfpDisplay(imgData) {
        const img = document.getElementById('myPfp');
        const def = document.getElementById('defaultIcon');
        if(imgData) {
            img.src = imgData;
            img.style.display = 'block';
            def.style.display = 'none';
        } else {
            img.style.display = 'none';
            def.style.display = 'flex';
        }
    }

    function uploadPfp(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const base64 = ev.target.result;
            updatePfpDisplay(base64);
            db.ref('users/'+user.id).update({ pfp: base64 });
            user.pfp = base64;
            localStorage.setItem('nu_v33_user', JSON.stringify(user));
        };
        reader.readAsDataURL(file);
    }

    function loadChats() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `
                        <div class="set-card-sq" style="flex-direction:row; justify-content:flex-start; width:100%; margin-bottom:10px;" onclick="openChat('${u.id}', '${u.pseudo}')">
                            <div style="width:40px; height:40px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#000; font-weight:bold;">${u.pseudo[0]}</div>
                            <b style="margin-left:15px;">${u.pseudo}</b>
                        </div>`;
                });
            });
        });
    }

    function openChat(id, name) {
        activeKey = [user.id, id].sort().join('_');
        document.getElementById('cHeaderName').innerText = name;
        document.getElementById('chatBox').style.display = 'flex';
        db.ref('msgs/'+activeKey).on('value', s => {
            const area = document.getElementById('mArea'); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                const isMe = m.sid === user.id;
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">${m.txt}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        db.ref('msgs/'+activeKey).push({ sid:user.id, txt:i.value, t:Date.now() });
        i.value = "";
    }

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    function closeO(id) { document.getElementById(id).style.display='none'; }
    function logout() { localStorage.clear(); location.reload(); }

    if(user) start();
</script>
</body>
</html>
