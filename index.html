<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity ♾️</title>
    <style>
        :root {
            --primary: #ff4da6;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #0f0c29);
            font-family: 'Poppins', sans-serif; color: white; overflow: hidden;
        }

        .bg-stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
        }

        .container { position: relative; z-index: 10; width: 90%; max-width: 400px; }

        .card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; padding: 40px 20px; text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        /* Système de profils */
        .profile-selection { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        .profile-btn {
            background: rgba(255,255,255,0.1); border: 1px solid white;
            padding: 20px; border-radius: 15px; color: white;
            cursor: pointer; transition: 0.3s; font-size: 18px;
        }

        .profile-btn:hover { background: var(--primary); transform: scale(1.02); }

        .days-circle {
            width: 140px; height: 140px; border: 4px solid var(--primary);
            border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; margin: 0 auto 20px;
            box-shadow: 0 0 20px var(--primary);
        }

        .hidden { display: none; }
        
        button.main-btn {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none; padding: 15px; border-radius: 50px;
            color: white; font-weight: bold; width: 100%; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg-stars"></div>

    <div class="container">
        <div id="login-screen" class="card">
            <h1>Qui se connecte ?</h1>
            <div class="profile-selection">
                <button class="profile-btn" onclick="login('Lui')">🙋‍♂️ Lui</button>
                <button class="profile-btn" onclick="login('Elle')">🙋‍♀️ Elle</button>
            </div>
        </div>

        <div id="main-screen" class="card hidden">
            <h1 id="welcome-msg">Bonjour</h1>
            
            <div class="days-circle">
                <span style="font-size: 35px; font-weight: 800;" id="daysDisplay">0</span>
                <span style="font-size: 10px; text-transform: uppercase;">Jours</span>
            </div>

            <p id="personal-note" style="font-style: italic; font-size: 14px; opacity: 0.8; margin-bottom: 20px;"></p>
            
            <button class="main-btn" onclick="location.reload()">🔒 Déconnexion</button>
        </div>
    </div>

    <script>
        // Remplace par votre date de rencontre
        const startDate = "2023-01-01"; 

        function calculateDays() {
            const start = new Date(startDate);
            const today = new Date();
            return Math.floor((today - start) / (1000 * 60 * 60 * 24));
        }

        function login(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            
            document.getElementById('daysDisplay').innerText = calculateDays();
            
            const msg = document.getElementById('welcome-msg');
            const note = document.getElementById('personal-note');

            if(user === 'Elle') {
                msg.innerText = "Coucou ma Reine 👑";
                note.innerText = "Regarde tout le chemin qu'on a parcouru ensemble... Je t'aime plus que tout !";
                document.documentElement.style.setProperty('--primary', '#ff4da6');
            } else {
                msg.innerText = "Salut Champion ⚡";
                note.innerText = "Force à nous, chaque jour compte pour construire notre futur.";
                document.documentElement.style.setProperty('--primary', '#00d2ff'); // Bleu pour lui
            }
        }
    </script>
</body>
</html>
