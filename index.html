<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Redline v2</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #ff2d55; --primary: #5856d6; --bg: #050505; 
            --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); 
            color: white; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 0% 0%, #1a1a2e 0%, #050505 50%);
        }

        /* --- AUTH --- */
        #authLayer { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 40px; border: 1px solid var(--border); text-align: center; width: 80%; backdrop-filter: blur(20px); }

        /* --- LAYOUT --- */
        .app-shell { height: 100vh; display: flex; flex-direction: column; display: none; }
        .top-nav { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; background: linear-gradient(to right, #ff2d55, #5856d6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- PAGES --- */
        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 160px; scrollbar-width: none; }
        .view-active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- DASHBOARD COUPLE --- */
        .hero-card { 
            background: linear-gradient(135deg, rgba(255,45,85,0.2) 0%, rgba(88,86,214,0.2) 100%);
            border-radius: 35px; padding: 30px; border: 1px solid var(--border); position: relative; overflow: hidden; margin-bottom: 25px;
        }
        .days-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; margin: 0 auto 15px; background: rgba(0,0,0,0.3); box-shadow: 0 0 20px rgba(255,45,85,0.2); }

        /* --- MESSAGERIE --- */
        .user-row { background: var(--card); border-radius: 25px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid transparent; transition: 0.3s; }
        .pfp-wrap { position: relative; width: 55px; height: 55px; }
        .pfp-img { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; background: #222; }

        /* --- CHAT UNIFIÉ --- */
        .chat-container { background: var(--card); border-radius: 30px; padding: 20px; border: 1px solid var(--border); height: 350px; display: flex; flex-direction: column; }
        .msg-list { flex: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; scrollbar-width: none; }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 8px; font-size: 14px; line-height: 1.4; }
        .mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        /* --- BARRE DE MESSAGE RELEVÉE --- */
        .input-area { 
            position: fixed; bottom: 95px; left: 20px; right: 20px; 
            display: flex; gap: 10px; z-index: 100;
        }
        .msg-input { flex: 1; padding: 16px; border-radius: 22px; border: 1px solid var(--border); background: rgba(15,15,15,0.9); color: white; backdrop-filter: blur(10px); outline: none; }
        .send-btn { background: var(--accent); border: none; border-radius: 20px; width: 55px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* --- NAV BAR --- */
        .bottom-bar { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; height: 65px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(30px);
            border-radius: 28px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { font-size: 24px; opacity: 0.3; transition: 0.3s; }
        .nav-active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        /* --- CONFIG --- */
        .config-box { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .btn-grad { background: linear-gradient(to right, var(--accent), var(--primary)); border: none; padding: 18px; border-radius: 20px; color: white; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; }
        input[type="text"], input[type="date"], input[type="password"] { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white; margin-top: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="authLayer">
    <div class="auth-card">
        <div class="logo" style="margin-bottom: 30px; font-size: 32px;">NEXUS</div>
        <input type="text" id="regName" placeholder="Ton Surnom">
        <button class="btn-grad" onclick="signUp()">INITIALISER</button>
    </div>
</div>

<div class="app-shell" id="app">
    <div class="top-nav">
        <div class="logo">NEXUS</div>
        <img id="myAvatar" src="" style="width: 45px; height: 45px; border-radius: 15px; border: 2px solid var(--accent); object-fit: cover;">
    </div>

    <div id="viewCouple" class="view view-active">
        <div class="hero-card">
            <div class="days-circle" id="daysNum">0</div>
            <h2 style="margin: 0; text-align: center;">Ensemble ♾️</h2>
            <p id="partnerName" style="text-align: center; opacity: 0.6; font-size: 13px; margin-top: 5px;">Configure ton amour</p>
        </div>

        <div class="chat-container">
            <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
                <b style="font-size: 14px;">Cocon Privé ❤️</b>
                <span id="typingStatus" style="color: var(--accent); font-size: 11px;"></span>
            </div>
            <div id="coupleMsgs" class="msg-list"></div>
        </div>
        
        <div class="input-area">
            <input type="text" id="coupleIn" class="msg-input" placeholder="Lui dire quelque chose..." oninput="sendTyping()">
            <button class="send-btn" onclick="pushMsg('couple')">➔</button>
        </div>
    </div>

    <div id="viewFriends" class="view">
        <h3 style="margin-bottom: 20px;">Utilisateurs Gabon 🇬🇦</h3>
        <div id="friendsList"></div>
        
        <div id="chatOverlay" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:2000; flex-direction:column;">
            <div class="top-nav" style="background: var(--card); border-bottom: 1px solid var(--border);">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
                <b id="chatName">Ami</b>
                <div style="width:24px;"></div>
            </div>
            <div id="friendChatList" class="msg-list" style="padding: 20px; display: flex; flex-direction: column;"></div>
            <div class="input-area" style="bottom: 30px;">
                <input type="text" id="chatIn" class="msg-input" placeholder="Message privé...">
                <button class="send-btn" style="background:var(--primary)" onclick="pushMsg('direct')">➔</button>
            </div>
        </div>
    </div>

    <div id="viewSettings" class="view">
        <h3 style="margin-bottom:20px;">Profil & Sécurité</h3>
        
        <div class="config-box">
            <label style="font-size: 12px; opacity: 0.6;">CHANGER MA PHOTO</label>
            <input type="file" id="pfpUp" style="display:none" onchange="updatePfp(this)">
            <button onclick="document.getElementById('pfpUp').click()" style="width:100%; padding:12px; margin-top:10px; border-radius:12px; border:1px solid var(--accent); background:none; color:white; font-size:13px;">Choisir une image</button>
        </div>

        <div class="config-box">
            <label style="font-size: 12px; opacity: 0.6;">ESPACE COUPLE</label>
            <input type="text" id="setPartner" placeholder="Surnom du/de la partenaire">
            <input type="date" id="setDate">
            <input type="password" id="setCoupleCode" placeholder="Code Secret (ex: 1234)">
        </div>

        <button class="btn-grad" onclick="saveSettings()">SAUVEGARDER LES MODIFS</button>
        <p onclick="localStorage.clear();location.reload()" style="color:var(--accent); text-align:center; margin-top:30px; font-size: 14px; font-weight:600;">Déconnexion</p>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item nav-active" onclick="nav('viewCouple', this)">❤</div>
        <div class="nav-item" onclick="nav('viewFriends', this)">🌎</div>
        <div class="nav-item" onclick="nav('viewSettings', this)">⚙</div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs",
        databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nexus_redline_v2'));
    let activeChatId = null;

    if(user) {
        document.getElementById('authLayer').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        init();
    }

    function signUp() {
        const n = document.getElementById('regName').value;
        if(n) {
            const data = { 
                name: n, 
                id: 'u'+Date.now(), 
                pfp: 'https://ui-avatars.com/api/?name='+n+'&background=random&color=fff', 
                partner: '', code: '', date: '' 
            };
            db.ref('users/'+data.id).set(data);
            localStorage.setItem('nexus_redline_v2', JSON.stringify(data));
            location.reload();
        }
    }

    function init() {
        document.getElementById('myAvatar').src = user.pfp;
        document.getElementById('partnerName').innerText = user.partner ? "En couple avec " + user.partner : "Configure ton amour";
        document.getElementById('setPartner').value = user.partner || "";
        document.getElementById('setCoupleCode').value = user.code || "";
        document.getElementById('setDate').value = user.date || "";

        if(user.date) {
            const diff = Math.floor((new Date() - new Date(user.date)) / 86400000);
            document.getElementById('daysNum').innerText = diff >= 0 ? diff : 0;
        }

        // Liste des Amis
        db.ref('users').on('value', s => {
            const l = document.getElementById('friendsList'); l.innerHTML = "";
            s.forEach(c => {
                const u = c.val();
                if(u.id !== user.id) {
                    l.innerHTML += `
                        <div class="user-row" onclick="openDirect('${u.id}', '${u.name}')">
                            <div class="pfp-wrap"><img src="${u.pfp}" class="pfp-img"></div>
                            <div style="flex:1"><b>${u.name}</b><br><small style="opacity:0.4">Envoyer un message</small></div>
                            <span style="color:var(--primary)">➔</span>
                        </div>`;
                }
            });
        });

        // Sync Chat Couple
        if(user.code) {
            db.ref('couples/'+user.code+'/chat').limitToLast(30).on('value', s => {
                const b = document.getElementById('coupleMsgs'); b.innerHTML = "";
                s.forEach(c => {
                    const m = c.val();
                    b.innerHTML += `<div class="chat-bubble ${m.sid===user.id?'mine':'theirs'}">${m.txt}</div>`;
                });
                b.scrollTop = b.scrollHeight;
            });

            db.ref('couples/'+user.code+'/typing').on('value', s => {
                const t = s.val();
                document.getElementById('typingStatus').innerText = (t && t !== user.id) ? "écrit..." : "";
            });
        }
    }

    function openDirect(id, name) {
        activeChatId = user.id < id ? user.id+'_'+id : id+'_'+user.id;
        document.getElementById('chatOverlay').style.display = 'flex';
        document.getElementById('chatName').innerText = name;
        db.ref('directs/'+activeChatId).limitToLast(50).on('value', s => {
            const b = document.getElementById('friendChatList'); b.innerHTML = "";
            s.forEach(c => {
                const m = c.val();
                b.innerHTML += `<div class="chat-bubble ${m.sid===user.id?'mine':'theirs'}">${m.txt}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    function pushMsg(mode) {
        const id = (mode === 'couple') ? 'coupleIn' : 'chatIn';
        const input = document.getElementById(id);
        if(!input.value) return;
        const path = (mode === 'couple') ? 'couples/'+user.code+'/chat' : 'directs/'+activeChatId;
        db.ref(path).push({ sid: user.id, txt: input.value });
        input.value = "";
    }

    function sendTyping() {
        if(!user.code) return;
        db.ref('couples/'+user.code+'/typing').set(user.id);
        clearTimeout(window.tOut);
        window.tOut = setTimeout(() => db.ref('couples/'+user.code+'/typing').set(false), 2000);
    }

    function updatePfp(input) {
        if(input.files[0]) {
            const r = new FileReader();
            r.onload = e => {
                user.pfp = e.target.result;
                document.getElementById('myAvatar').src = user.pfp;
            };
            r.readAsDataURL(input.files[0]);
        }
    }

    function saveSettings() {
        user.partner = document.getElementById('setPartner').value;
        user.date = document.getElementById('setDate').value;
        user.code = document.getElementById('setCoupleCode').value.toLowerCase();
        localStorage.setItem('nexus_redline_v2', JSON.stringify(user));
        db.ref('users/'+user.id).update(user);
        alert("Profil mis à jour !");
        location.reload();
    }

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        document.getElementById(id).classList.add('view-active');
        el.classList.add('nav-active');
    }

    function closeChat() { document.getElementById('chatOverlay').style.display = 'none'; }
</script>
</body>
</html>
