<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.35 - Final</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3;
        }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- 1. SPLASH SCREEN --- */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease-out; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- UI PRINCIPALE (DESIGN v34) --- */
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); cursor: pointer; position: relative; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        /* --- CONTACTS & BADGES WHATSAPP --- */
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 20px; margin-bottom: 10px; position: relative; }
        .pfp-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: var(--accent); margin-right: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .badge-wa { position: absolute; right: 20px; background: #25D366; color: white; font-size: 10px; min-width: 18px; height: 18px; display: none; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .status-info { font-size: 10px; color: var(--text-sub); display: block; }

        /* --- BULLLES v34 (Inchangées) --- */
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; position: relative; word-wrap: break-word; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 5px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 5px; }
        .msg-meta { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.7; }
        .v-blue { color: var(--check); font-weight: bold; }

        /* --- RÉGLAGES --- */
        .pfp-edit { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; cursor: pointer; }
        #myPfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); }
        .pfp-icon { position: absolute; bottom: 0; right: 0; background: var(--accent); color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; }

        #chatBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div id="splash">
    <div style="font-family:'Pacifico'; font-size:35px; color:var(--accent);">Notre Univers</div>
    <div class="loader"></div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Chats</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active">
        <div id="chatList"></div>
        <div class="fab" onclick="addFriend()">+</div>
    </div>

    <div id="vCocon" class="view">
        <div style="text-align:center; padding-top:50px;">
            <p style="color:var(--text-sub)">Espace Cocon Privé</p>
            </div>
    </div>

    <div id="vSet" class="view">
        <div class="pfp-edit" onclick="triggerGallery()">
            <img id="myPfp" src="https://via.placeholder.com/150">
            <div class="pfp-icon">📸</div>
            <input type="file" id="pfpIn" accept="image/*" style="display:none" onchange="uploadPfp(event)">
        </div>
        <div style="text-align:center;">
            <h3 id="uPseudoDisp">Pseudo</h3>
            <p style="font-size:12px; opacity:0.6" id="uPhoneDisp"></p>
            <button onclick="logout()" style="color:var(--love); background:none; border:none; margin-top:20px;">Se déconnecter</button>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="head">
        <span onclick="closeChat()" style="font-size:24px;">←</span>
        <img id="cHeaderPfp" src="" class="pfp-img" style="width:40px; height:40px; margin:0">
        <div>
            <b id="cHeaderName">...</b>
            <small id="cHeaderStatus" class="status-info">Hors ligne</small>
        </div>
    </div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:10px; background:var(--bg)">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:12px; border-radius:20px; color:white; outline:none;">
        <button onclick="send()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; color:#000; font-weight:bold;">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeChatKey = null;
    let currentOpponent = null;

    // --- 1. CHARGEMENT & SPLASH ---
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                if(user) startApp();
                else window.location.href = "login.html"; // Rediriger si pas de session
            }, 800);
        }, 2500);
    };

    function startApp() {
        document.getElementById('mainApp').style.display='block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        document.getElementById('uPseudoDisp').innerText = user.pseudo;
        document.getElementById('uPhoneDisp').innerText = user.phone;
        if(user.pfp) document.getElementById('myPfp').src = user.pfp;
        
        updateOnlineStatus();
        loadChatList();
    }

    // --- 4. PRÉSENCE EN LIGNE ---
    function updateOnlineStatus() {
        const statusRef = db.ref('status/' + user.id);
        statusRef.set({ state: 'online', last: Date.now() });
        statusRef.onDisconnect().set({ state: 'offline', last: Date.now() });
    }

    // --- 3 & 6. LISTE CHATS & AUTO-ADD ---
    function loadChatList() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const container = document.getElementById('chatList');
            container.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    const chatKey = [user.id, u.id].sort().join('_');
                    
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.onclick = () => openChat(u.id, u.pseudo, u.pfp);
                    item.innerHTML = `
                        <img src="${u.pfp || 'https://via.placeholder.com/150'}" class="pfp-img">
                        <div>
                            <b>${u.pseudo}</b>
                            <span class="status-info" id="stat-${u.id}">Hors ligne</span>
                        </div>
                        <div class="badge-wa" id="badge-${u.id}">0</div>
                    `;
                    container.appendChild(item);

                    // Écouter le statut et les non-lus
                    db.ref('status/'+u.id).on('value', st => {
                        const info = st.val();
                        const txt = info?.state === 'online' ? 'En ligne' : 'Vu le ' + new Date(info?.last).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        document.getElementById('stat-'+u.id).innerText = txt;
                    });

                    db.ref('msgs/'+chatKey).on('value', ms => {
                        let count = 0;
                        ms.forEach(m => { if(m.val().sid !== user.id && !m.val().read) count++; });
                        const b = document.getElementById('badge-'+u.id);
                        if(b) { b.innerText = count; b.style.display = count > 0 ? 'flex' : 'none'; }
                    });
                });
            });
        });
    }

    // --- 5. SYSTÈME "VU" ---
    function openChat(id, name, pfp) {
        currentOpponent = id;
        activeChatKey = [user.id, id].sort().join('_');
        document.getElementById('cHeaderName').innerText = name;
        document.getElementById('cHeaderPfp').src = pfp || "https://via.placeholder.com/150";
        document.getElementById('chatBox').style.display = 'flex';
        
        // Marquer comme Lu
        db.ref('msgs/'+activeChatKey).once('value', s => {
            s.forEach(snap => { if(snap.val().sid === id) db.ref('msgs/'+activeChatKey+'/'+snap.key).update({read:true}); });
        });

        db.ref('msgs/'+activeChatKey).on('value', s => {
            const area = document.getElementById('mArea');
            area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                const isMe = m.sid === user.id;
                area.innerHTML += `
                    <div class="bubble ${isMe?'m-me':'m-they'}">
                        ${m.txt}
                        <div class="msg-meta">
                            ${new Date(m.t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                            ${isMe ? `<span class="${m.read?'v-blue':''}">✓✓</span>` : ''}
                        </div>
                    </div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function send() {
        const inp = document.getElementById('mIn');
        if(!inp.value.trim()) return;
        db.ref('msgs/'+activeChatKey).push({
            sid: user.id,
            txt: inp.value,
            t: Date.now(),
            read: false
        });
        inp.value = "";
    }

    // --- GALERIE PHOTO (Point 2) ---
    function triggerGallery() { document.getElementById('pfpIn').click(); }
    function uploadPfp(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const base64 = event.target.result;
            document.getElementById('myPfp').src = base64;
            db.ref('users/'+user.id).update({ pfp: base64 });
            user.pfp = base64;
            localStorage.setItem('nu_v33_user', JSON.stringify(user));
        };
        reader.readAsDataURL(file);
    }

    function addFriend() {
        const tel = prompt("Entrez le numéro de téléphone :");
        if(!tel) return;
        const id = "u_" + tel.replace(/\D/g, '');
        db.ref('users/'+id).once('value', s => {
            if(s.exists()){
                db.ref(`users/${user.id}/contacts/${id}`).set(true);
                db.ref(`users/${id}/contacts/${user.id}`).set(true); // Auto-add
                alert("Ami ajouté !");
            } else alert("Utilisateur introuvable.");
        });
    }

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function closeChat() { document.getElementById('chatBox').style.display='none'; db.ref('msgs/'+activeChatKey).off(); }
    function logout() { localStorage.clear(); window.location.reload(); }
</script>
</body>
</html>
