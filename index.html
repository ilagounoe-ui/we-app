<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v49 - Ultimate</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* --- Base v44 --- */
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --online: #25D366;
            --gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* Animations */
        @keyframes scan { 0%, 100% { border-color: var(--accent); } 50% { border-color: var(--love); box-shadow: 0 0 20px var(--love); } }
        .unlocking { animation: scan 0.6s infinite !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); background: var(--love); } 100% { transform: scale(1); } }
        .recording { animation: pulse 0.8s infinite !important; background: var(--love) !important; }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--accent); border-top: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabs { display: flex; gap: 10px; margin-top: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 20px; font-size: 13px; background: var(--card); transition: 0.3s; color: rgba(255,255,255,0.6); }
        .tab.active { background: var(--accent); color: #000; font-weight: 600; }

        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 15px; }
        .pfp { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; background: #2a2a40; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }

        /* Messages */
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; background-size: cover; background-position: center; }
        .chat-head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 22px; max-width: 80%; font-size: 14.5px; position: relative; cursor: pointer; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        
        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 340px; padding: 30px; border-radius: 40px; border: 1px solid var(--accent); text-align: center; }
        .option-btn { width: 100%; padding: 16px; margin-top: 10px; border-radius: 20px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 20px; color: white; margin: 15px 0; text-align: center; }
        
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="splash"><div class="loader"></div></div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content" id="modalFrame">
        <h3 id="modalTitle" style="font-family:'Pacifico'; color:var(--accent);"></h3>
        <div id="modalBody"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" onclick="triggerBack()">Retour</button>
            <button class="option-btn" style="background:var(--accent); color:black;" id="modalConfirmBtn">OK</button>
        </div>
    </div>
</div>

<div id="authLayer" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:10000; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <div style="background:var(--card); padding:35px; border-radius:40px; width:100%; text-align:center;">
        <h2 style="font-family:'Pacifico'; color:var(--accent);">Notre Univers</h2>
        <div id="authContent">
            <input type="tel" id="lPhone" class="modal-input" placeholder="Numéro">
            <input type="password" id="lPass" class="modal-input" placeholder="Mot de passe">
            <button class="option-btn" style="background:var(--accent); color:black;" onclick="login()">Se connecter</button>
            <p onclick="showRegister()" style="font-size:12px; margin-top:20px; opacity:0.6;">Nouveau ? Créer un compte</p>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">...</h2>
            <div id="myPfpDisp" class="pfp" style="width:40px; height:40px; margin:0;" onclick="switchV('vSet', document.querySelectorAll('.tab')[2])"></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div><div class="fab" onclick="addFriend()">+</div></div>

    <div id="vCocon" class="view">
        <div style="background:var(--gradient); padding:30px; border-radius:35px; text-align:center; margin-bottom:20px;">
            <h3 style="font-family:'Pacifico'; margin:0;">Éternité</h3>
            <p id="timeCounter" style="font-size:22px; font-weight:bold; margin:10px 0 0;"></p>
        </div>
        <button onclick="askCoconCode()" class="option-btn" style="border:2px dashed var(--love); color:var(--love); background:transparent; padding:20px;">🌹 DÉVERROUILLER</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpBig" class="pfp" style="width:110px; height:110px; margin:0 auto 20px; border:3px solid var(--accent);" onclick="document.getElementById('pfpIn').click()">👤</div>
        <input type="file" id="pfpIn" hidden accept="image/*" onchange="uploadFile(this, 'pfp')">
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="option-btn" onclick="showAccountInfo()">ℹ️ Mon Compte</button>
            <button class="option-btn" onclick="openEdit('pseudo')">Pseudo</button>
            <button class="option-btn" onclick="openEdit('code')">Code Cocon</button>
            <button class="option-btn" onclick="changeWall()">Fond d'écran</button>
            <button class="option-btn" style="grid-column:span 2" onclick="openEdit('startDate', true)">📅 Date de début</button>
            <button class="option-btn" style="grid-column:span 2; color:var(--love); margin-top:30px;" onclick="logout()">Déconnexion</button>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="chat-head">
        <span onclick="triggerBack()" style="font-size:25px;">←</span>
        <div class="pfp" id="cHeadPfp" style="width:45px; height:45px; margin:0"></div>
        <div style="flex:1"><b id="cName">...</b><br><small id="cStatus">...</small></div>
        <div style="font-size:22px;" onclick="openChatOptions()">⋮</div>
    </div>
    <div class="msg-area" id="mArea"></div>
    <div id="typingDisp" style="padding:0 20px 5px; font-size:11px; color:var(--accent); display:none;">écrit...</div>
    <div style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.2); align-items:center;">
        <button class="option-btn" style="width:45px; height:45px; border-radius:50%; margin:0;" onclick="document.getElementById('imgIn').click()">🖼️</button>
        <button class="option-btn" id="micBtn" style="width:45px; height:45px; border-radius:50%; margin:0;">🎤</button>
        <input type="file" id="imgIn" hidden accept="image/*" onchange="uploadFile(this, 'msg')">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;" oninput="handleTyping()">
        <button onclick="sendMsg('msgs')" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; color:black;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="chat-head" style="background:var(--love);"><span onclick="triggerBack()" style="font-size:25px;">←</span><b style="flex:1; text-align:center;">Cocon</b></div>
    <div class="msg-area" id="coArea"></div>
    <div style="padding:15px; display:flex; gap:10px;"><input type="text" id="coIn" class="modal-input" style="margin:0; flex:1;" placeholder="Secret..."><button onclick="sendMsg('cocon')" style="background:var(--love); border:none; width:50px; height:50px; border-radius:50%; color:white;">➔</button></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null, currentPeerId = null, stateStack = [], audioUnlocked = false;
    let mediaRecorder, audioChunks = [];

    window.onload = () => { if(user) startApp(); else { document.getElementById('splash').style.display='none'; document.getElementById('authLayer').style.display='flex'; } };

    function startApp() {
        document.getElementById('splash').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        if(user.pfp) { const img = `<img src="${user.pfp}">`; document.getElementById('myPfpDisp').innerHTML = img; document.getElementById('pfpBig').innerHTML = img; }
        
        refreshPresence();
        loadContacts();
        setInterval(updateTimer, 1000);
        setupAudioEvents();
        listenGlobalNotifications();
    }

    // --- NAVIGATION ---
    function pushState(id) { stateStack.push(id); history.pushState({id}, ""); }
    window.onpopstate = () => {
        const last = stateStack.pop();
        if(last === 'chat' || last === 'cocon') { document.getElementById('chatBox').style.display='none'; document.getElementById('coconBox').style.display='none'; }
        if(last === 'modal') document.getElementById('customModal').style.display='none';
    };
    function triggerBack() { history.back(); }
    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    // --- MESSAGES & ACTIONS ---
    function openChat(id, name, pfp) {
        currentPeerId = id; activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('cHeadPfp').innerHTML = pfp ? `<img src="${pfp}">` : name[0];
        document.getElementById('chatBox').style.display = 'flex';
        if(user.wall) document.getElementById('chatBox').style.backgroundImage = `url(${user.wall})`;
        pushState('chat'); syncMsgs('msgs', activeId, 'mArea'); watchPeer(id);
    }

    function syncMsgs(root, target, areaId) {
        const path = root + '/' + target;
        db.ref(path).on('value', s => {
            const area = document.getElementById(areaId); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val(); const isMe = m.sid === user.id;
                if(!isMe && !m.seen) db.ref(path+'/'+snap.key).update({seen:true});
                
                let content = m.txt;
                if(m.type === 'img') content = `<img src="${m.txt}" style="width:100%; border-radius:15px;">`;
                if(m.type === 'audio') content = `<audio controls src="${m.txt}" style="width:100%; height:35px;"></audio>`;
                
                const div = document.createElement('div');
                div.className = `bubble ${isMe?'m-me':'m-they'}`;
                div.innerHTML = `${content}<div style="font-size:9px; opacity:0.6; text-align:right;">${new Date(m.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} ${isMe?(m.seen?'✓✓':'✓'):''}</div>`;
                div.onclick = () => openMsgMenu(path, snap.key, m.sid, m.txt);
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function openMsgMenu(path, msgId, sid, txt) {
        const isMe = sid === user.id;
        let html = `<button class="option-btn" onclick="copyTxt('${txt}')">📋 Copier</button>`;
        html += `<button class="option-btn" onclick="delMsg('${path}','${msgId}',false)">🗑️ Supprimer pour moi</button>`;
        if(isMe) html += `<button class="option-btn" style="color:var(--love)" onclick="delMsg('${path}','${msgId}',true)">🚫 Supprimer pour tous</button>`;
        openModal("Message", html);
    }

    function delMsg(path, id, forAll) { 
        if(forAll) db.ref(path+'/'+id).remove(); 
        else alert("Supprimé localement (simulation)"); // Firebase ne gère pas la suppression par utilisateur unique sans structure complexe
        triggerBack(); 
    }

    function copyTxt(t) { navigator.clipboard.writeText(t); alert("Copié !"); triggerBack(); }

    // --- REGLAGES ---
    function showAccountInfo() {
        const html = `
            <div style="text-align:left; font-size:14px; opacity:0.8;">
                <p><b>ID :</b> ${user.id}</p>
                <p><b>Pseudo :</b> ${user.pseudo}</p>
                <p><b>Date d'entrée :</b> ${new Date(user.startDate).toLocaleDateString()}</p>
            </div>
        `;
        openModal("Mon Compte", html);
    }

    function changeWall() {
        openModal("Fond d'écran", `<input type="text" id="modalInput" class="modal-input" placeholder="URL de l'image">`, (v) => {
            db.ref('users/'+user.id).update({wall:v});
            user.wall = v; localStorage.setItem('nu_v33_user', JSON.stringify(user)); triggerBack();
        });
    }

    // --- NOTIFICATIONS FIX ---
    function listenGlobalNotifications() {
        db.ref('msgs').on('child_changed', snap => {
            if(snap.key.includes(user.id)) {
                const lastMsg = Object.values(snap.val()).pop();
                if(lastMsg.sid !== user.id && !lastMsg.seen) {
                    if(audioUnlocked) new Audio('https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3').play();
                    if("Notification" in window && Notification.permission === "granted") {
                        new Notification("Nouveau message", { body: lastMsg.type==='text'?lastMsg.txt:'Fichier reçu' });
                    }
                }
            }
        });
        if("Notification" in window) Notification.requestPermission();
    }

    // --- AUDIO FIX ---
    function setupAudioEvents() {
        const btn = document.getElementById('micBtn');
        const start = async (e) => { e.preventDefault(); startRecord(); };
        const stop = (e) => { e.preventDefault(); stopRecord(); };
        btn.ontouchstart = btn.onmousedown = start;
        btn.ontouchend = btn.onmouseup = stop;
    }

    async function startRecord() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                const reader = new FileReader();
                reader.onload = (e) => db.ref('msgs/'+activeId).push({ sid: user.id, txt: e.target.result, t: Date.now(), type: 'audio', seen: false });
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start(); document.getElementById('micBtn').classList.add('recording');
        } catch(e) { alert("Micro bloqué."); }
    }
    function stopRecord() { if(mediaRecorder && mediaRecorder.state!=='inactive') { mediaRecorder.stop(); document.getElementById('micBtn').classList.remove('recording'); } }

    // --- FONCTIONS CLASSIQUES ---
    function sendMsg(mode) {
        const inp = document.getElementById(mode==='msgs'?'mIn':'coIn'); if(!inp.value.trim()) return;
        const path = mode==='msgs'?'msgs/'+activeId : 'cocon/'+user.code;
        db.ref(path).push({ sid: user.id, txt: inp.value, t: Date.now(), type: 'text', seen: false });
        inp.value = "";
    }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display = 'flex'; pushState('modal');
        document.getElementById('modalConfirmBtn').onclick = () => { if(a) a(document.getElementById('modalInput')?.value); else triggerBack(); };
    }

    function uploadFile(input, mode) {
        const reader = new FileReader();
        reader.onload = (e) => {
            if(mode === 'pfp') {
                db.ref('users/'+user.id).update({pfp: e.target.result});
                user.pfp = e.target.result; localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload();
            } else db.ref('msgs/'+activeId).push({ sid: user.id, txt: e.target.result, t: Date.now(), type: 'img', seen: false });
        };
        reader.readAsDataURL(input.files[0]);
    }

    function login() {
        const id = "u_"+document.getElementById('lPhone').value;
        db.ref('users/'+id).once('value', s => {
            if(s.exists() && s.val().pass === document.getElementById('lPass').value) {
                user = s.val(); localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload();
            } else alert("Erreur");
        });
    }

    function showRegister() {
        document.getElementById('authContent').innerHTML = `
            <input type="text" id="rPseudo" class="modal-input" placeholder="Pseudo">
            <input type="tel" id="rPhone" class="modal-input" placeholder="Numéro">
            <input type="password" id="rPass" class="modal-input" placeholder="Pass">
            <button class="option-btn" style="background:var(--accent); color:black;" onclick="register()">Créer</button>
        `;
    }

    function register() {
        const id = "u_"+document.getElementById('rPhone').value;
        const nu = { id, pseudo: document.getElementById('rPseudo').value, pass: document.getElementById('rPass').value, code: '0000', startDate: new Date().toISOString() };
        db.ref('users/'+id).set(nu).then(() => { user = nu; localStorage.setItem('nu_v33_user', JSON.stringify(nu)); location.reload(); });
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}','${u.pfp}')"><div class="pfp">${u.pfp?`<img src="${u.pfp}">`:u.pseudo[0]}</div><div><b>${u.pseudo}</b></div></div>`;
                });
            });
        });
    }

    function addFriend() {
        openModal("Ajouter", `<input type="tel" id="modalInput" class="modal-input" placeholder="Numéro">`, (tel) => {
            const id = "u_"+tel;
            db.ref('users/'+id).once('value', s => {
                if(s.exists()) { db.ref(`users/${user.id}/contacts/${id}`).set(true); db.ref(`users/${id}/contacts/${user.id}`).set(true); triggerBack(); }
            });
        });
    }

    function askCoconCode() {
        openModal("Sécurisé", `<input type="password" id="modalInput" class="modal-input" placeholder="Code secret">`, (val) => {
            if(val === user.code) { triggerBack(); document.getElementById('coconBox').style.display = 'flex'; pushState('cocon'); syncMsgs('cocon', user.code, 'coArea'); }
            else alert("Faux");
        });
    }

    function openEdit(f, d) {
        openModal("Modifier", `<input type="${d?'date':'text'}" id="modalInput" class="modal-input">`, (v) => {
            db.ref('users/'+user.id).update({[f]:v});
            user[f]=v; localStorage.setItem('nu_v33_user',JSON.stringify(user)); location.reload();
        });
    }

    function openChatOptions() {
        openModal("Options", `<button class="option-btn" onclick="clearChat()" style="color:var(--love)">🧹 Vider le chat</button>`);
    }
    function clearChat() { if(confirm("Vider ?")) { db.ref('msgs/'+activeId).remove(); triggerBack(); } }

    function refreshPresence() { db.ref('presence/'+user.id).set({ status: 'online', last: Date.now() }); db.ref('presence/'+user.id).onDisconnect().set({ status: 'offline', last: Date.now() }); }
    function watchPeer(id) { db.ref('presence/'+id).on('value', s => { 
        const d = s.val(); const el = document.getElementById('cStatus');
        if(!d) return; el.innerText = d.status === 'online' ? "en ligne" : "hors-ligne";
    }); }
    function updateTimer() { if(!user.startDate) return; const diff = new Date() - new Date(user.startDate); document.getElementById('timeCounter').innerText = Math.floor(diff/86400000)+" jours"; }
    function unlockAudio() { if(!audioUnlocked) { audioUnlocked = true; } }
    function logout() { localStorage.clear(); location.reload(); }
    function handleTyping() { db.ref('typing/'+activeId+'/'+user.id).set(true); setTimeout(()=>db.ref('typing/'+activeId+'/'+user.id).set(false), 2000); }
</script>
</body>
</html>
