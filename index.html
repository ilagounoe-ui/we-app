<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Universal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #6366f1; --love: #ff4d6d; --bg: #0f172a; 
            --glass: rgba(255, 255, 255, 0.08); --online: #10b981; 
        }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); 
            color: white; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        /* --- AUTH --- */
        #authOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center; padding: 25px;
        }
        .auth-card {
            background: var(--glass); backdrop-filter: blur(20px); padding: 30px;
            border-radius: 30px; width: 100%; max-width: 320px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        /* --- LAYOUT --- */
        .main-app { height: 100vh; display: flex; flex-direction: column; visibility: hidden; }

        /* STORIES / ONLINE USERS */
        .online-scroll {
            padding: 15px; display: flex; gap: 12px; overflow-x: auto;
            border-bottom: 1px solid rgba(255,255,255,0.05); scrollbar-width: none;
        }
        .user-node { display: flex; flex-direction: column; align-items: center; min-width: 55px; gap: 4px; }
        .avatar {
            width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--primary);
            position: relative; padding: 2px;
        }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: var(--online); border: 2px solid var(--bg); border-radius: 50%; }

        /* CONTENT */
        .content-area { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }

        /* TABS (Garder l'esprit des premières versions) */
        .tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 4px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; border: none; background: transparent; color: white; font-weight: 600; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .tab.active { background: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .tab.active.couple-mode { background: var(--love); }

        /* CHAT */
        #chatBox { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 10px; }
        .bbl { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .not-me { align-self: flex-start; background: var(--glass); border-bottom-left-radius: 4px; }
        .love-bbl { background: var(--love) !important; }

        /* INPUT */
        .input-bar { display: flex; gap: 8px; background: var(--glass); padding: 8px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .input-bar input { flex: 1; background: transparent; border: none; color: white; padding: 8px 12px; outline: none; font-size: 14px; }
        .input-bar button { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: bold; }

        button.love-btn { background: var(--love) !important; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <h2 style="margin:0 0 10px;">Nexus Universal ✨</h2>
        <p style="font-size: 12px; opacity: 0.6; margin-bottom: 25px;">Rejoins la communauté ou ton espace privé</p>
        <input type="text" id="regName" placeholder="Ton Pseudo" style="width:100%; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.2); color:white; margin-bottom:10px; box-sizing:border-box;">
        <input type="text" id="regCode" placeholder="Code Secret (Optionnel)" style="width:100%; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.2); color:white; margin-bottom:20px; box-sizing:border-box;">
        <button onclick="doAuth()" style="width:100%; padding:14px; border-radius:12px; border:none; background:var(--primary); color:white; font-weight:700; cursor:pointer;">DÉMARRER</button>
    </div>
</div>

<div class="main-app" id="app">
    <div class="online-scroll" id="statusList"></div>

    <div class="content-area">
        <div class="tabs">
            <button class="tab active" id="tabPub" onclick="changeMode('public')">COMMUNAUTÉ</button>
            <button class="tab" id="tabPriv" onclick="changeMode('private')">COUPLE ❤️</button>
        </div>

        <div id="chatBox"></div>

        <div class="input-bar">
            <input type="text" id="textInput" placeholder="Écris ici...">
            <button id="sendBtn" onclick="pushMsg()">➔</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (TA CONFIG ACTUELLE) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs",
        databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nexus_pro_v1'));
    let currentMode = 'public';

    if(user) {
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('app').style.visibility = 'visible';
        bootApp();
    }

    function doAuth() {
        const n = document.getElementById('regName').value.trim();
        const c = document.getElementById('regCode').value.trim().toLowerCase();
        if(n) {
            const d = { name: n, code: c || null, id: 'u' + Date.now() };
            localStorage.setItem('nexus_pro_v1', JSON.stringify(d));
            location.reload();
        }
    }

    function bootApp() {
        // Présence
        const sRef = db.ref('status/' + user.id);
        sRef.set({ name: user.name, online: true });
        sRef.onDisconnect().remove();

        // Liste des connectés
        db.ref('status').on('value', snap => {
            const list = document.getElementById('statusList');
            list.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                list.innerHTML += `
                    <div class="user-node">
                        <div class="avatar" style="border-color:${u.name === user.name ? 'var(--primary)' : 'rgba(255,255,255,0.1)'}">
                            <img src="https://ui-avatars.com/api/?name=${u.name}&background=random&color=fff">
                            <div class="dot"></div>
                        </div>
                        <span style="font-size:9px; opacity:0.7">${u.name}</span>
                    </div>`;
            });
        });

        loadData('public_chat');
    }

    function changeMode(m) {
        if(m === 'private' && !user.code) return alert("Besoin d'un Code Secret pour l'espace Couple !");
        
        currentMode = m;
        document.getElementById('tabPub').classList.toggle('active', m === 'public');
        document.getElementById('tabPriv').classList.toggle('active', m === 'private');
        document.getElementById('tabPriv').classList.toggle('couple-mode', m === 'private');
        document.getElementById('sendBtn').classList.toggle('love-btn', m === 'private');

        const path = (m === 'private') ? `couples/${user.code}/chat` : 'public_chat';
        loadData(path);
    }

    function loadData(path) {
        db.ref(path).off();
        db.ref(path).limitToLast(40).on('value', snap => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const isMe = m.sender === user.name;
                box.innerHTML += `
                    <div class="bbl ${isMe ? 'me' : 'not-me'} ${currentMode === 'private' ? 'love-bbl' : ''}">
                        <div style="font-size:9px; font-weight:700; margin-bottom:2px; opacity:0.6">${isMe ? 'Moi' : m.sender}</div>
                        ${m.text}
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function pushMsg() {
        const i = document.getElementById('textInput');
        if(!i.value) return;
        const path = (currentMode === 'private') ? `couples/${user.code}/chat` : 'public_chat';
        db.ref(path).push({ sender: user.name, text: i.value, time: Date.now() });
        i.value = "";
    }
</script>
</body>
</html>
