<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Redline v3.1</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff2d55; --primary: #5856d6; --bg: #050505; --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        .app-shell { height: 100vh; display: flex; flex-direction: column; }
        .top-nav { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 24px; background: linear-gradient(to right, var(--accent), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 180px; }
        .view-active { display: block; }

        /* --- UI ELEMENTS --- */
        .user-row { background: var(--card); border-radius: 20px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; }
        .pfp-img { width: 50px; height: 50px; border-radius: 15px; object-fit: cover; }
        
        /* --- CHAT --- */
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scrollbar-width: none; }
        .chat-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .mine { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .bubble-img { width: 100%; border-radius: 12px; display: block; margin-top: 5px; }

        /* --- CONTROLS --- */
        .dropdown { position: absolute; right: 10px; top: 45px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; display: none; flex-direction: column; z-index: 2000; width: 170px; }
        .dropdown button { background: none; border: none; color: white; padding: 12px; text-align: left; font-size: 12px; border-bottom: 1px solid var(--border); }
        
        .action-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-tool { flex: 1; background: var(--card); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; }

        /* --- NAV --- */
        .bottom-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 65px; background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { font-size: 24px; opacity: 0.3; transition: 0.3s; }
        .nav-active { opacity: 1; color: var(--accent); transform: scale(1.1); }
        
        #overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:1500; flex-direction:column; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: white; margin-top: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-shell" id="app">
    <div class="top-nav">
        <div class="logo">NEXUS</div>
        <img id="myAvatar" src="" style="width:40px; height:40px; border-radius:12px; border:2px solid var(--accent);">
    </div>

    <div id="vCouple" class="view view-active">
        <div class="action-bar">
            <button class="btn-tool" onclick="document.getElementById('pickPhoto').click()">📸 Photo</button>
            <button class="btn-tool" onclick="coupleGame()">🎮 Défi</button>
            <input type="file" id="pickPhoto" hidden accept="image/*" onchange="uploadPhoto(this, 'couple')">
        </div>
        <div style="background:var(--card); border-radius:25px; height:350px; display:flex; flex-direction:column; padding:15px; border:1px solid var(--border);">
            <div id="coupleMsgs" class="msg-list"></div>
        </div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <input type="text" id="cIn" class="msg-input" style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:15px; padding:12px; color:white;" placeholder="Secret...">
            <button onclick="sendMsg('couple')" style="background:var(--accent); border:none; border-radius:15px; width:50px; color:white;">➔</button>
        </div>
    </div>

    <div id="vSocial" class="view">
        <div style="display:flex; gap:15px; margin-bottom:15px; font-size:13px;">
            <span id="t1" class="nav-active" style="cursor:pointer;" onclick="setSoc('chats')">CHATS</span>
            <span id="t2" style="opacity:0.3; cursor:pointer;" onclick="setSoc('disc')">DÉCOUVRIR</span>
        </div>
        <div id="sChats"></div>
        <div id="sDisc" style="display:none"></div>

        <div id="overlay">
            <div class="top-nav" style="background:var(--card); border-bottom: 1px solid var(--border);">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
                <b id="chatTitle">Chat</b>
                <button onclick="tgl('chatOpt')" style="background:none; border:none; color:white;">⋮</button>
                <div id="chatOpt" class="dropdown">
                    <button onclick="clearChat()">Effacer le chat</button>
                    <button onclick="block()" style="color:var(--accent)">Bloquer</button>
                </div>
            </div>
            <div id="dmList" class="msg-list" style="padding:20px;"></div>
            <div style="padding:20px; display:flex; gap:10px;">
                <input type="text" id="dmIn" style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:15px; padding:12px; color:white;" placeholder="Message...">
                <button onclick="sendMsg('dm')" style="background:var(--primary); border:none; border-radius:15px; width:50px; color:white;">➔</button>
            </div>
        </div>
    </div>

    <div id="vSets" class="view">
        <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid var(--border);">
            <label style="font-size:11px; opacity:0.5;">STATUT</label>
            <input type="text" id="sStat">
            <label style="font-size:11px; opacity:0.5; margin-top:15px; display:block;">PARTENAIRE</label>
            <input type="text" id="sPart">
            <input type="password" id="sCode" placeholder="Code Secret">
            <button onclick="saveSets()" style="width:100%; background:var(--accent); border:none; padding:15px; border-radius:12px; color:white; margin-top:15px; font-weight:800;">ENREGISTRER</button>
        </div>
        <div id="mngUsers" style="margin-top:20px;"></div>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item nav-active" onclick="nv('vCouple', this)">❤</div>
        <div class="nav-item" onclick="nv('vSocial', this)">🌎</div>
        <div class="nav-item" onclick="nv('vSets', this)">⚙</div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const DB_KEY = 'nx_v3_1';
    let user = JSON.parse(localStorage.getItem(DB_KEY));
    let curDM = null, curOther = null;

    if(!user) {
        const n = prompt("Ton Surnom :");
        if(n) {
            user = { id: 'u'+Date.now(), name: n, pfp: 'https://ui-avatars.com/api/?name='+n, status: 'Hello Nexus!', code: '', ignored: {}, blocked: {} };
            db.ref('users/'+user.id).set(user);
            localStorage.setItem(DB_KEY, JSON.stringify(user));
        }
    }
    
    document.getElementById('app').style.display = 'flex';
    init();

    function init() {
        document.getElementById('myAvatar').src = user.pfp;
        document.getElementById('sStat').value = user.status;
        document.getElementById('sPart').value = user.partner || "";
        document.getElementById('sCode').value = user.code || "";

        db.ref('users/'+user.id).on('value', s => { user = s.val(); renderMng(); });

        // DISCOVER
        db.ref('users').on('value', s => {
            const l = document.getElementById('sDisc'); l.innerHTML = "";
            s.forEach(c => {
                const u = c.val();
                if(u.id !== user.id && (!user.ignored || !user.ignored[u.id]) && (!user.blocked || !user.blocked[u.id])) {
                    l.innerHTML += `<div class="user-row">
                        <img src="${u.pfp}" class="pfp-img" onclick="opDM('${u.id}','${u.name}')">
                        <div style="flex:1" onclick="opDM('${u.id}','${u.name}')"><b>${u.name}</b><br><small style="opacity:0.4">${u.status}</small></div>
                        <button onclick="tgl('o_${u.id}')" style="background:none;border:none;color:white;">⋮</button>
                        <div id="o_${u.id}" class="dropdown">
                            <button onclick="ign('${u.id}')">Ignorer</button>
                            <button onclick="bl('${u.id}')">Bloquer</button>
                        </div>
                    </div>`;
                }
            });
        });

        // CHATS LIST
        db.ref('users/'+user.id+'/lastChats').on('value', s => {
            const l = document.getElementById('sChats'); l.innerHTML = "";
            s.forEach(c => {
                const d = c.val();
                db.ref('users/'+d.with).once('value', us => {
                    const u = us.val();
                    l.innerHTML = `<div class="user-row" onclick="opDM('${u.id}','${u.name}')"><img src="${u.pfp}" class="pfp-img"><div style="flex:1"><b>${u.name}</b><div style="font-size:12px;opacity:0.5">${d.txt}</div></div></div>` + l.innerHTML;
                });
            });
        });

        // COUPLE
        if(user.code) {
            db.ref('couples/'+user.code+'/chat').limitToLast(20).on('value', s => {
                const b = document.getElementById('coupleMsgs'); b.innerHTML = "";
                s.forEach(c => {
                    const m = c.val();
                    const cnt = m.type === 'img' ? `<img src="${m.txt}" class="bubble-img">` : m.txt;
                    b.innerHTML += `<div class="chat-bubble ${m.sid===user.id?'mine':'theirs'}">${cnt}</div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
        }
    }

    function sendMsg(mode) {
        const i = document.getElementById(mode === 'couple' ? 'cIn' : 'dmIn');
        if(!i.value.trim()) return;
        if(mode === 'couple') {
            db.ref('couples/'+user.code+'/chat').push({ sid: user.id, txt: i.value });
        } else {
            db.ref('directs/'+curDM).push({ sid: user.id, txt: i.value });
            db.ref('users/'+user.id+'/lastChats/'+curOther).set({ with: curOther, txt: i.value });
            db.ref('users/'+curOther+'/lastChats/'+user.id).set({ with: user.id, txt: i.value });
        }
        i.value = "";
    }

    function uploadPhoto(el, mode) {
        const file = el.files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            const b64 = reader.result;
            if(mode === 'couple') db.ref('couples/'+user.code+'/chat').push({ sid: user.id, txt: b64, type: 'img' });
        };
        reader.readAsDataURL(file);
    }

    function coupleGame() {
        const g = ["Action: Envoie un selfie grimace !", "Vérité: Ton premier crush ?", "Action: Un message vocal de 5 sec", "Vérité: Ton plus grand rêve ?"];
        db.ref('couples/'+user.code+'/chat').push({ sid: 'sys', txt: "🎲 " + g[Math.floor(Math.random()*g.length)] });
    }

    function ign(id) { db.ref('users/'+user.id+'/ignored/'+id).set(true); }
    function bl(id) { db.ref('users/'+user.id+'/blocked/'+id).set(true); closeChat(); }
    function clearChat() { db.ref('directs/'+curDM).remove(); db.ref('users/'+user.id+'/lastChats/'+curOther).remove(); closeChat(); }

    function opDM(id, n) {
        curOther = id; curDM = user.id < id ? user.id+'_'+id : id+'_'+user.id;
        document.getElementById('overlay').style.display='flex';
        document.getElementById('chatTitle').innerText = n;
        db.ref('directs/'+curDM).on('value', s => {
            const b = document.getElementById('dmList'); b.innerHTML = "";
            s.forEach(c => b.innerHTML += `<div class="chat-bubble ${c.val().sid===user.id?'mine':'theirs'}">${c.val().txt}</div>`);
            b.scrollTop = b.scrollHeight;
        });
    }

    function renderMng() {
        const m = document.getElementById('mngUsers'); m.innerHTML = "<small style='opacity:0.3'>GÉRER : </small>";
        if(user.ignored) Object.keys(user.ignored).forEach(id => m.innerHTML += `<button onclick="db.ref('users/${user.id}/ignored/${id}').remove()" style="font-size:10px; margin:5px;">Récupérer Ignoré</button>`);
    }

    function saveSets() {
        db.ref('users/'+user.id).update({ status: document.getElementById('sStat').value, partner: document.getElementById('sPart').value, code: document.getElementById('sCode').value.toLowerCase() });
        alert("Sauvegardé !");
    }

    function nv(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        document.getElementById(id).classList.add('view-active'); el.classList.add('nav-active');
    }
    function tgl(id) { document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none'); document.getElementById(id).style.display='flex'; }
    function closeChat() { document.getElementById('overlay').style.display='none'; }
    function setSoc(t) {
        document.getElementById('sChats').style.display = t==='chats'?'block':'none';
        document.getElementById('sDisc').style.display = t==='disc'?'block':'none';
        document.getElementById('t1').style.opacity = t==='chats'?'1':'0.3';
        document.getElementById('t2').style.opacity = t==='disc'?'1':'0.3';
    }
</script>
</body>
                </html>
