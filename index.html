<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Notre Univers 💖</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff9a9e">
    
    <link rel="apple-touch-icon" href="94a99c728e9fab72bb967717213d2490.jpg">
    <link rel="icon" type="image/jpg" href="94a99c728e9fab72bb967717213d2490.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ff9a9e">

<link rel="manifest" href='data:application/manifest+json,{"name":"Notre Univers","short_name":"Univers","start_url":".","display":"standalone","background_color":"#ff9a9e","theme_color":"#ff4da6","icons":[{"src":"https://via.placeholder.com/512","sizes":"512x512","type":"image/png"}]}'>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        :root {
            --accent: #ff4da6;
            --accent-glow: rgba(255, 77, 166, 0.5);
            --bg-grad: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%);
            --card-bg: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Poppins', sans-serif; background: var(--bg-grad); overflow: hidden; color: white;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: url('94a99c728e9fab72bb967717213d2490.jpg') center/cover;
            filter: blur(12px) brightness(0.7); z-index: -1;
        }

        .card {
            background: var(--card-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 40px;
            width: 90%; max-width: 380px; height: 620px; display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px var(--accent-glow);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 35px 20px 15px; text-align: center; }
        .profile-img { width: 95px; height: 95px; border-radius: 50%; border: 4px solid white; object-fit: cover; box-shadow: 0 0 25px var(--accent-glow); }

        .content { flex: 1; overflow-y: auto; padding: 10px 25px; text-align: center; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }
        
        .page { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .box { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        button { background: linear-gradient(135deg, #ff4da6 0%, #ff7eb9 100%); border: none; padding: 15px; border-radius: 50px; color: white; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 77, 166, 0.4); text-transform: uppercase; font-size: 12px; }
        
        textarea, input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; padding: 12px; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; }

        .album-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-bottom: 20px; }
        .album-img { width: 100%; height: 110px; object-fit: cover; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2); }

        .nav { display: flex; justify-content: space-around; padding: 20px 10px; background: rgba(0, 0, 0, 0.3); border-radius: 0 0 40px 40px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { cursor: pointer; font-size: 24px; opacity: 0.4; transition: 0.4s; position: relative; }
        .nav-item.active-nav { opacity: 1; transform: scale(1.3) translateY(-5px); text-shadow: 0 0 15px var(--accent); }
        
        .badge { position: absolute; top: -5px; right: -8px; width: 10px; height: 10px; background: #ff3b30; border-radius: 50%; border: 2px solid white; display: none; box-shadow: 0 0 10px red; }

        .heart { position: fixed; font-size: 25px; top: -10%; animation: fall linear forwards; z-index: 1000; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img id="pfp" class="profile-img" src="" style="display:none;">
        <h2 id="userName" style="margin: 10px 0 5px;">Nous 💞</h2>
        <small id="ensembleDepuis" style="font-size: 13px; opacity: 0.8;"></small>
    </div>

    <div class="content">
        <div id="home" class="page active">
            <div class="box">
                <p style="margin:0; font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px;">Message de ton amour</p>
                <p id="motDouxDisplay" style="font-style: italic; font-weight: 600; margin-top:12px; font-size: 18px;"></p>
            </div>
            <button onclick="sparkle()">❤️ Envoyer des cœurs</button>
        </div>

        <div id="agenda" class="page">
            <h3 style="margin-top:0;">Prochain RDV 🗓️</h3>
            <div class="box">
                <input type="text" id="eventTitle" placeholder="Ex: Restaurant, Ciné...">
                <input type="date" id="eventDate">
                <button onclick="saveEvent()">Planifier</button>
            </div>
            <div id="countdown" style="font-weight: 700; font-size: 16px; margin-top: 15px; color: #fff;"></div>
        </div>

        <div id="album" class="page">
            <h3 style="margin-top:0;">Nos Souvenirs 📸</h3>
            <input type="file" id="photoAdd" style="display:none" onchange="addPhoto(this)" accept="image/*">
            <button onclick="document.getElementById('photoAdd').click()" class="box" style="background:transparent; border:2px dashed rgba(255,255,255,0.3); color:rgba(255,255,255,0.7); text-transform: none;">+ Ajouter une photo</button>
            <div class="album-grid" id="albumGrid"></div>
        </div>

        <div id="chat" class="page">
            <h3 style="margin-top:0;">Nouveau Message ✍️</h3>
            <div class="box">
                <textarea id="motDouxInput" rows="3" placeholder="Ton message..."></textarea>
                <button onclick="sendMotDoux()">Mettre à jour</button>
            </div>
            <button onclick="resetSetup()" style="background:rgba(0,0,0,0.3); font-size:10px; margin-top:10px;">⚙️ Paramètres de l'appli</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="showPage('home', this)">🏠</div>
        <div class="nav-item" onclick="showPage('agenda', this)">📅</div>
        <div class="nav-item" onclick="showPage('album', this)">🖼️</div>
        <div class="nav-item" onclick="showPage('chat', this)">💬<div id="msgBadge" class="badge"></div></div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (NE PAS CHANGER) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs",
        authDomain: "notre-univers-d71a3.firebaseapp.com",
        projectId: "notre-univers-d71a3",
        databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/",
        storageBucket: "notre-univers-d71a3.firebasestorage.app",
        messagingSenderId: "909531230264",
        appId: "1:909531230264:web:8ea1c08b60058117eff6cd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- SYNCHRONISATION ---
    db.ref('motDoux').on('value', (snapshot) => {
        const msg = snapshot.val() || "Je t'aime mon amour ❤️";
        document.getElementById('motDouxDisplay').innerText = msg;
    });

    db.ref('album').on('value', (snapshot) => {
        const album = snapshot.val() || {};
        const grid = document.getElementById('albumGrid');
        grid.innerHTML = Object.values(album).map(src => `<img src="${src}" class="album-img">`).reverse().join('');
    });

    db.ref('event').on('value', (snapshot) => {
        const ev = snapshot.val();
        if(ev) {
            const diff = Math.ceil((new Date(ev.date) - new Date()) / 86400000);
            document.getElementById('countdown').innerHTML = diff >= 0 ? 
                `Dans ${diff} jours : <br><span style="color:var(--accent)">${ev.title}</span> ✨` : "Événement passé !";
        }
    });

    function sendMotDoux() {
        const txt = document.getElementById('motDouxInput').value;
        if(txt) { db.ref('motDoux').set(txt); document.getElementById('motDouxInput').value = ""; showPage('home', document.querySelector('.nav-item')); }
    }

    function addPhoto(input) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { db.ref('album').push(e.target.result); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveEvent() {
        const title = document.getElementById('eventTitle').value;
        const date = document.getElementById('eventDate').value;
        if(title && date) db.ref('event').set({title, date});
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active-nav');
    }

    window.onload = () => {
        const pfp = localStorage.getItem('my_pfp');
        if(pfp) { document.getElementById('pfp').src = pfp; document.getElementById('pfp').style.display = 'inline-block'; }
        const start = localStorage.getItem('couple_date');
        if(start) {
            const diff = Math.floor((new Date() - new Date(start)) / 86400000);
            document.getElementById('ensembleDepuis').innerText = `Ensemble depuis ${diff} jours 💖`;
        }
    };

    function resetSetup() {
        const d = prompt("Date de rencontre (AAAA-MM-JJ) :");
        if(d) localStorage.setItem('couple_date', d);
        const photoIn = document.createElement('input');
        photoIn.type = 'file';
        photoIn.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { localStorage.setItem('my_pfp', ev.target.result); location.reload(); };
            reader.readAsDataURL(e.target.files[0]);
        };
        photoIn.click();
    }

    function sparkle() {
        for(let i=0; i<30; i++) {
            setTimeout(() => {
                const h = document.createElement('div'); h.className = 'heart'; h.innerText = '❤️';
                h.style.left = Math.random()*100+'vw'; h.style.animationDuration = (Math.random()*2+3)+'s';
                document.body.appendChild(h); setTimeout(() => h.remove(), 5000);
            }, i*100);
        }
    }
</script>
</body>
</html>
