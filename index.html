
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.37.5</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08); --love: #ff4b6e; --check: #00d2ff; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; -webkit-tap-highlight-color: transparent; }

        /* Correction Alignement Réglages */
        .grid-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .setting-card { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }

        /* Header et Tabs */
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.95); backdrop-filter: blur(10px); }
        .tabs { display: flex; gap: 8px; margin-top: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 15px; font-size: 13px; background: var(--card); cursor: pointer; transition: 0.2s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }

        /* Vues */
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        /* Chat UI */
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 16px; border-radius: 20px; max-width: 75%; font-size: 14px; line-height: 1.4; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .time { font-size: 10px; margin-top: 5px; opacity: 0.7; display: block; text-align: right; }

        /* Modales */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 25px; border-radius: 30px; border: 1px solid var(--accent); }
    </style>
</head>
<body onclick="initUserInteractions()">

<div id="splash" style="position:fixed; inset:0; background:var(--bg); z-index:100000; display:flex; align-items:center; justify-content:center;">
    <div style="width:40px; height:40px; border:3px solid var(--card); border-top:3px solid var(--accent); border-radius:50%; animation:spin 0.8s linear infinite;"></div>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="text-align:center; color:var(--accent); margin-top:0;"></h3>
        <div id="modalBody"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; border-radius:15px; border:none; background:var(--card); color:white;">Annuler</button>
            <button id="modalConfirmBtn" style="flex:1; padding:12px; border-radius:15px; border:none; background:var(--accent); color:black; font-weight:bold;">Valider</button>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Noé</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div></div>

    <div id="vSet" class="view">
        <div id="pfpPreview" style="width:100px; height:100px; margin:0 auto 20px; border-radius:50%; border:3px solid var(--accent); overflow:hidden; display:flex; align-items:center; justify-content:center;">👤</div>
        <div class="grid-settings">
            <div class="setting-card" onclick="openEdit('pseudo')">Pseudo</div>
            <div class="setting-card" onclick="document.getElementById('pfpInput').click()">Photo</div>
            <div class="setting-card" onclick="openEdit('code')">Code Secret</div>
            <div class="setting-card" onclick="openEdit('startDate', true)">Date</div>
            <div class="setting-card" style="grid-column: span 2;" onclick="testNotif()">🚀 Tester Notifs & Vibration</div>
        </div>
        <input type="file" id="pfpInput" hidden onchange="handlePfp(event)">
        <p onclick="logout()" style="text-align:center; color:var(--love); margin-top:30px; font-weight:bold; cursor:pointer;">Déconnexion</p>
    </div>
</div>

<div id="chatBox">
    <div class="head" style="padding:50px 20px 15px; display:flex; align-items:center; gap:15px; border-bottom:1px solid rgba(255,255,255,0.1);">
        <span onclick="closeO('chatBox')" style="font-size:24px; cursor:pointer;">←</span><b id="cName">...</b>
    </div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:10px;">
        <input type="text" id="mIn" placeholder="Ecrire..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white; outline:none;">
        <button onclick="sendMsg()" style="background:var(--accent); border:none; width:50px; height:50px; border-radius:50%; font-size:20px;">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_user_v37'));
    let activeChat = null;

    // --- INITIALISATION VIBRATIONS & SON ---
    function initUserInteractions() {
        if ("vibrate" in navigator) navigator.vibrate(50);
        console.log("Interactions débloquées");
    }

    // --- GESTION RETOUR PROPRE ---
    window.addEventListener('popstate', (e) => {
        if (document.getElementById('chatBox').style.display === 'flex') {
            closeO('chatBox');
        } else if (document.getElementById('customModal').style.display === 'flex') {
            closeModal();
        }
    });

    function start() {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        if(user.pfp) document.getElementById('pfpPreview').innerHTML = `<img src="${user.pfp}" style="width:100%; height:100%; object-fit:cover;">`;
        loadContacts();
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `<div onclick="openChat('${u.id}','${u.pseudo}')" style="background:var(--card); padding:15px; border-radius:20px; margin-bottom:10px; display:flex; align-items:center; gap:15px;">
                        <div style="width:45px; height:45px; border-radius:50%; background:#333; overflow:hidden;">${u.pfp ? `<img src="${u.pfp}" style="width:100%; height:100%; object-fit:cover;">` : ''}</div>
                        <b>${u.pseudo}</b>
                    </div>`;
                });
            });
        });
    }

    function openChat(id, name) {
        activeChat = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display = 'flex';
        history.pushState({view: 'chat'}, "");
        syncMsgs();
    }

    function syncMsgs() {
        db.ref('msgs/'+activeChat).on('value', s => {
            const area = document.getElementById('mArea'); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                const isMe = m.sid === user.id;
                const time = m.ts ? new Date(m.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">
                    ${m.txt}<span class="time">${time} ${isMe && m.read ? '✔✔' : '✔'}</span>
                </div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg() {
        const txt = document.getElementById('mIn').value.trim();
        if(!txt) return;
        db.ref('msgs/'+activeChat).push({ sid: user.id, txt, ts: Date.now(), read: false });
        document.getElementById('mIn').value = "";
    }

    function testNotif() {
        if (!("Notification" in window)) return alert("Ce téléphone ne supporte pas les notifications");
        
        Notification.requestPermission().then(perm => {
            if (perm === "granted") {
                alert("Permission accordée ! Quitte l'appli, la notif arrive dans 5s.");
                setTimeout(() => {
                    new Notification("🚀 Notre Univers", { 
                        body: "Le test est réussi ! Vibration en cours...",
                        vibrate: [200, 100, 200]
                    });
                    if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);
                }, 5000);
            } else {
                alert("Tu as refusé les notifications dans les paramètres du téléphone.");
            }
        });
    }

    function openEdit(field) {
        openModal("Modifier", `<input id="modalInput" style="width:100%; padding:15px; border-radius:10px; background:rgba(255,255,255,0.1); border:none; color:white;" value="${user[field] || ''}">`, (val) => {
            db.ref('users/'+user.id).update({[field]: val});
            user[field] = val;
            localStorage.setItem('nu_user_v37', JSON.stringify(user));
            location.reload();
        });
    }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display = 'flex';
        document.getElementById('modalConfirmBtn').onclick = () => { a(document.getElementById('modalInput').value); closeModal(); };
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    function closeO(id) { document.getElementById(id).style.display = 'none'; }
    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    window.onload = () => { if(user) start(); else location.href = "login.html"; };
</script>
</body>
</html>
