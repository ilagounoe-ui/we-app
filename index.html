<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.35 - Système Complet</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3;
        }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- CHARGEMENT RAPIDE --- */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; }
        .loader { width: 30px; height: 30px; border: 2px solid var(--card); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- AUTH DESIGN (Assorti) --- */
        #authLayer { position: fixed; inset: 0; background: var(--bg); z-index: 90000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .auth-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .auth-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* --- HEADER & TABS v34 --- */
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); cursor: pointer; position: relative; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        /* --- BULLLES & CONTACTS (DESIGN v34) --- */
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 20px; margin-bottom: 10px; position: relative; }
        .pfp-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: var(--accent); margin-right: 15px; }
        .badge-wa { position: absolute; right: 20px; background: #25D366; color: white; font-size: 10px; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; border-radius: 50%; }
        
        .bubble { padding: 10px 15px; border-radius: 20px; max-width: 75%; font-size: 14px; position: relative; margin-bottom: 8px; word-wrap: break-word; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 5px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 5px; }
        .v-blue { color: var(--check); font-weight: bold; margin-left: 3px; }

        /* --- RÉGLAGES (v34 Restaurés) --- */
        .set-card { background: var(--card); padding: 20px; border-radius: 25px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .pfp-area { position: relative; width: 80px; height: 80px; margin: 0 auto 20px; }
        #myPfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }

        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; z-index: 100; }
    </style>
</head>
<body>

<div id="splash"><div class="loader"></div></div>

<div id="authLayer" style="display:none;">
    <div class="auth-card" id="loginUI">
        <h2 style="font-family:'Pacifico'; color:var(--accent)">Bienvenue</h2>
        <input type="tel" id="uPhone" class="auth-input" placeholder="Numéro de téléphone">
        <input type="password" id="uPass" class="auth-input" placeholder="Mot de passe">
        <button class="auth-btn" onclick="handleAuth()">SE CONNECTER</button>
        <p onclick="toggleAuth()" style="font-size:12px; margin-top:15px; opacity:0.6">Pas de compte ? S'inscrire</p>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Chats</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active">
        <div id="chatList"></div>
        <div class="fab" onclick="addFriend()">+</div>
    </div>

    <div id="vCocon" class="view">
        <div class="set-card" onclick="openCocon()">
            <div style="font-size:25px;">🔒</div>
            <div><b>Accéder au Cocon</b><br><small>Espace secret partagé</small></div>
        </div>
    </div>

    <div id="vSet" class="view">
        <div class="pfp-area" onclick="document.getElementById('fileIn').click()">
            <img id="myPfp" src="https://via.placeholder.com/150">
            <div style="position:absolute; bottom:0; right:0; background:var(--accent); border-radius:50%; width:25px; height:25px; display:flex; align-items:center; justify-content:center; color:#000; font-size:12px;">📸</div>
            <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="uploadPhoto(event)">
        </div>
        <div class="set-card"><div>👤</div><div><b id="setPseudo">Pseudo</b></div></div>
        <div class="set-card"><div>📞</div><div><b id="setPhone">Numéro</b></div></div>
        <button class="auth-btn" onclick="logout()" style="background:var(--love); margin-top:20px;">DÉCONNEXION</button>
    </div>
</div>

<div id="chatBox">
    <div class="head" style="padding:50px 20px 15px; display:flex; align-items:center; gap:15px; border-bottom:1px solid rgba(255,255,255,0.1)">
        <span onclick="closeChat()">←</span>
        <img id="cHeadPfp" src="" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
        <div><b id="cHeadName">...</b><br><small id="cHeadStatus" style="font-size:10px; opacity:0.6"></small></div>
    </div>
    <div id="mArea" class="msg-area" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column;"></div>
    <div style="padding:15px; display:flex; gap:10px;"><input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:12px; border-radius:20px; color:white;"><button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%">➔</button></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeChatKey = null;

    // --- CHARGEMENT RAPIDE (1.2s) ---
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                if(user) showApp(); else document.getElementById('authLayer').style.display = 'flex';
            }, 400);
        }, 1200);
    };

    function showApp() {
        document.getElementById('authLayer').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        document.getElementById('setPseudo').innerText = user.pseudo;
        document.getElementById('setPhone').innerText = user.phone;
        if(user.pfp) document.getElementById('myPfp').src = user.pfp;
        updateStatus();
        loadChats();
    }

    // --- PHOTO INSTANTANÉE ---
    function uploadPhoto(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const base64 = event.target.result;
            // Mise à jour immédiate interface
            document.getElementById('myPfp').src = base64;
            // Save Firebase & Local
            db.ref('users/'+user.id).update({ pfp: base64 });
            user.pfp = base64;
            localStorage.setItem('nu_v33_user', JSON.stringify(user));
        };
        reader.readAsDataURL(file);
    }

    // --- LOGIQUE CHAT (VU + BADGES) ---
    function loadChats() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    const cKey = [user.id, u.id].sort().join('_');
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.onclick = () => openChat(u.id, u.pseudo, u.pfp);
                    item.innerHTML = `
                        <img src="${u.pfp || 'https://via.placeholder.com/150'}" class="pfp-img">
                        <div><b>${u.pseudo}</b><br><small id="st-${u.id}" style="font-size:10px; opacity:0.6">...</small></div>
                        <div class="badge-wa" id="bdg-${u.id}">0</div>
                    `;
                    list.appendChild(item);
                    
                    db.ref('status/'+u.id).on('value', st => {
                        document.getElementById('st-'+u.id).innerText = st.val()?.state === 'online' ? 'En ligne' : 'Hors ligne';
                    });
                    
                    db.ref('msgs/'+cKey).on('value', ms => {
                        let c = 0; ms.forEach(m => { if(m.val().sid !== user.id && !m.val().read) c++; });
                        const b = document.getElementById('bdg-'+u.id);
                        b.innerText = c; b.style.display = c > 0 ? 'flex' : 'none';
                    });
                });
            });
        });
    }

    function openChat(id, name, pfp) {
        activeChatKey = [user.id, id].sort().join('_');
        document.getElementById('cHeadName').innerText = name;
        document.getElementById('cHeadPfp').src = pfp || "https://via.placeholder.com/150";
        document.getElementById('chatBox').style.display = 'flex';
        
        db.ref('msgs/'+activeChatKey).on('value', s => {
            const area = document.getElementById('mArea'); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                if(m.sid !== user.id) db.ref('msgs/'+activeChatKey+'/'+snap.key).update({read:true});
                const isMe = m.sid === user.id;
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">${m.txt}${isMe?`<span class="${m.read?'v-blue':''}"> ✓✓</span>`:''}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('mIn'); if(!i.value.trim()) return;
        db.ref('msgs/'+activeChatKey).push({ sid:user.id, txt:i.value, t:Date.now(), read:false });
        i.value = "";
    }

    function updateStatus() {
        const r = db.ref('status/'+user.id);
        r.set({state:'online', last:Date.now()});
        r.onDisconnect().set({state:'offline', last:Date.now()});
    }

    // --- AUTRES FONCTIONS ---
    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function closeChat() { document.getElementById('chatBox').style.display='none'; db.ref('msgs/'+activeChatKey).off(); }
    function logout() { localStorage.clear(); location.reload(); }
    function addFriend() {
        const tel = prompt("Numéro de l'ami :"); if(!tel) return;
        const id = "u_" + tel.replace(/\D/g,'');
        db.ref('users/'+id).once('value', s => {
            if(s.exists()){
                db.ref(`users/${user.id}/contacts/${id}`).set(true);
                db.ref(`users/${id}/contacts/${user.id}`).set(true);
                alert("Ajouté !");
            } else alert("Inconnu");
        });
    }
</script>
</body>
</html>
