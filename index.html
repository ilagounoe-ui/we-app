<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nous 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1a1a1a,#2b0f2f);
  font-family:Arial, sans-serif;
  color:white;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:85%;
  max-width:350px;
  box-shadow:0 0 20px rgba(255,0,128,0.2);
  animation:fadeIn 0.6s ease;
}

h1{
  margin-top:0;
  font-size:26px;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:#ff4da6;
  color:white;
  margin-top:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.secondary{
  background:gray;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.days{
  font-size:20px;
  margin:20px 0;
}
</style>
</head>

<body>

<div class="card">

<h1>💖 Nous</h1>

<div id="setup" style="display:none;">
  <p>Choisis notre date 💞</p>
  <input type="date" id="dateInput">
  <br>
  <button onclick="saveDate()">Enregistrer</button>
  <br>
  <button class="secondary" onclick="goBack()">↩ Retour</button>
</div>

<div id="main">
  <p class="days" id="days"></p>
  <button onclick="love()">❤️ Je pense à toi</button>
  <br>
  <button class="secondary" onclick="editDate()">🔄 Modifier la date</button>
</div>

</div>

<script>

function calculateDays(dateString){
  let startDate = new Date(dateString);
  let today = new Date();
  let difference = today - startDate;
  return Math.floor(difference / (1000 * 60 * 60 * 24));
}

function saveDate(){
  let date = document.getElementById("dateInput").value;
  if(date){
    localStorage.setItem("coupleDate", date);
    showMain();
  }
}

function editDate(){
  let savedDate = localStorage.getItem("coupleDate");
  document.getElementById("dateInput").value = savedDate;
  document.getElementById("main").style.display = "none";
  document.getElementById("setup").style.display = "block";
}

function goBack(){
  showMain();
}

function showMain(){
  let savedDate = localStorage.getItem("coupleDate");
  if(savedDate){
    let days = calculateDays(savedDate);
    document.getElementById("days").innerText =
    "Ensemble depuis " + days + " jours 💞";

    document.getElementById("setup").style.display = "none";
    document.getElementById("main").style.display = "block";
  }
}

function love(){
  alert("Ton message a été envoyé 💘");
}

let savedDate = localStorage.getItem("coupleDate");

if(!savedDate){
  document.getElementById("main").style.display = "none";
  document.getElementById("setup").style.display = "block";
}else{
  showMain();
}

</script>

</body>
</html>
