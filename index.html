<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --online: #25D366;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-size: cover; background-position: center; }
        
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.2s ease-in-out forwards; animation-delay: 1.2s; }
        @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Navigation Fixe */
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }

        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        /* Header de Chat FIXE */
        .head { height: 110px; padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: #0f0c29; position: sticky; top: 0; z-index: 1000; }
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* Bubbles */
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; position: relative; word-wrap: break-word; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Cocon Styles */
        .cocon-nav { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-icon { font-size: 20px; cursor: pointer; opacity: 0.5; }
        .nav-icon.active { opacity: 1; transform: scale(1.2); }
        @keyframes glow-love {
            0% { box-shadow: 0 0 5px var(--love); }
            50% { box-shadow: 0 0 20px var(--love); transform: scale(1.02); }
            100% { box-shadow: 0 0 5px var(--love); }
        }
        .glow-active { animation: glow-love 1.5s infinite; border: 2px solid var(--love) !important; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 30px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: white; margin: 10px 0; text-align: center; }
        .option-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 18px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; cursor: pointer; }
        
        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .mood-item { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }

        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; background: #2a2a40; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; }
        .opt-dots { margin-left: auto; padding: 10px; font-size: 22px; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="splash"><div class="loader"></div></div>

<div id="vWidgetFull" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:30000; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px;">
    <div style="font-family:'Pacifico'; color:var(--love); font-size:30px; margin-bottom:30px;">L'Univers te dit... 💖</div>
    <div id="widgetText" style="font-size:20px; color:white; background:var(--card); padding:30px; border-radius:35px; border:2px solid var(--love); width:90%;">...</div>
    <button onclick="this.parentElement.style.display='none'" class="option-btn" style="width:auto; padding:10px 40px; margin-top:30px;">Retour</button>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--accent); margin:0 0 10px 0;">...</h3>
        <div id="modalBody"></div>
        <div id="modalActions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" style="background:var(--card)" id="modalCancelBtn">Annuler</button>
            <button class="option-btn" style="background:var(--accent); color:black" id="modalConfirmBtn">Confirmer</button>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div></div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:30px; border-radius:35px; text-align:center; margin-bottom:25px;">
            <h3>Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:15px;">
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px;"><b id="d-day" style="font-size:24px">0</b><br><small>Jours</small></div>
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px;"><b id="d-hour" style="font-size:24px">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button id="btnOpenCocon" onclick="askCoconCode()" style="width:100%; padding:22px; border-radius:28px; border:2px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold;">💖 OUVRIR LE COCON</button>
        <button onclick="checkMood()" style="width:100%; padding:15px; border-radius:28px; border:none; background:var(--card); color:white; font-weight:bold; margin-top:15px;">🌟 Besoin d'un mot doux ?</button>
    </div>

    <div id="vSet" class="view" style="text-align:center;">
        <div id="pfpPreview" class="contact-pfp" style="width:110px; height:110px; margin:0 auto 20px; border:3px solid var(--accent); font-size:40px;">👤</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="contact-item" style="justify-content:center; margin:0;" onclick="openEdit('pseudo')"><b>Pseudo</b></div>
            <div class="contact-item" style="justify-content:center; margin:0;" onclick="document.getElementById('pfpInput').click()"><b>Photo</b></div>
            <div class="contact-item" style="justify-content:center; margin:0;" onclick="openEdit('code')"><b>Code Cocon</b></div>
            <div class="contact-item" style="justify-content:center; margin:0;" onclick="openEdit('startDate', true)"><b>Date</b></div>
            <div class="contact-item" style="grid-column:span 2; justify-content:center; margin:0; background:var(--love); color:black;" onclick="sendLoveNote()">💌 Envoyer un mot doux</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); margin-top:20px; font-weight:bold;">Déconnexion</button>
        </div>
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="handleFile(event, 'pfp')">
    </div>
</div>

<div id="chatBox">
    <div class="head">
        <span onclick="triggerBack()" style="font-size:24px;">←</span>
        <div id="chatPfp" class="contact-pfp" style="width:40px; height:40px;"></div>
        <b id="cName" style="flex:1">...</b>
        <div class="opt-dots" id="chatOptsBtn" onclick="openContactOptions(event, activeChatId)">⋮</div>
    </div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.3);">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;">
        <button onclick="sendMsg('msgs')" style="background:var(--accent); border:none; width:50px; height:50px; border-radius:50%;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="head" style="background:var(--love)">
        <span onclick="triggerBack()" style="font-size:24px;">←</span>
        <b style="flex:1">🌹 Cocon Secret</b>
    </div>
    <div class="cocon-nav">
        <span class="nav-icon active" onclick="switchCoconTab('chat')">💬</span>
        <span class="nav-icon" onclick="switchCoconTab('gal')">🖼️</span>
    </div>
    <div class="msg-area" id="coArea"></div>
    <div id="coconGallery" style="display:none; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px;"></div>
    <div id="coInputZone" style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.3);">
        <button class="media-btn" onclick="document.getElementById('imgInCo').click()" style="background:var(--card); border:none; width:45px; border-radius:50%; color:white;">🖼️</button>
        <input type="file" id="imgInCo" hidden accept="image/*" onchange="sendMedia('cocon', this)">
        <input type="text" id="coIn" placeholder="Écris ici..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;">
        <button onclick="sendMsg('cocon')" style="background:var(--love); border:none; width:50px; height:50px; border-radius:50%;">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeChatId = null;
    let activePath = null;
    let stateStack = [];

    function formatTime(ts) { const d = new Date(ts); return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0'); }
    
    function getPfp(u) { 
        if(u.pfp) return `<img src="${u.pfp}" style="width:100%; height:100%; object-fit:cover;" onclick="viewPhoto('${u.pfp}')">`; 
        return `<span>${u.pseudo[0].toUpperCase()}</span>`; 
    }

    function pushState(id) { stateStack.push(id); history.pushState({id}, ""); }
    window.onpopstate = () => {
        const s = stateStack.pop();
        if(s === 'modal') document.getElementById('customModal').style.display = 'none';
        else if(s === 'chatBox') document.getElementById('chatBox').style.display = 'none';
        else if(s === 'coconBox') document.getElementById('coconBox').style.display = 'none';
    };
    function triggerBack() { history.back(); }

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function start() {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        document.getElementById('pfpPreview').innerHTML = getPfp(user);
        loadContacts(); loadTimer(); monitorNotes();
    }

    function monitorNotes() {
        db.ref('cocon/' + user.code).on('value', s => {
            let hasNew = false;
            s.forEach(snap => { if(snap.val().type === 'love_note' && snap.val().sid !== user.id && !snap.val().read) hasNew = true; });
            document.getElementById('btnOpenCocon').classList.toggle('glow-active', hasNew);
        });
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}','${u.pfp||''}')">
                        <div class="contact-pfp">${getPfp(u)}</div>
                        <div style="flex:1; margin-left:15px;"><b>${u.pseudo}</b></div>
                    </div>`;
                });
            });
        });
    }

    function openChat(id, name, pfp) {
        activeChatId = id;
        const chatKey = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatPfp').innerHTML = getPfp({pseudo: name, pfp: pfp});
        document.getElementById('chatBox').style.display='flex';
        pushState('chatBox');
        sync('msgs', chatKey, 'mArea');
    }

    function askCoconCode() {
        openModal("Code Secret", `<input type="password" id="modalInput" class="modal-input" placeholder="Ton code">`, (val) => {
            if(val === user.code) {
                document.getElementById('customModal').style.display = 'none';
                db.ref('cocon/' + user.code).once('value', s => {
                    let note = null; let nk = null;
                    s.forEach(snap => { if(snap.val().type === 'love_note' && snap.val().sid !== user.id && !snap.val().read) { note = snap.val().txt; nk = snap.key; }});
                    if(note) {
                        document.getElementById('widgetText').innerText = note;
                        document.getElementById('vWidgetFull').style.display = 'flex';
                        db.ref('cocon/'+user.code+'/'+nk).update({read: true});
                    }
                    document.getElementById('coconBox').style.display='flex';
                    pushState('coconBox');
                    sync('cocon', user.code, 'coArea');
                });
            } else alert("Code incorrect");
        });
    }

    function sync(path, target, areaId) {
        if(activePath) db.ref(activePath).off();
        activePath = path + '/' + target;
        db.ref(activePath).on('value', s => {
            const area = document.getElementById(areaId); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val(); if(m.type === 'love_note') return;
                const msgEl = document.createElement('div');
                msgEl.className = `bubble ${m.sid === user.id ? 'm-me' : 'm-they'}`;
                msgEl.innerHTML = (m.type === 'img' ? `<img src="${m.txt}" style="width:100%; border-radius:15px;">` : m.txt) + `<div style="font-size:10px; text-align:right; opacity:0.6;">${formatTime(m.t)}</div>`;
                area.appendChild(msgEl);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg(mode) {
        const inp = document.getElementById(mode==='msgs'?'mIn':'coIn');
        if(!inp.value.trim()) return;
        const target = mode==='msgs' ? [user.id, activeChatId].sort().join('_') : user.code;
        db.ref(mode+'/'+target).push({ sid: user.id, txt: inp.value, t: Date.now(), type: 'text' });
        inp.value = "";
    }

    function sendLoveNote() {
        openModal("Envoyer un mot doux", `<input type="text" id="modalInput" class="modal-input" placeholder="Ton message...">`, (v) => {
            if(v) {
                db.ref('cocon/'+user.code).push({ sid: user.id, txt: v, t: Date.now(), type: 'love_note', read: false });
                triggerBack();
                const snack = document.createElement('div');
                snack.innerText = "Envoyé ! ✨";
                snack.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--accent); color:black; padding:10px 20px; border-radius:20px; z-index:50000;";
                document.body.appendChild(snack);
                setTimeout(() => snack.remove(), 2000);
            }
        });
    }

    function checkMood() {
        openModal("Humeur", `
            <div class="mood-grid">
                <div class="mood-item" onclick="showNote('triste')">🥺<br>Triste</div>
                <div class="mood-item" onclick="showNote('fatigue')">😴<br>Fatigué</div>
                <div class="mood-item" onclick="showNote('joyeux')">😊<br>Heureux</div>
                <div class="mood-item" onclick="showNote('colere')">😠<br>Énervé</div>
            </div>`, null);
        document.getElementById('modalActions').style.display = 'none';
    }

    function showNote(m) {
        const n = { triste: ["Courage mon amour 💖"], fatigue: ["Repose-toi bien 😴"], joyeux: ["Ton sourire est ma force 😊"], colere: ["Respire, je t'aime ❤️"] };
        document.getElementById('widgetText').innerText = n[m][0];
        document.getElementById('customModal').style.display = 'none';
        document.getElementById('vWidgetFull').style.display = 'flex';
    }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display = 'flex';
        document.getElementById('modalActions').style.display = 'flex';
        pushState('modal');
        document.getElementById('modalConfirmBtn').onclick = () => { if(a) a(document.getElementById('modalInput')?.value); };
        document.getElementById('modalCancelBtn').onclick = () => triggerBack();
    }

    function openContactOptions(e, id) {
        e.stopPropagation();
        openModal("Options", `<button class="option-btn" onclick="db.ref('msgs/'+['${user.id}','${id}'].sort().join('_')).remove(); triggerBack();">Vider la discussion</button>`, null);
        document.getElementById('modalConfirmBtn').style.display = 'none';
    }

    function openEdit(f, isD) {
        openModal("Modifier", `<input type="${isD?'date':'text'}" id="modalInput" class="modal-input" value="${user[f]||''}">`, (v) => {
            db.ref('users/'+user.id).update({[f]:v}).then(() => { user[f]=v; localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload(); });
        });
    }

    function handleFile(e, type) {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = (ev) => { db.ref('users/'+user.id).update({[type]: ev.target.result}).then(() => location.reload()); };
        r.readAsDataURL(file);
    }

    function loadTimer() {
        if(!user.startDate) return;
        const up = () => {
            const diff = Date.now() - new Date(user.startDate).getTime();
            document.getElementById('d-day').innerText = Math.floor(diff/86400000);
            document.getElementById('d-hour').innerText = Math.floor((diff%86400000)/3600000);
        };
        up(); setInterval(up, 60000);
    }

    function viewPhoto(s) { openModal("Photo", `<img src="${s}" style="width:100%; border-radius:20px;">`, null); document.getElementById('modalActions').style.display='none'; }
    function logout() { localStorage.clear(); location.reload(); }
    window.onload = () => { if(user) start(); else document.body.innerHTML = "Veuillez vous reconnecter."; };
</script>
</body>
</html>
