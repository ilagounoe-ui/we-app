<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nous 💖</title>
    <style>
        :root {
            --primary: #ff4da6;
            --secondary: #8e44ad;
            --bg-image: url('94a99c728e9fab72bb967717213d2490.jpg');
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Fond plus lumineux avec un dégradé superposé */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(135deg, rgba(255, 77, 166, 0.4), rgba(142, 68, 173, 0.4)), var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: blur(5px) brightness(0.8);
            z-index: -1;
            transition: 1s;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        #profilePic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            margin: -60px auto 15px auto; /* Effet de photo qui dépasse */
            display: none;
            box-shadow: 0 10px 20px rgba(255, 77, 166, 0.5);
        }

        h1 { margin: 10px 0 5px 0; font-size: 24px; font-weight: 700; }
        p { margin-bottom: 15px; font-size: 14px; opacity: 0.9; }

        button {
            padding: 14px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s ease;
            width: 100%;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 77, 166, 0.3);
        }

        button:active { transform: scale(0.95); }
        .secondary { background: rgba(255, 255, 255, 0.2); font-size: 12px; box-shadow: none; margin-top: 5px; }

        .days { 
            font-size: 20px; 
            margin: 15px 0; 
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
            width: 90%;
        }

        .spotify-container {
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            height: 80px;
        }

        .heart { position: fixed; font-size: 25px; top: -10%; animation: fall linear forwards; z-index: 1000; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <img id="profilePic" src="" alt="Photo">

    <div id="selection">
        <h1>Coucou ! ✨</h1>
        <p>Qui se connecte ?</p>
        <button onclick="ouvrirSite('Lui')">🙋‍♂️ C'est Lui</button>
        <button onclick="ouvrirSite('Elle')">🙋‍♀️ C'est Elle</button>
    </div>

    <div id="contenu" style="display:none;">
        <h1 id="titreBienvenue">💖 Nous</h1>
        <p id="petitMessage"></p>

        <div id="setup" style="display:none;">
            <input type="date" id="dateInput" style="padding:10px; border-radius:10px; border:none; width:80%;">
            <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="savePhoto(this)">
            <button class="secondary" onclick="document.getElementById('photoInput').click()">📸 Changer la photo</button>
            <button onclick="saveDate()">Valider</button>
        </div>

        <div id="main" style="display:none;">
            <div class="days" id="days"></div>
            
            <button onclick="loveAnimation()">❤️ Je pense à toi</button>

            <div class="spotify-container">
                <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZqd5Jicv9vG?utm_source=generator&theme=0" 
                    width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
            </div>

            <button class="secondary" onclick="editDate()">⚙️ Paramètres</button>
            <button class="secondary" onclick="changerFond()">🌸 Changer le décor</button>
            <button class="secondary" onclick="location.reload()">↩ Quitter</button>
        </div>
    </div>
</div>

<script>
    // --- PHOTO & DATE ---
    window.onload = () => {
        const p = localStorage.getItem("couplePhoto");
        if(p) { document.getElementById("profilePic").src = p; document.getElementById("profilePic").style.display = "block"; }
    };

    function ouvrirSite(qui) {
        document.getElementById("selection").style.display = "none";
        document.getElementById("contenu").style.display = "block";
        document.getElementById("titreBienvenue").innerText = qui === 'Elle' ? "Ma Reine 👑" : "Salut BG ⚡";
        document.getElementById("petitMessage").innerText = "Ravi de te revoir !";
        showMain();
    }

    function savePhoto(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            localStorage.setItem("couplePhoto", e.target.result);
            location.reload();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveDate() {
        const d = document.getElementById("dateInput").value;
        if(d) localStorage.setItem("coupleDate", d);
        showMain();
    }

    function showMain() {
        const d = localStorage.getItem("coupleDate");
        if(d) {
            const diff = Math.floor((new Date() - new Date(d)) / 86400000);
            document.getElementById("days").innerHTML = `Ensemble depuis<br><b>${diff} jours</b> 💞`;
            document.getElementById("setup").style.display = "none";
            document.getElementById("main").style.display = "block";
        } else { document.getElementById("setup").style.display = "block"; }
    }

    function editDate() { document.getElementById("main").style.display = "none"; document.getElementById("setup").style.display = "block"; }

    // --- ANIMATION ---
    function loveAnimation() {
        for (let i = 0; i < 40; i++) {
            setTimeout(() => {
                const h = document.createElement('div');
                h.classList.add('heart');
                h.innerText = ['❤️', '💖', '💕', '✨'][Math.floor(Math.random() * 4)];
                h.style.left = Math.random() * 100 + "vw";
                h.style.animationDuration = (Math.random() * 2 + 3) + "s";
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, i * 100);
        }
    }

    // --- FONDS ---
    const fonds = ['94a99c728e9fab72bb967717213d2490.jpg', 'a57e1c7c289e7753975d60a58fb6f6df.jpg'];
    let idx = 0;
    function changerFond() {
        idx = (idx + 1) % fonds.length;
        document.documentElement.style.setProperty('--bg-image', `url('${fonds[idx]}')`);
    }
</script>
</body>
</html>
