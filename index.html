<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Original Plus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff2d55; --primary: #5856d6; --bg: #0b0e14; --card: rgba(255,255,255,0.06); }
        
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        
        /* --- AUTH SCREEN --- */
        #authScreen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 100%; max-width: 350px; backdrop-filter: blur(20px); }

        /* --- LAYOUT --- */
        .app { height: 100vh; display: flex; flex-direction: column; display: none; }
        .page { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- DASHBOARD CARDS (Style Original) --- */
        .card { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .btn-neon { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 700; width: 100%; cursor: pointer; box-shadow: 0 5px 15px rgba(88,86,214,0.3); }

        /* --- MESSAGERIE AMIS --- */
        .inbox-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 20px; margin-bottom: 10px; cursor: pointer; }
        #chatOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        
        /* --- MESSAGES --- */
        .msg-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; }
        .sent { align-self: flex-end; background: var(--primary); }
        .received { align-self: flex-start; background: var(--card); }

        /* --- NAVBAR --- */
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(11,14,20,0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { font-size: 24px; opacity: 0.3; cursor: pointer; }
        .nav-active { opacity: 1; color: var(--accent); }

        input { width: 100%; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-box">
        <h1 style="margin-bottom:10px;">Nexus</h1>
        <p style="opacity:0.5; font-size:13px; margin-bottom:30px;">Identifiez-vous pour accéder à l'univers</p>
        <input type="text" id="regName" placeholder="Votre Pseudo">
        <button class="btn-neon" onclick="login()">SE CONNECTER</button>
    </div>
</div>

<div class="app" id="mainApp">
    <div id="pageFriends" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Discussions Amis</h2>
            <button onclick="startNewChat()" style="background:var(--card); border:none; color:white; padding:10px; border-radius:50%; width:40px;">+</button>
        </div>
        <div id="inboxList"></div>
    </div>

    <div id="pageCouple" class="page">
        <div id="coupleLock" style="text-align:center; padding-top:50px;">
            <div style="font-size:60px; margin-bottom:20px;">🔒</div>
            <h3>Espace Privé Couple</h3>
            <p style="opacity:0.5; margin-bottom:30px;">Entrez votre code secret</p>
            <input type="password" id="unlockInput" style="max-width:200px; text-align:center;">
            <button class="btn-neon" style="max-width:200px; margin-top:10px;" onclick="checkCoupleCode()">DÉVERROUILLER</button>
        </div>

        <div id="coupleContent" style="display:none; height:100%; flex-direction:column;">
            <div class="card" style="text-align:center; margin-bottom:10px;">
                <h3 id="coupleTitle" style="margin:0;">❤️ Notre Univers</h3>
                <small id="daysCounter" style="color:var(--accent)"></small>
            </div>
            <div id="coupleMsgs" class="msg-box"></div>
            <div style="display:flex; gap:10px; padding:10px; background:var(--card); border-radius:20px;">
                <input type="text" id="coupleIn" placeholder="Message..." style="margin:0; border:none; background:none;">
                <button onclick="sendMsg('couple')" style="background:var(--accent); border:none; color:white; border-radius:12px; width:45px;">➔</button>
            </div>
        </div>
    </div>

    <div id="pageSettings" class="page">
        <h2>Paramètres ⚙️</h2>
        <div class="card">
            <label>Mon Pseudo</label>
            <input type="text" id="setPseudo">
            
            <label style="display:block; margin-top:20px;">Code Secret Couple</label>
            <input type="text" id="setCoupleCode" placeholder="Ex: 1234">
            
            <label style="display:block; margin-top:20px;">Date de Rencontre</label>
            <input type="date" id="setLoveDate">
            
            <button class="btn-neon" style="margin-top:30px; background:var(--accent);" onclick="updateSettings()">ENREGISTRER</button>
        </div>
        <p onclick="localStorage.clear();location.reload()" style="text-align:center; color:red; font-size:12px; cursor:pointer;">Se déconnecter</p>
    </div>

    <div id="chatOverlay">
        <div style="padding:20px; background:var(--card); display:flex; align-items:center; gap:15px;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px;">←</button>
            <b id="chatNameDisplay">Ami</b>
        </div>
        <div id="friendMsgs" class="msg-box"></div>
        <div style="padding:20px; display:flex; gap:10px; border-top:1px solid rgba(255,255,255,0.05);">
            <input type="text" id="friendIn" placeholder="Message privé..." style="margin:0;">
            <button onclick="sendMsg('direct')" style="background:var(--primary); border:none; color:white; border-radius:12px; width:45px;">➔</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-btn nav-active" onclick="nav('pageFriends', this)">💬</div>
        <div class="nav-btn" onclick="nav('pageCouple', this)">❤️</div>
        <div class="nav-btn" onclick="nav('pageSettings', this)">⚙️</div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs",
        databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nx_orig_plus'));
    let activeFriend = null;

    if(user) {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        initApp();
    }

    function login() {
        const name = document.getElementById('regName').value;
        if(name) {
            const data = { name, id: 'u'+Math.floor(Math.random()*100000), coupleCode: '', loveDate: '' };
            db.ref('users/'+data.id).set(data);
            localStorage.setItem('nx_orig_plus', JSON.stringify(data));
            location.reload();
        }
    }

    function initApp() {
        document.getElementById('setPseudo').value = user.name;
        document.getElementById('setCoupleCode').value = user.coupleCode || "";
        document.getElementById('setLoveDate').value = user.loveDate || "";

        // Sync Inbox Amis
        db.ref('directs').on('value', s => {
            const inbox = document.getElementById('inboxList'); inbox.innerHTML = "";
            s.forEach(c => {
                if(c.key.includes(user.id)) {
                    const otherId = c.key.replace(user.id, '').replace('_', '');
                    db.ref('users/'+otherId).once('value', us => {
                        const other = us.val();
                        inbox.innerHTML += `
                            <div class="inbox-item" onclick="openChat('${otherId}', '${other.name}')">
                                <div style="width:45px; height:45px; border-radius:12px; background:var(--primary); display:flex; align-items:center; justify-content:center;">${other.name[0]}</div>
                                <div style="flex:1"><b>${other.name}</b><br><small style="opacity:0.4">Cliquer pour discuter</small></div>
                            </div>`;
                    });
                }
            });
        });
    }

    function startNewChat() {
        const target = prompt("Pseudo de l'ami :");
        if(!target) return;
        db.ref('users').once('value', s => {
            let found = false;
            s.forEach(c => {
                if(c.val().name.toLowerCase() === target.toLowerCase()) {
                    openChat(c.val().id, c.val().name);
                    found = true;
                }
            });
            if(!found) alert("Ami non trouvé !");
        });
    }

    function openChat(id, name) {
        activeFriend = id;
        const chatId = user.id < id ? user.id+'_'+id : id+'_'+user.id;
        document.getElementById('chatOverlay').style.display = 'flex';
        document.getElementById('chatNameDisplay').innerText = name;
        loadMsgs('directs/'+chatId, 'friendMsgs');
    }

    function checkCoupleCode() {
        const input = document.getElementById('unlockInput').value;
        if(input && input === user.coupleCode) {
            document.getElementById('coupleLock').style.display = 'none';
            document.getElementById('coupleContent').style.display = 'flex';
            if(user.loveDate) {
                const diff = Math.floor((new Date() - new Date(user.loveDate)) / 86400000);
                document.getElementById('daysCounter').innerText = `${diff} Jours de Bonheur`;
            }
            loadMsgs('couples/'+user.coupleCode+'/chat', 'coupleMsgs');
        } else { alert("Code incorrect !"); }
    }

    function loadMsgs(path, containerId) {
        db.ref(path).off();
        db.ref(path).limitToLast(30).on('value', s => {
            const b = document.getElementById(containerId); b.innerHTML = "";
            s.forEach(c => {
                const m = c.val();
                b.innerHTML += `<div class="bubble ${m.sid===user.id?'sent':'received'}">${m.txt}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    function sendMsg(type) {
        const input = document.getElementById(type === 'couple' ? 'coupleIn' : 'friendIn');
        if(!input.value) return;
        const path = type === 'couple' ? 'couples/'+user.coupleCode+'/chat' : 'directs/'+(user.id < activeFriend ? user.id+'_'+activeFriend : activeFriend+'_'+user.id);
        db.ref(path).push({ sid: user.id, txt: input.value });
        input.value = "";
    }

    function updateSettings() {
        user.name = document.getElementById('setPseudo').value;
        user.coupleCode = document.getElementById('setCoupleCode').value.toLowerCase();
        user.loveDate = document.getElementById('setLoveDate').value;
        db.ref('users/'+user.id).update(user);
        localStorage.setItem('nx_orig_plus', JSON.stringify(user));
        alert("Modifications enregistrées !");
        location.reload();
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('nav-active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('nav-active');
        if(id === 'pageCouple') {
            document.getElementById('coupleLock').style.display = 'block';
            document.getElementById('coupleContent').style.display = 'none';
        }
    }

    function closeChat() { document.getElementById('chatOverlay').style.display = 'none'; }
</script>
</body>
</html>
