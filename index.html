<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v30</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff;
        }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- DESIGN DES RÉGLAGES (CARTES) --- */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 5px; }
        .set-card { background: var(--card); padding: 20px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .set-card i { font-size: 24px; display: block; margin-bottom: 8px; }
        .set-card span { font-size: 12px; font-weight: 600; opacity: 0.9; }

        /* --- DÉCOMPTE PARTAGÉ --- */
        .love-card { background: linear-gradient(135deg, #6a11cb, var(--love)); padding: 25px; border-radius: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .counter-row { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .unit { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px; min-width: 60px; }
        .unit b { font-size: 22px; display: block; }

        /* --- CHAT & LECTURE --- */
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px 15px; border-radius: 20px; max-width: 75%; position: relative; font-size: 14px; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 5px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 5px; }
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 9px; margin-top: 4px; opacity: 0.8; }
        .read-icon { color: var(--check); font-weight: bold; }

        /* --- UI GÉNÉRALE --- */
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }
        
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; }
        .input-bar { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); }
        .input-cont { flex: 1; background: var(--card); border-radius: 25px; padding: 5px 15px; }
        .input-cont input { width: 100%; background: none; border: none; color: white; padding: 10px; outline: none; }
    </style>
</head>
<body>

<div id="auth" style="padding:50px 20px; text-align:center;">
    <h1 style="font-family:'Pacifico'; color:var(--accent)">Notre Univers</h1>
    <input type="tel" id="uPh" placeholder="Numéro" style="width:80%; padding:15px; border-radius:15px; margin-bottom:10px; border:none;">
    <button onclick="login()" style="width:85%; padding:15px; border-radius:15px; background:var(--accent); border:none; font-weight:bold;">ENTRER 🪐</button>
</div>

<div id="app" style="display:none;">
    <header class="main-header">
        <h2 id="welcome" style="margin:0; font-family:'Pacifico'; font-size:22px; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="showV('vChats', this)">Chats</div>
            <div class="tab" onclick="showV('vCocon', this)">Cocon</div>
            <div class="tab" onclick="showV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div></div>

    <div id="vCocon" class="view">
        <div class="love-card">
            <div style="font-size:35px">💍</div>
            <h3 style="margin:10px 0">Ensemble depuis</h3>
            <div class="counter-row">
                <div class="unit"><b id="d-day">0</b><small>Jours</small></div>
                <div class="unit"><b id="d-hour">0</b><small>Heures</small></div>
            </div>
            <p id="sharedDateDisp" style="font-size:11px; margin-top:10px; opacity:0.8">Chargement de la date...</p>
        </div>
        <button onclick="openCocon()" style="width:100%; padding:20px; border-radius:25px; border:none; background:var(--card); color:var(--love); font-weight:bold; font-size:16px; border: 1px dashed var(--love);">🌹 Ouvrir l'Espace Privé</button>
    </div>

    <div id="vSet" class="view">
        <div class="settings-grid">
            <div class="set-card" onclick="edit('pseudo')"><i>👤</i><span>Pseudo</span></div>
            <div class="set-card" onclick="edit('avatar')"><i>📸</i><span>Photo/Emoji</span></div>
            <div class="set-card" onclick="edit('code')"><i>🔑</i><span>Code Cocon</span></div>
            <div class="set-card" onclick="edit('date')"><i>📅</i><span>Date Rencontre</span></div>
            <div class="set-card" onclick="edit('pass')"><i>🔒</i><span>Mot de passe</span></div>
            <div class="set-card" onclick="logout()" style="background:rgba(255,82,82,0.1); border-color:#ff5252;"><i>🚪</i><span style="color:#ff5252">Quitter</span></div>
        </div>
    </div>
</div>

<div id="chatBox"><div class="head"><span onclick="closeO('chatBox')">←</span><b id="chatName">...</b></div><div class="msg-area" id="mArea"></div><div class="input-bar"><div class="input-cont"><input type="text" id="mIn" placeholder="Écrire..."></div><button onclick="send('msgs')" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%">➔</button></div></div>

<div id="coconBox"><div class="head" style="background:var(--love)"><span onclick="closeO('coconBox')">←</span><b>🌹 Notre Cocon</b></div><div class="msg-area" id="coArea"></div><div class="input-bar"><div class="input-cont"><input type="text" id="coIn" placeholder="Message secret..."></div><button onclick="send('cocon')" style="background:var(--love); border:none; width:45px; height:45px; border-radius:50%">➔</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v30_user'));
    let activeId = null;

    async function login() {
        const ph = document.getElementById('uPh').value;
        const id = "u_" + ph.replace(/\D/g,'');
        const s = await db.ref('users/'+id).once('value');
        if(s.exists()) { user = s.val(); localStorage.setItem('nu_v30_user', JSON.stringify(user)); start(); }
        else alert("Inconnu");
    }

    function start() {
        document.getElementById('auth').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('welcome').innerText = user.pseudo;
        initTimer();
        loadChats();
    }

    // DÉCOMPTE BASÉ SUR LE CODE SECRET (PARTAGÉ)
    function initTimer() {
        db.ref('cocon_meta/'+user.code).on('value', s => {
            const data = s.val() || { startDate: user.startDate };
            const update = () => {
                const diff = Date.now() - data.startDate;
                document.getElementById('d-day').innerText = Math.floor(diff/86400000);
                document.getElementById('d-hour').innerText = Math.floor((diff/3600000)%24);
                document.getElementById('sharedDateDisp').innerText = "Débuté le : " + new Date(data.startDate).toLocaleDateString();
            };
            update(); setInterval(update, 60000);
        });
    }

    function loadChats() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                const u = snap.val(); if(u.id === user.id) return;
                list.innerHTML += `<div style="display:flex; align-items:center; padding:15px; background:var(--card); border-radius:20px; margin-bottom:10px;" onclick="openChat('${u.id}','${u.pseudo}')">
                    <div style="width:45px; height:45px; background:var(--accent); border-radius:50%; margin-right:15px; display:flex; align-items:center; justify-content:center;">${u.avatar}</div>
                    <b>${u.pseudo}</b>
                </div>`;
            });
        });
    }

    function openChat(id, name) {
        activeId = [user.id, id].sort().join('_');
        document.getElementById('chatName').innerText = name;
        document.getElementById('chatBox').style.display='flex';
        syncMsgs('msgs', activeId, 'mArea');
    }

    function openCocon() {
        if(prompt("Code secret :") === user.code) {
            document.getElementById('coconBox').style.display='flex';
            syncMsgs('cocon', user.code, 'coArea');
        }
    }

    function syncMsgs(path, target, areaId) {
        db.ref(path+'/'+target).on('value', s => {
            const area = document.getElementById(areaId); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                const time = new Date(m.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const isMe = m.sid === user.id;
                // Système de lecture : si c'est moi qui envoie, on affiche les coches
                const status = isMe ? `<span class="read-icon">✓✓</span>` : "";
                
                area.innerHTML += `
                    <div class="bubble ${isMe?'m-me':'m-they'}">
                        ${m.txt}
                        <div class="msg-meta">${time} ${status}</div>
                    </div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function send(path) {
        const inp = (path==='msgs')?document.getElementById('mIn'):document.getElementById('coIn');
        const target = (path==='msgs')?activeId:user.code;
        if(!inp.value.trim()) return;
        db.ref(path+'/'+target).push({ sid: user.id, txt: inp.value.trim(), t: Date.now(), read: true });
        inp.value = "";
    }

    function edit(type) {
        let val = prompt("Nouvelle valeur :"); if(!val) return;
        if(type === 'date') {
            const timestamp = new Date(val).getTime();
            db.ref('cocon_meta/'+user.code).update({ startDate: timestamp });
        } else {
            let up = {}; up[type] = val;
            db.ref('users/'+user.id).update(up);
        }
        alert("Enregistré !"); location.reload();
    }

    function showV(id, el) {
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function closeO(id) { document.getElementById(id).style.display='none'; }
    function logout() { localStorage.clear(); location.reload(); }
    if(user) start();
</script>
</body>
</html>
