<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --wa-green-dark: #008069; --wa-green-light: #25d366;
            --wa-bg: #ffffff; --wa-text-main: #111b21; --wa-text-sub: #667781;
            --wa-tab-inactive: rgba(255,255,255,0.8);
        }
        
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--wa-bg); color: var(--wa-text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- AUTH LAYER --- */
        #authLayer { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-logo { color: var(--wa-green-dark); font-size: 28px; font-weight: 700; margin-bottom: 40px; font-family: 'Arial', sans-serif; }
        .auth-input { width: 100%; max-width: 300px; border: none; border-bottom: 2px solid var(--wa-green-dark); padding: 10px; margin-bottom: 20px; outline: none; font-size: 16px; text-align: center; }
        .auth-btn { background: var(--wa-green-dark); color: white; border: none; padding: 12px 25px; border-radius: 4px; font-weight: 500; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* --- MAIN HEADER --- */
        .main-header { background: var(--wa-green-dark); color: white; padding: 15px 15px 0; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .top-bar h1 { font-size: 20px; margin: 0; font-weight: 500; }
        .top-icons { display: flex; gap: 20px; font-size: 20px; }

        /* --- TABS SYSTEM --- */
        .tabs { display: flex; text-align: center; text-transform: uppercase; font-size: 14px; font-weight: 700; }
        .tab { flex: 1; padding: 12px 0; color: var(--wa-tab-inactive); border-bottom: 3px solid transparent; cursor: pointer; transition: 0.3s; }
        .tab.active { color: white; border-bottom-color: white; }

        /* --- CONTENT --- */
        .content { flex: 1; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* --- CHAT LIST --- */
        .chat-row { display: flex; padding: 12px 16px; align-items: center; cursor: pointer; position: relative; }
        .chat-row:active { background: #f5f5f5; }
        .avatar-circle { width: 52px; height: 52px; border-radius: 50%; background: #dfe5e7; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; overflow: hidden; }
        .chat-details { flex: 1; border-bottom: 1px solid #f2f2f2; padding-bottom: 12px; }
        .chat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { font-weight: 500; font-size: 16px; color: var(--wa-text-main); }
        .chat-time { font-size: 12px; color: var(--wa-text-sub); }
        .chat-msg { font-size: 14px; color: var(--wa-text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--wa-green-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; box-shadow: 0 3px 10px rgba(0,0,0,0.3); cursor: pointer; }

        /* --- CHAT BOX OVERLAY --- */
        #chatBox { position: fixed; inset: 0; background: #e5ddd5; z-index: 5000; display: none; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .chat-head { background: var(--wa-green-dark); color: white; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .msg-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .m-me { align-self: flex-end; background: #d9fdd3; }
        .m-they { align-self: flex-start; background: #ffffff; }
        
        .wa-input-bar { padding: 8px; display: flex; align-items: center; gap: 8px; }
        .wa-input-cont { flex: 1; background: white; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        .wa-input-cont input { flex: 1; border: none; outline: none; padding: 8px; font-size: 16px; }
        .wa-send-btn { background: var(--wa-green-dark); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .status-dot { background: var(--wa-green-light); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="authLayer">
    <div class="auth-logo">Notre Univers</div>
    <input type="tel" class="auth-input" placeholder="Numéro de téléphone" id="aPhone">
    <input type="text" class="auth-input" placeholder="Pseudo" id="aPseudo">
    <input type="password" class="auth-input" placeholder="Mot de passe" id="aPass">
    <button class="auth-btn" onclick="handleAuth()">ENTRER</button>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <div class="top-bar">
            <h1>Notre Univers</h1>
            <div class="top-icons">
                <span>🔍</span>
                <span onclick="logout()">⋮</span>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('vChats', this)">Discussions</div>
            <div class="tab" onclick="switchTab('vStatut', this)">Statut</div>
            <div class="tab" onclick="switchTab('vAppels', this)">Appels</div>
        </div>
    </header>

    <div class="content">
        <div id="vChats" class="view active">
            <div style="padding: 15px; color: var(--wa-text-sub); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #f2f2f2;">
                <span>📥</span> <b>Archivées</b>
            </div>
            <div id="chatList"></div>
        </div>
        
        <div id="vStatut" class="view" style="padding:20px; text-align:center; color:gray;">
            <p>Aucun statut pour le moment</p>
        </div>

        <div id="vAppels" class="view" style="padding:20px; text-align:center; color:gray;">
            <p>Historique des appels vide</p>
        </div>
    </div>

    <div class="fab">💬</div>
</div>

<div id="chatBox">
    <div class="chat-head">
        <span onclick="closeChat()" style="cursor:pointer; font-size:22px;">←</span>
        <div class="avatar-circle" style="width:35px; height:35px; font-size:16px;">👤</div>
        <div style="flex:1">
            <b id="activeName">Contact</b><br>
            <small style="opacity:0.8">en ligne</small>
        </div>
    </div>
    <div class="msg-area" id="msgArea"></div>
    <div class="wa-input-bar">
        <div class="wa-input-cont">
            <span>😊</span>
            <input type="text" id="msgInput" placeholder="Message">
            <span>📎</span>
            <span>📷</span>
        </div>
        <button class="wa-send-btn" onclick="sendMsg()">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_realwa_user'));
    let currentChatId = null;

    async function handleAuth() {
        const phone = document.getElementById('aPhone').value.trim();
        const pseudo = document.getElementById('aPseudo').value.trim();
        const pass = document.getElementById('aPass').value;
        if(!phone || !pseudo || !pass) return alert("Champs incomplets");

        const id = "u_" + phone.replace(/\D/g,'');
        const snap = await db.ref('users/'+id).once('value');
        
        let userData = snap.exists() ? snap.val() : { id, phone, pseudo, pass };
        if(!snap.exists()) await db.ref('users/'+id).set(userData);
        
        if(userData.pass === pass) {
            user = userData;
            localStorage.setItem('nu_realwa_user', JSON.stringify(user));
            startApp();
        } else alert("Erreur identifiants");
    }

    function startApp() {
        document.getElementById('authLayer').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        loadChats();
    }

    function loadChats() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('chatList');
            list.innerHTML = "";
            s.forEach(snap => {
                const u = snap.val();
                if(u.id === user.id) return;
                list.innerHTML += `
                    <div class="chat-row" onclick="openChat('${u.id}', '${u.pseudo}')">
                        <div class="avatar-circle">👤</div>
                        <div class="chat-details">
                            <div class="chat-top"><span class="chat-name">${u.pseudo}</span><span class="chat-time">21:19</span></div>
                            <div class="chat-top"><span class="chat-msg">${u.phone}</span><span class="status-dot">1</span></div>
                        </div>
                    </div>`;
            });
        });
    }

    function openChat(id, name) {
        currentChatId = [user.id, id].sort().join('_');
        document.getElementById('activeName').innerText = name;
        document.getElementById('chatBox').style.display = 'flex';
        
        db.ref('msgs/'+currentChatId).on('value', s => {
            const area = document.getElementById('msgArea');
            area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                area.innerHTML += `<div class="bubble ${m.sid===user.id?'m-me':'m-they'}">${m.txt}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        db.ref('msgs/'+currentChatId).push({ sid: user.id, txt: input.value.trim(), t: Date.now() });
        input.value = "";
    }

    function switchTab(viewId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        el.classList.add('active');
    }

    function closeChat() { document.getElementById('chatBox').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
    if(user) startApp();
</script>
</body>
</html>
