<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        :root { 
            --accent: #ff9a9e; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.1);
            --love: #ff4b6e; --soft-purple: #a18cd1; --text-sub: #dcdde1;
        }
        body { margin: 0; font-family: 'Quicksand', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-size: cover; background-position: center; }
        
        /* Header & Tabs */
        .main-header { padding: 45px 20px 10px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tabs { display: flex; gap: 8px; margin-top: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 15px; font-size: 13px; background: var(--card); transition: 0.3s; color: var(--text-sub); }
        .tab.active { background: linear-gradient(135deg, var(--accent), var(--soft-purple)); color: #fff; font-weight: bold; box-shadow: 0 4px 15px rgba(255,154,158,0.3); }

        /* Views */
        .view { display: none; padding: 15px; height: calc(100vh - 160px); overflow-y: auto; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Chat & Bubbles */
        .contact-item { display: flex; align-items: center; padding: 12px; background: var(--card); border-radius: 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .contact-pfp { width: 48px; height: 48px; border-radius: 50%; margin-right: 12px; border: 2px solid var(--accent); overflow: hidden; }
        
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Correction des bulles */
        .bubble { padding: 10px 16px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .m-me { align-self: flex-end; background: linear-gradient(135deg, var(--soft-purple), var(--accent)); color: white; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: rgba(255,255,255,0.15); border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 9px; margin-top: 4px; opacity: 0.7; text-align: right; }

        /* Cocon Esthétique */
        .cocon-nav { display: flex; justify-content: space-around; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 25px; margin: 0 10px; }
        .nav-icon { font-size: 20px; filter: grayscale(1); opacity: 0.5; cursor: pointer; transition: 0.3s; }
        .nav-icon.active { filter: grayscale(0); opacity: 1; transform: scale(1.2); }
        .timer-val { font-size: 28px; font-weight: 600; color: var(--accent); text-shadow: 0 0 10px rgba(255,154,158,0.4); }

        /* Réglages */
        .set-card { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .set-card i { font-size: 24px; margin-bottom: 5px; }

        /* Modals & Popups */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 300px; padding: 25px; border-radius: 30px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid var(--accent); padding: 12px; border-radius: 15px; color: white; margin: 15px 0; outline: none; }
        
        .btn-love { background: linear-gradient(135deg, var(--love), var(--accent)); border: none; padding: 15px; border-radius: 20px; color: white; font-weight: bold; width: 100%; margin-top: 10px; box-shadow: 0 4px 15px rgba(255,75,110,0.3); }
        
        #vWidgetFull { display:none; position:fixed; inset:0; background:var(--bg); z-index:30000; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; }
    </style>
</head>
<body>

<div id="vWidgetFull">
    <div style="font-family:'Pacifico'; color:var(--accent); font-size:28px; margin-bottom:20px;">Petit mot pour toi... ✨</div>
    <div id="widgetText" style="font-size:18px; color:white; background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--accent); width:85%;">...</div>
    <button onclick="document.getElementById('vWidgetFull').style.display='none'" class="btn-love" style="width:auto; padding:10px 30px;">Fermer</button>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin:0; color:var(--accent);">...</h3>
        <div id="modalBody"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-love" style="background:var(--card)" onclick="triggerBack()">Retour</button>
            <button class="btn-love" id="modalConfirmBtn">Valider</button>
        </div>
    </div>
</div>

<div id="mainApp">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Notre Univers</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">☁️ Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">🌸 Cocon</div>
            <div class="tab" onclick="switchV('vSet', this)">⚙️ Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div></div>

    <div id="vCocon" class="view">
        <div style="background:var(--card); padding:25px; border-radius:30px; text-align:center; margin-bottom:20px; border:1px solid var(--accent);">
            <div style="font-size:40px">💖</div>
            <h3 style="margin:10px 0; font-family:'Pacifico'">Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:15px;">
                <div><b id="d-day" style="font-size:22px">0</b><br><small>Jours</small></div>
                <div><b id="d-hour" style="font-size:22px">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button onclick="askCoconCode()" class="btn-love">🎀 OUVRIR LE COCON</button>
        <button onclick="checkMood()" class="btn-love" style="background:var(--card); margin-top:12px; border:1px solid var(--love);">🌟 Besoin d'un mot doux ?</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpPreview" class="contact-pfp" style="width:100px; height:100px; margin:0 auto 20px;"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div class="set-card" onclick="openEdit('pseudo')"><span>👤</span>Pseudo</div>
            <div class="set-card" onclick="document.getElementById('pfpInput').click()"><span>🖼️</span>Photo</div>
            <div class="set-card" onclick="openEdit('code')"><span>🔑</span>Code</div>
            <div class="set-card" onclick="openEdit('startDate', true)"><span>📅</span>Date</div>
            <div class="set-card" style="grid-column:span 2" onclick="document.getElementById('wallInput').click()">🎨 Changer le fond d'écran</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); font-weight:bold; margin-top:10px;">Déconnexion</button>
        </div>
        <input type="file" id="pfpInput" hidden onchange="handlePfp(event)">
        <input type="file" id="wallInput" hidden onchange="handleWall(event)">
    </div>
</div>

<div id="coconBox">
    <div class="head" style="padding:45px 20px 15px; display:flex; align-items:center; background:linear-gradient(to right, var(--love), var(--accent));">
        <span onclick="triggerBack()" style="font-size:22px; margin-right:15px;">←</span>
        <b>🌹 Notre Cocon</b>
    </div>
    <div class="cocon-nav" style="margin-top:10px;">
        <span class="nav-icon active" id="ni-chat" onclick="switchCoconTab('chat')">💬</span>
        <span class="nav-icon" id="ni-time" onclick="switchCoconTab('time')">⌛</span>
        <span class="nav-icon" id="ni-gal" onclick="switchCoconTab('gal')">🎨</span>
    </div>
    <div class="msg-area" id="coArea"></div>
    <div id="coconTimer" style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:center;">
        <div class="timer-val" id="preciseCounter">00j 00h 00m 00s</div>
    </div>
    <div id="coconGallery" style="display:none; grid-template-columns:repeat(3, 1fr); gap:5px; padding:10px;"></div>
    <div id="coInputZone" style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.2);">
        <input type="text" id="coIn" placeholder="Secret..." style="flex:1; background:var(--card); border:none; padding:12px; border-radius:20px; color:white;">
        <button onclick="sendMsg('cocon')" style="background:var(--love); border:none; width:45px; height:45px; border-radius:50%;">➔</button>
    </div>
</div>

<script>
    // Configuration Firebase (Garde la tienne)
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let stateStack = [];
    let precisionInterval;

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function askCoconCode() {
        openModal("Cocon Privé", `<input type="password" id="modalInput" class="modal-input" placeholder="Ton code secret">`, (val) => {
            if(val === user.code) {
                document.getElementById('customModal').style.display = 'none';
                document.getElementById('coconBox').style.display='flex';
                stateStack.push('coconBox');
                history.pushState({id:'coconBox'}, "");
                sync('cocon', user.code, 'coArea');
            } else alert("Code incorrect ❌");
        });
    }

    function checkMood() {
        const mots = [
            "Tu es la plus belle chose qui me soit arrivée. 💖",
            "Mon cœur ne bat que pour toi, aujourd'hui et pour toujours. 🌹",
            "Peu importe la distance, tu es toujours dans mes pensées. ✨",
            "Merci d'être toi, merci d'être là. 🥰",
            "Je t'aime plus que tout au monde. 🌎"
        ];
        document.getElementById('widgetText').innerText = mots[Math.floor(Math.random() * mots.length)];
        document.getElementById('vWidgetFull').style.display = 'flex';
    }

    function switchCoconTab(mode) {
        document.getElementById('coArea').style.display = (mode === 'chat') ? 'flex' : 'none';
        document.getElementById('coconTimer').style.display = (mode === 'time') ? 'flex' : 'none';
        document.getElementById('coconGallery').style.display = (mode === 'gal') ? 'grid' : 'none';
        document.getElementById('coInputZone').style.display = (mode === 'chat') ? 'flex' : 'none';
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        document.getElementById('ni-' + mode).classList.add('active');
        if(mode === 'time') startPreciseTimer(); else clearInterval(precisionInterval);
    }

    function startPreciseTimer() {
        precisionInterval = setInterval(() => {
            const diff = Date.now() - new Date(user.startDate).getTime();
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('preciseCounter').innerText = `${d}j ${h}h ${m}m ${s}s`;
        }, 1000);
    }

    function sync(path, target, areaId) {
        db.ref(path + '/' + target).on('value', s => {
            const area = document.getElementById(areaId);
            area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                const isMe = m.sid === user.id;
                area.innerHTML += `<div class="bubble ${isMe ? 'm-me' : 'm-they'}">${m.txt}<div class="msg-meta">${new Date(m.t).getHours()}:${new Date(m.t).getMinutes()}</div></div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg(mode) {
        const inp = document.getElementById(mode === 'cocon' ? 'coIn' : 'mIn');
        if(!inp.value.trim()) return;
        db.ref('cocon/'+user.code).push({ sid: user.id, txt: inp.value, t: Date.now() });
        inp.value = "";
    }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display = 'flex';
        document.getElementById('modalConfirmBtn').onclick = () => a(document.getElementById('modalInput').value);
    }

    function triggerBack() { 
        document.getElementById('customModal').style.display = 'none';
        document.getElementById('coconBox').style.display = 'none';
    }

    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        if(user) {
            document.getElementById('uNameDisp').innerText = user.pseudo;
            if(user.wall) document.body.style.backgroundImage = `url('${user.wall}')`;
            // Init timer
            const diff = Date.now() - new Date(user.startDate).getTime();
            document.getElementById('d-day').innerText = Math.floor(diff / 86400000);
            document.getElementById('d-hour').innerText = Math.floor((diff % 86400000) / 3600000);
        } else {
            // Redirige vers auth si pas de user
        }
    };
</script>
</body>
            </html>
