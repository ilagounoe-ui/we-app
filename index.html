<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers v.44</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --online: #25D366;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; transition: 0.5s; }
        
        body.theme-default { background: #0f0c29; }
        body.theme-love { background: linear-gradient(to bottom, #420420, #000000); }
        body.theme-ocean { background: linear-gradient(to bottom, #001219, #005f73); }
        body.theme-forest { background: linear-gradient(to bottom, #081c15, #2d6a4f); }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .main-header { padding: 50px 20px 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }

        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; }
        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; position: relative; }
        .mood-badge { position: absolute; bottom: -2px; right: -2px; font-size: 14px; background: #1a1a2e; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }

        #chatBox, #coconBox { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; background: inherit; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; position: relative; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .msg-meta { font-size: 9px; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; opacity: 0.7; }

        .media-btn { background: var(--card); border: none; width: 42px; height: 42px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 25px; border-radius: 30px; border: 1px solid var(--accent); text-align: center; }
        .option-btn { width: 100%; padding: 14px; margin-top: 8px; border-radius: 15px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body class="theme-default" onclick="unlockAudio()">

<div id="splash"><div class="loader"></div></div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active"><div id="chatList"></div><div style="position:fixed; bottom:30px; right:25px; width:60px; height:60px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:25px; color:#000;" onclick="addFriend()">+</div></div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:25px; border-radius:30px; text-align:center; margin-bottom:20px;">
            <h3>Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:10px;"><b id="d-day" style="font-size:24px">0</b> Jours</div>
        </div>
        <button onclick="askCoconCode()" style="width:100%; padding:20px; border-radius:25px; border:2px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold;">OUVRIR LE COCON</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpPreview" class="contact-pfp" style="width:90px; height:90px; margin:0 auto 15px; border:2px solid var(--accent);" onclick="document.getElementById('pfpInput').click()">👤</div>
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="handlePfp(event)">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="option-btn" onclick="openEdit('pseudo')">Pseudo</div>
            <div class="option-btn" onclick="openMood()">Humeur <span id="myMoodDisp">😊</span></div>
            <div class="option-btn" onclick="changeTheme()">Thème 🎨</div>
            <div class="option-btn" onclick="openEdit('code')">Code</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); margin-top:15px;">Déconnexion</button>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="head">
        <span onclick="triggerBack()">←</span>
        <b id="cName" style="flex:1">...</b>
        <span onclick="openChatMenu()" style="font-size:22px; cursor:pointer;">⋮</span>
    </div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:8px; align-items:center; background:rgba(0,0,0,0.2);">
        <button class="media-btn" onclick="openMotsDoux()">❤️</button>
        <button class="media-btn" onclick="document.getElementById('imgIn').click()">🖼️</button>
        <input type="file" id="imgIn" hidden accept="image/*" onchange="sendMedia('img', this)">
        <input type="text" id="mIn" placeholder="Ecrire..." style="flex:1; background:var(--card); border:none; padding:12px; border-radius:20px; color:white;">
        <button onclick="sendMsg('msgs')" style="background:var(--accent); border:none; width:42px; height:42px; border-radius:50%;">➔</button>
    </div>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle">...</h3>
        <div id="modalBody"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" onclick="triggerBack()">Fermer</button>
            <button class="option-btn" style="background:var(--accent); color:#000" id="modalConfirmBtn">OK</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null, audioUnlocked = false, stateStack = [];
    const popSound = new Audio('https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3');

    function unlockAudio() { if(!audioUnlocked) { popSound.play().then(() => { popSound.pause(); audioUnlocked=true; }); } }
    function pushState(id) { stateStack.push(id); history.pushState({id}, ""); }
    window.onpopstate = () => { stateStack.pop(); document.querySelectorAll('.modal-overlay, #chatBox, #coconBox').forEach(el => el.style.display='none'); };
    function triggerBack() { history.back(); }

    function start() {
        document.getElementById('splash').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        document.getElementById('myMoodDisp').innerText = user.mood || "😊";
        applyTheme(user.theme || 'default');
        loadContacts(); loadTimer();
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).on('value', us => {
                    const u = us.val(); if(!u) return;
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}')">
                        <div class="contact-pfp">${u.pfp?`<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover">`:u.pseudo[0]}
                        <div class="mood-badge">${u.mood || "😊"}</div></div>
                        <b>${u.pseudo}</b>
                    </div>`;
                });
            });
        });
    }

    function openChat(id, name) {
        activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display='flex';
        pushState('chatBox');
        sync('msgs', activeId, 'mArea');
    }

    function sync(path, target, areaId) {
        const area = document.getElementById(areaId);
        db.ref(path+'/'+target).on('value', s => {
            area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val(), isMe = m.sid===user.id;
                area.innerHTML += `<div class="bubble ${isMe?'m-me':'m-they'}">${m.type==='img'?`<img src="${m.txt}" style="width:100%;border-radius:10px">`:m.txt}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg(path, txt) {
        const input = document.getElementById(path==='cocon'?'coIn':'mIn');
        const message = txt || input.value;
        if(!message.trim()) return;
        const target = path==='cocon'?"shared_cocon_"+user.code : activeId;
        db.ref(path+'/'+target).push({ sid:user.id, txt:message, ts:Date.now(), type:'text' });
        input.value = "";
    }

    function openMotsDoux() {
        const mots = ["Je t'aime ❤️", "Tu me manques... 🥺", "Bisous partout ! 😘", "Hâte de te voir 🥰"];
        let html = mots.map(m => `<button class="option-btn" onclick="sendMsg('msgs','${m}');triggerBack()">${m}</button>`).join('');
        openModal("Mots Doux", html, null);
    }

    function openMood() {
        const moods = ["😊","🥰","🥺","😴","🔥","🍿","😇","🤔"];
        let html = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">` + 
            moods.map(m => `<div style="font-size:30px;cursor:pointer" onclick="updateMood('${m}')">${m}</div>`).join('') + `</div>`;
        openModal("Mon Humeur", html, null);
    }

    function updateMood(m) {
        db.ref('users/'+user.id).update({mood: m});
        user.mood = m; localStorage.setItem('nu_v33_user', JSON.stringify(user));
        document.getElementById('myMoodDisp').innerText = m;
        triggerBack();
    }

    function openChatMenu() {
        openModal("Options", `<button class="option-btn" style="color:var(--love)" onclick="alert('Bientôt...')">Effacer discussion</button>`, null);
    }

    function changeTheme() {
        const themes = ['default', 'love', 'ocean', 'forest'];
        let next = themes[(themes.indexOf(user.theme || 'default') + 1) % themes.length];
        applyTheme(next); user.theme = next;
        localStorage.setItem('nu_v33_user', JSON.stringify(user));
        db.ref('users/'+user.id).update({theme: next});
    }
    function applyTheme(t) { document.body.className = 'theme-' + t; }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display='flex';
        pushState('modal');
        if(a) document.getElementById('modalConfirmBtn').onclick = () => { a(); triggerBack(); };
    }

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    // (Garde tes fonctions Login, Register, PFP, Timer habituelles ici)
    window.onload = () => { if(user) start(); else document.getElementById('splash').style.display='none'; };
</script>
</body>
</html>
