<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Elite v7.7</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff2d55; --primary: #5856d6; --bg: #050505; --card: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.12); }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border); }
        .app-shell { height: 100vh; display: flex; flex-direction: column; display: none; }
        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 120px; }
        .view-active { display: block; animation: fadeIn 0.3s ease; }

        /* LISTE AMIS */
        .friend-card { background: var(--card); padding: 16px; border-radius: 22px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .btn-talk { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 15px; font-size: 12px; font-weight: 700; }

        /* CHAT MODAL AMIS */
        #friendChatOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; }
        .chat-header { padding: 50px 20px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); }

        /* MESSAGES & VUE UNIVERSAL */
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 15px; }
        .bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
        .mine { align-self: flex-end; align-items: flex-end; }
        .theirs { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 15px; }
        .mine .bubble { background: var(--primary); border-bottom-right-radius: 4px; }
        .theirs .bubble { background: var(--card); border-bottom-left-radius: 4px; }
        .m-info { font-size: 9px; opacity: 0.4; margin-top: 2px; }
        .seen-mark { color: #4cd964; font-weight: 800; margin-left: 4px; }

        /* BOTTOM NAV */
        .bottom-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; border-radius: 35px; display: flex; justify-content: space-around; align-items: center; background: rgba(15, 15, 15, 0.98); border: 1px solid var(--border); z-index: 5000; }
        .nav-item { font-size: 26px; opacity: 0.3; }
        .nav-active { opacity: 1; transform: translateY(-5px); }

        .btn-main { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 800; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="authLayer" style="position:fixed; inset:0; background:#000; z-index:20000; display:flex; align-items:center; justify-content:center; padding:30px;">
    <div class="glass" style="padding: 40px; border-radius: 45px; width: 100%; max-width: 320px; text-align: center;">
        <h2 style="font-weight:800; margin-bottom:25px;">NEXUS</h2>
        <input type="text" id="aName" placeholder="Ton Surnom">
        <input type="password" id="aPass" placeholder="Ton Code" style="margin-top:10px;">
        <button class="btn-main" onclick="handleAuth()" style="margin-top:20px;">CONNEXION</button>
    </div>
</div>

<div id="friendChatOverlay">
    <div class="chat-header">
        <span onclick="closeFriendChat()" style="font-size:24px;">←</span>
        <b id="friendChatName">Ami</b>
    </div>
    <div id="fBox" class="msg-list"></div>
    <div style="display:flex; gap:10px; padding:20px;">
        <input type="text" id="fInput" placeholder="Message privé...">
        <button onclick="sendFriendMsg()" class="btn-main" style="width:60px;">➔</button>
    </div>
</div>

<div class="app-shell" id="app">
    <div id="vWorld" class="view view-active">
        <h3 style="margin-top:40px; font-weight:800;">🌍 Communauté</h3>
        <div id="listFriends"></div>
    </div>

    <div id="vCouple" class="view">
        <div id="dayCounter" style="margin-top:30px; background:linear-gradient(90deg, var(--accent), var(--primary)); padding:18px; border-radius:22px; text-align:center; font-weight:800; font-size:14px;"></div>
        <div id="cBox" class="msg-list" style="height:calc(100vh - 400px); margin-top:20px;"></div>
        <div style="display:flex; gap:10px; padding-top:10px;">
            <input type="text" id="cInput" placeholder="Message duo...">
            <button onclick="sendCoupleMsg()" class="btn-main" style="width:60px;">➔</button>
        </div>
    </div>

    <div id="vSets" class="view">
        <h3 style="margin-top:40px;">⚙️ Paramètres</h3>
        <div class="glass" style="padding:25px; border-radius:30px;">
            <input type="text" id="setCode" placeholder="Code secret duo">
            <input type="date" id="setMeet">
            <button onclick="saveSets()" class="btn-main" style="margin-top:20px;">ENREGISTRER</button>
        </div>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item nav-active" onclick="nv('vWorld', this)">🌎</div>
        <div class="nav-item" onclick="nv('vCouple', this)">❤️</div>
        <div class="nav-item" onclick="nv('vSets', this)">⚙️</div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nexus_v7_7'));
    let currentFriendChatId = null;

    function triggerNotify() {
        if (!document.hidden) return;
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification("Nexus", { body: "Nouveau message", icon: "https://ui-avatars.com/api/?name=N&background=ff2d55" });
        }
        if ("vibrate" in navigator) navigator.vibrate([100, 50, 100]);
    }

    async function handleAuth() {
        if ("Notification" in window) Notification.requestPermission();
        const n = document.getElementById('aName').value.trim().toLowerCase();
        const p = document.getElementById('aPass').value;
        const s = await db.ref('users').orderByChild('name').equalTo(n).once('value');
        if(s.exists()){
            const u = Object.values(s.val())[0];
            if(u.pass === p) login(u);
        } else {
            const nu = { id:'u'+Date.now(), name:n, pass:p, pfp:'https://ui-avatars.com/api/?name='+n, code:'' };
            await db.ref('users/'+nu.id).set(nu);
            login(nu);
        }
    }

    function login(u) {
        user = u;
        localStorage.setItem('nexus_v7_7', JSON.stringify(u));
        document.getElementById('authLayer').style.display='none';
        document.getElementById('app').style.display='flex';
        initApp();
    }

    if(user) login(user);

    function initApp() {
        if(user.code) {
            db.ref('couples/'+user.code+'/chat').limitToLast(20).on('value', s => {
                const b = document.getElementById('cBox'); b.innerHTML = "";
                s.forEach(snap => {
                    const m = snap.val();
                    const mine = m.sid === user.id;
                    if(!mine && !m.seen) db.ref('couples/'+user.code+'/chat/'+snap.key).update({seen: true});
                    b.innerHTML += `
                        <div class="bubble-wrap ${mine?'mine':'theirs'}">
                            <div class="bubble">${m.txt}</div>
                            <div class="m-info">${new Date(m.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${mine && m.seen ? '<span class="seen-mark">✔ Vu</span>' : ''}</div>
                        </div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
            updateCounter();
        }
        loadFriends();
    }

    function openFriendChat(fId, fName) {
        const chatId = [user.id, fId].sort().join('_');
        currentFriendChatId = chatId;
        document.getElementById('friendChatName').innerText = fName;
        document.getElementById('friendChatOverlay').style.display = 'flex';
        
        db.ref('private_chats/' + chatId).limitToLast(20).on('value', s => {
            const b = document.getElementById('fBox'); b.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                const mine = m.sid === user.id;
                if(!mine && !m.seen) db.ref('private_chats/'+chatId+'/'+snap.key).update({seen: true});
                b.innerHTML += `
                    <div class="bubble-wrap ${mine?'mine':'theirs'}">
                        <div class="bubble" style="background:${mine? 'var(--accent)' : 'var(--card)'}">${m.txt}</div>
                        <div class="m-info">${new Date(m.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${mine && m.seen ? '<span class="seen-mark">✔ Vu</span>' : ''}</div>
                    </div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    function closeFriendChat() {
        document.getElementById('friendChatOverlay').style.display = 'none';
        if(currentFriendChatId) db.ref('private_chats/' + currentFriendChatId).off();
        currentFriendChatId = null;
    }

    function sendFriendMsg() {
        const i = document.getElementById('fInput');
        if(!i.value || !currentFriendChatId) return;
        db.ref('private_chats/' + currentFriendChatId).push({ sid: user.id, txt: i.value, t: Date.now(), seen: false });
        i.value = "";
    }

    function sendCoupleMsg() {
        const i = document.getElementById('cInput');
        if(!i.value || !user.code) return;
        db.ref('couples/'+user.code+'/chat').push({ sid:user.id, txt:i.value, t:Date.now(), seen: false });
        i.value = "";
    }

    function loadFriends() {
        db.ref('users').on('value', s => {
            const d = document.getElementById('listFriends'); d.innerHTML = "";
            s.forEach(snap => {
                const u = snap.val();
                if(u.id === user.id) return;
                d.innerHTML += `
                    <div class="friend-card">
                        <b style="text-transform:capitalize;">${u.name}</b>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <button class="btn-talk" onclick="openFriendChat('${u.id}', '${u.name}')">Message</button>
                            <span onclick="alert('Options')">⋮</span>
                        </div>
                    </div>`;
            });
        });
    }

    function nv(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.getElementById(id).classList.add('view-active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        el.classList.add('nav-active');
    }

    function updateCounter() {
        if(!user.meet) return;
        const diff = Math.floor((new Date() - new Date(user.meet)) / (1000*60*60*24));
        document.getElementById('dayCounter').innerText = `✨ ${diff} JOURS DE BONHEUR ✨`;
    }

    function saveSets() {
        const up = { code: document.getElementById('setCode').value, meet: document.getElementById('setMeet').value };
        db.ref('users/'+user.id).update(up).then(() => {
            user = {...user, ...up};
            localStorage.setItem('nexus_v7_7', JSON.stringify(user));
            location.reload();
        });
    }
</script>
</body>
</html>
