<style>
/* Style spécifique pour le look NGL */
.ngl-input {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 15px;
  padding: 15px;
  color: white;
  margin-top: 10px;
  box-sizing: border-box;
  font-family: inherit;
}

.ngl-card {
  background: #f0f0f0;
  color: #333;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
  text-align: left;
  font-size: 14px;
  box-shadow: 5px 5px 0px #ff4da6; /* Le look un peu cartoon de NGL */
}
</style>

<div id="main">
  <p class="days" id="days"></p>
  
  <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px;">
    <p style="font-size: 14px; margin-bottom: 5px;">Envoyer un message anonyme... 🤫</p>
    <textarea id="nglMessage" class="ngl-input" placeholder="Dis-moi un truc que tu n'oses pas dire..."></textarea>
    <button onclick="envoyerSecret()" style="background: #ff4da6;">Envoyer (Anonyme)</button>
  </div>

  <div id="boiteSecrets" style="margin-top: 20px; display:none;">
    <p>📬 Tes messages secrets :</p>
    <div id="listeMessages"></div>
  </div>

  <button class="secondary" onclick="voirSecrets()">👀 Voir mes messages</button>
  <br>
  <button class="secondary" onclick="editDate()">🔄 Modifier la date</button>
</div>

<script>
// --- LOGIQUE NGL ---

function envoyerSecret() {
  let msg = document.getElementById("nglMessage").value;
  if(msg.trim() !== "") {
    // On récupère les messages existants
    let secrets = JSON.parse(localStorage.getItem("monNGL") || "[]");
    secrets.push({
      texte: msg,
      date: new Date().toLocaleDateString()
    });
    localStorage.setItem("monNGL", JSON.stringify(secrets));
    
    document.getElementById("nglMessage").value = "";
    alert("Envoyé anonymement ! ✨");
  }
}

function voirSecrets() {
  let divBoite = document.getElementById("boiteSecrets");
  let liste = document.getElementById("listeMessages");
  let secrets = JSON.parse(localStorage.getItem("monNGL") || "[]");
  
  liste.innerHTML = "";
  
  if(secrets.length === 0) {
    liste.innerHTML = "<p style='font-size:12px;'>Aucun message pour l'instant... 😢</p>";
  } else {
    secrets.forEach(s => {
      liste.innerHTML += `<div class="ngl-card"><strong>${s.date} :</strong><br>${s.texte}</div>`;
    });
  }
  
  divBoite.style.display = divBoite.style.display === "none" ? "block" : "none";
}

// ... (Garde tes autres fonctions calculateDays, etc.) ...
</script>
