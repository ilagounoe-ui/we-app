<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3; --online: #25D366;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-size: cover; background-position: center; transition: background 0.5s ease; }
        
        /* Splash */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.2s ease-in-out forwards; animation-delay: 1.2s; }
        @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Header & Navigation */
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); transition: 0.3s; cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; transform: scale(1.05); }

        /* Views */
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }

        /* Contacts & Badges */
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #2a2a40; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .wa-badge { background: var(--online); color: white; font-size: 10px; min-width: 20px; height: 20px; border-radius: 10px; display: none; align-items: center; justify-content: center; margin-left: 8px; font-weight: bold; }
        .opt-dots { margin-left: auto; padding: 10px; font-size: 22px; cursor: pointer; color: var(--accent); }

        /* Chat boxes - HEADER FIXE ICI */
        #chatBox, #coconBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; background-size: cover; background-position: center; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: #0f0c29; position: sticky; top: 0; z-index: 1000; }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubbles */
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; position: relative; line-height: 1.4; word-wrap: break-word; user-select: none; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .msg-meta { font-size: 10px; margin-top: 5px; display: flex; justify-content: flex-end; gap: 5px; opacity: 0.7; }

        /* Cocon Specific */
        .cocon-nav { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-icon { font-size: 20px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .nav-icon.active { opacity: 1; transform: scale(1.2); }

        /* Effet Brillance Mot Doux */
        @keyframes glow-love {
            0% { box-shadow: 0 0 5px var(--love); border-color: var(--love); }
            50% { box-shadow: 0 0 25px var(--love); border-color: #fff; transform: scale(1.02); }
            100% { box-shadow: 0 0 5px var(--love); border-color: var(--love); }
        }
        .glow-active { animation: glow-love 1.5s infinite !important; border-style: solid !important; background: rgba(255, 75, 110, 0.15) !important; }

        /* Modals & Humeurs */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 30px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: white; margin: 10px 0; text-align: center; outline: none; }
        .option-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 18px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* GRILLE HUMEURS CARREES */
        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .mood-item { background: var(--card); padding: 25px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 1/1; }
        .mood-item:active { transform: scale(0.95); background: var(--accent); color: black; }

        .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 50; }
        .media-btn { background: var(--card); border: none; width: 42px; height: 42px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="splash"><div class="loader"></div></div>

<div id="vWidgetFull" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:30000; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px;">
    <div style="font-family:'Pacifico'; color:var(--love); font-size:30px; margin-bottom:30px;">L'Univers te dit... 💖</div>
    <div id="widgetText" style="font-size:20px; color:white; background:var(--card); padding:30px; border-radius:35px; border:2px solid var(--love); min-height:150px; display:flex; align-items:center; justify-content:center; width:90%;">...</div>
    <button id="widgetCloseBtn" class="option-btn" style="width:auto; padding:10px 40px; margin-top:30px;">Retour</button>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--accent); margin:0 0 10px 0;">...</h3>
        <div id="modalError" style="color:var(--love); font-size:12px; margin-bottom:5px; font-weight:bold;"></div>
        <div id="modalBody"></div>
        <div id="modalActions" style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" style="background:var(--card)" id="modalCancelBtn">Annuler</button>
            <button class="option-btn" style="background:var(--accent); color:black" id="modalConfirmBtn">Confirmer</button>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Pseudo</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active">
        <div id="chatList"></div>
        <div class="fab" onclick="addFriend()">+</div>
    </div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:30px; border-radius:35px; text-align:center; margin-bottom:25px;">
            <div style="font-size:45px">💑</div>
            <h3 style="margin:10px 0">Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:15px; margin-top:15px;">
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px; min-width:80px;"><b id="d-day" style="font-size:24px">0</b><br><small>Jours</small></div>
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px; min-width:80px;"><b id="d-hour" style="font-size:24px">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button id="btnOpenCocon" onclick="askCoconCode()" style="width:100%; padding:22px; border-radius:28px; border:2px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold; cursor:pointer; transition: 0.3s;">💖 OUVRIR LE COCON</button>
        <button onclick="checkMood()" style="width:100%; padding:15px; border-radius:28px; border:none; background:var(--card); color:white; font-weight:bold; cursor:pointer; margin-top:15px;">🌟 Besoin d'un mot doux ?</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpPreview" class="contact-pfp" style="width:110px; height:110px; margin:0 auto 20px; border:3px solid var(--accent); font-size:40px;" onclick="if(user.pfp) viewPhoto(user.pfp)">👤</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="contact-item" style="flex-direction:column; justify-content:center; padding:20px; margin:0;" onclick="openEdit('pseudo')"><b>Pseudo</b></div>
            <div class="contact-item" style="flex-direction:column; justify-content:center; padding:20px; margin:0;" onclick="document.getElementById('pfpInput').click()"><b>Photo</b></div>
            <div class="contact-item" style="flex-direction:column; justify-content:center; padding:20px; margin:0;" onclick="openEdit('code')"><b>Code Cocon</b></div>
            <div class="contact-item" style="flex-direction:column; justify-content:center; padding:20px; margin:0;" onclick="openEdit('startDate', true)"><b>Date</b></div>
            <div class="contact-item" style="grid-column:span 2; justify-content:center; margin:0; background:var(--love); color:black;" onclick="sendLoveNote()">💌 Envoyer un mot doux</div>
            <button onclick="logout()" style="grid-column:span 2; background:none; border:none; color:var(--love); margin-top:15px; font-weight:bold;">Déconnexion</button>
        </div>
        <input type="file" id="pfpInput" hidden accept="image/*" onchange="handleFile(event, 'pfp')">
    </div>
</div>

<div id="chatBox">
    <div class="head">
        <span onclick="triggerBack()" style="font-size:24px; cursor:pointer;">←</span>
        <div id="chatPfp" class="contact-pfp" style="width:40px; height:40px; margin-right:10px;"></div>
        <b id="cName" style="flex:1">...</b>
        <div class="opt-dots" onclick="openChatOptions()">⋮</div>
    </div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:10px; align-items:center; background:rgba(0,0,0,0.3);">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;">
        <button onclick="sendMsg('msgs')" style="background:var(--accent); border:none; width:50px; height:50px; border-radius:50%; font-size:20px;">➔</button>
    </div>
</div>

<div id="coconBox">
    <div class="head" style="background:var(--love)">
        <span onclick="triggerBack()" style="font-size:24px; cursor:pointer;">←</span>
        <b style="flex:1">🌹 Notre Univers</b>
    </div>
    <div class="cocon-nav">
        <span class="nav-icon active" id="ni-chat" onclick="switchCoconTab('chat')">💬</span>
        <span class="nav-icon" id="ni-gal" onclick="switchCoconTab('gal')">🖼️</span>
    </div>
    <div class="msg-area" id="coArea"></div>
    <div id="coconGallery" style="display:none; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px;"></div>
    <div id="coInputZone" style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.3);">
        <button class="media-btn" onclick="document.getElementById('imgInCo').click()">🖼️</button>
        <input type="file" id="imgInCo" hidden accept="image/*" onchange="sendMedia('cocon', this)">
        <input type="text" id="coIn" placeholder="Écris un secret..." style="flex:1; background:var(--card); border:none; padding:15px; border-radius:25px; color:white;">
        <button onclick="sendMsg('cocon')" style="background:var(--love); border:none; width:50px; height:50px; border-radius:50%; font-size:20px;">➔</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null;
    let stateStack = [];
    let activeChatPath = null;
    let pressTimer;

    function formatTime(ts) { const d = new Date(ts); return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0'); }
    function getPfp(u) { 
        const photo = u.pfp || "";
        const pseudo = u.pseudo || "U";
        if(photo) return `<img src="${photo}" style="width:100%; height:100%; object-fit:cover;" onclick="event.stopPropagation(); viewPhoto('${photo}')">`; 
        return `<span onclick="event.stopPropagation(); viewPhoto('')">${pseudo[0].toUpperCase()}</span>`; 
    }
    function unlockAudio() { }

    // Navigation
    function pushState(id) { stateStack.push(id); history.pushState({id}, ""); }
    window.onpopstate = () => {
        const s = stateStack.pop();
        if(s === 'modal') document.getElementById('customModal').style.display = 'none';
        else if(s === 'chatBox') { document.getElementById('chatBox').style.display = 'none'; if(activeChatPath) db.ref(activeChatPath).off(); }
        else if(s === 'coconBox') { document.getElementById('coconBox').style.display = 'none'; if(activeChatPath) db.ref(activeChatPath).off(); }
    };
    function triggerBack() { history.back(); }

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function start() {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        document.getElementById('pfpPreview').innerHTML = getPfp(user);
        loadContacts(); loadTimer();
        monitorLoveNotes();
    }

    function monitorLoveNotes() {
        db.ref('cocon/' + user.code).on('value', s => {
            let hasNewNote = false;
            s.forEach(snap => {
                const m = snap.val();
                if (m.type === 'love_note' && m.sid !== user.id && !m.read) hasNewNote = true;
            });
            const btn = document.getElementById('btnOpenCocon');
            if (hasNewNote) btn.classList.add('glow-active');
            else btn.classList.remove('glow-active');
        });
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val(); if(!u) return;
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}','${u.pfp||''}')">
                        <div class="contact-pfp">${getPfp(u)}</div>
                        <div style="flex:1"><b>${u.pseudo}</b> <div class="wa-badge" id="badge-${u.id}">0</div></div>
                    </div>`;
                });
            });
        });
    }

    function openChat(id, name, pfp) {
        activeId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatPfp').innerHTML = getPfp({pseudo: name, pfp: pfp});
        document.getElementById('chatBox').style.display='flex';
        pushState('chatBox');
        sync('msgs', activeId, 'mArea');
    }

    function askCoconCode() {
        openModal("Cocon Secret", `<input type="password" id="modalInput" class="modal-input" placeholder="Ton code">`, (val) => {
            if(val === user.code) {
                document.getElementById('customModal').style.display = 'none';
                db.ref('cocon/' + user.code).once('value', s => {
                    let lastNote = null; let noteKey = null;
                    s.forEach(snap => {
                        const m = snap.val();
                        if (m.type === 'love_note' && m.sid !== user.id && !m.read) { lastNote = m.txt; noteKey = snap.key; }
                    });
                    if (lastNote) {
                        document.getElementById('widgetText').innerText = lastNote;
                        document.getElementById('vWidgetFull').style.display = 'flex';
                        db.ref('cocon/' + user.code + '/' + noteKey).update({read: true});
                        document.getElementById('widgetCloseBtn').onclick = () => {
                            document.getElementById('vWidgetFull').style.display = 'none';
                            enterCocon();
                        };
                    } else enterCocon();
                });
            } else { document.getElementById('modalError').innerText = "Code incorrect"; }
        });
    }

    function enterCocon() {
        document.getElementById('coconBox').style.display='flex';
        pushState('coconBox');
        sync('cocon', user.code, 'coArea');
    }

    function sync(path, target, areaId) {
        if(activeChatPath) db.ref(activeChatPath).off();
        activeChatPath = path + '/' + target;
        db.ref(activeChatPath).on('value', s => {
            const area = document.getElementById(areaId); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val(); 
                if(m.type === 'love_note' && path === 'cocon') return;
                const isMe = m.sid === user.id;
                let content = m.type === 'img' ? `<img src="${m.txt}" style="width:100%; border-radius:15px;" onclick="viewPhoto('${m.txt}')">` : m.txt;
                const msgEl = document.createElemeent('div');
                msgEl.className = `bubble ${isMe?'m-me':'m-they'}`;
                msgEl.innerHTML = `${content}<div class="msg-meta">${formatTime(m.t)}</div>`;
                
                msgEl.onmousedown = () => { pressTimer = setTimeout(() => openMsgOptions(path, target, snap.key, m.txt), 800); };
                msgEl.onmouseup = () => clearTimeout(pressTimer);
                msgEl.ontouchstart = () => { pressTimer = setTimeout(() => openMsgOptions(path, target, snap.key, m.txt), 800); };
                msgEl.ontouchend = () => clearTimeout(pressTimer);
                area.appendChild(msgEl);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function openMsgOptions(path, target, mid, txt) {
        openModal("Options Message", `
            <button class="option-btn" onclick="openEditMsg('${path}','${target}','${mid}','${txt}')">✏️ Modifier</button>
            <button class="option-btn" style="color:var(--love)" onclick="db.ref('${path}/${target}/${mid}').remove(); triggerBack();">🗑️ Supprimer</button>
        `, null);
    }

    function openEditMsg(p, t, mid, old) {
        openModal("Modifier", `<input type="text" id="modalInput" class="modal-input" value="${old}">`, (v) => {
            db.ref(`${p}/${t}/${mid}`).update({txt: v}).then(() => triggerBack());
        });
    }

    function sendMsg(mode) {
        const inp = document.getElementById(mode==='msgs'?'mIn':'coIn');
        if(!inp.value.trim()) return;
        db.ref(mode==='msgs'?'msgs/'+activeId:'cocon/'+user.code).push({ sid: user.id, txt: inp.value, t: Date.now(), type: 'text', read: false });
        inp.value = "";
    }

    function sendMedia(mode, input) {
        const file = input.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = (e) => {
            db.ref(mode==='msgs'?'msgs/'+activeId:'cocon/'+user.code).push({ sid: user.id, txt: e.target.result, t: Date.now(), type: 'img', read: false });
        };
        r.readAsDataURL(file);
    }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('modalError').innerText = "";
        document.getElementById('customModal').style.display = 'flex';
        document.getElementById('modalActions').style.display='flex';
        pushState('modal');
        document.getElementById('modalConfirmBtn').onclick = () => {
            const val = document.getElementById('modalInput') ? document.getElementById('modalInput').value : null;
            if (a) a(val);
        };
        document.getElementById('modalCancelBtn').onclick = () => triggerBack();
    }

    function checkMood() {
        openModal("Comment te sens-tu ?", `
            <div class="mood-grid">
                <div class="mood-item" onclick="showMoodNote('triste')">🥺<br>Triste</div>
                <div class="mood-item" onclick="showMoodNote('fatigue')">😴<br>Fatigué</div>
                <div class="mood-item" onclick="showMoodNote('joyeux')">😊<br>Heureux</div>
                <div class="mood-item" onclick="showMoodNote('colere')">😠<br>Énervé</div>
            </div>
        `, null);
        document.getElementById('modalActions').style.display = 'none';
    }

    function showMoodNote(mood) {
        const notes = {
            triste: ["Je suis là pour toi, souris. 💖", "Rien n'est plus fort que nous. ✨", "Tu es mon petit soleil."],
            fatigue: ["Repose-toi mon amour, je veille. 🌹", "Demain sera plus beau. 🥰", "Prends soin de toi pour moi."],
            joyeux: ["Ton bonheur est le mien ! 💑", "Je t'aime à l'infini. 🚀", "Tu es incroyable."],
            colere: ["Respire, je suis avec toi. ❤️", "On gère ça ensemble, calme-toi.", "Viens dans mes bras (virtuels)."]
        };
        const list = notes[mood];
        document.getElementById('widgetText').innerText = list[Math.floor(Math.random()*list.length)];
        document.getElementById('customModal').style.display = 'none';
        document.getElementById('vWidgetFull').style.display = 'flex';
        document.getElementById('widgetCloseBtn').onclick = () => document.getElementById('vWidgetFull').style.display = 'none';
    }

    function sendLoveNote() {
        openModal("Envoyer un mot doux", `<input type="text" id="modalInput" class="modal-input" placeholder="Ton mot doux...">`, (v) => {
            if(v) {
                db.ref('cocon/'+user.code).push({ sid: user.id, txt: v, t: Date.now(), type: 'love_note', read: false });
                showToast("Envoyé ! ✨"); triggerBack();
            }
        });
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.innerText = msg;
        t.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--accent); color:black; padding:10px 25px; border-radius:20px; z-index:100000; font-weight:bold;";
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function openChatOptions() {
        openModal("Options Discussion", `<button class="option-btn" onclick="clearChat()">🗑️ Vider la discussion</button>`, null);
        document.getElementById('modalConfirmBtn').style.display = 'none';
    }

    function clearChat() {
        if(confirm("Vider tout l'historique ?")) {
            db.ref('msgs/' + activeId).remove();
            triggerBack();
        }
    }

    function openEdit(f, isD=false) {
        openModal("Modifier", `<input type="${isD?'date':'text'}" id="modalInput" class="modal-input" value="${user[f]||''}">`, (v) => {
            db.ref('users/'+user.id).update({[f]:v}).then(() => { user[f]=v; localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload(); });
        });
    }

    function handleFile(e, type) {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = (ev) => {
            db.ref('users/'+user.id).update({[type]: ev.target.result}).then(() => {
                user[type] = ev.target.result; localStorage.setItem('nu_v33_user', JSON.stringify(user)); location.reload();
            });
        };
        r.readAsDataURL(file);
    }

    function loadTimer() {
        if(!user.startDate) return;
        const up = () => {
            const diff = Date.now() - new Date(user.startDate).getTime();
            document.getElementById('d-day').innerText = Math.floor(diff/86400000);
            document.getElementById('d-hour').innerText = Math.floor((diff%86400000)/3600000);
        };
        up(); setInterval(up, 60000);
    }

    function addFriend() {
        openModal("Ajouter", `<input type="tel" id="modalInput" class="modal-input" placeholder="Numéro">`, (tel) => {
            const id = "u_"+tel.replace(/\D/g,'');
            db.ref('users/'+id).once('value', s => {
                if(s.exists()) {
                    db.ref(`users/${user.id}/contacts/${id}`).set(true);
                    db.ref(`users/${id}/contacts/${user.id}`).set(true);
                    triggerBack();
                } else alert("Inconnu");
            });
        });
    }

    function viewPhoto(src) { 
        if(!src) { alert("Aucune photo."); return; }
        openModal("Photo", `<img src="${src}" style="width:100%; border-radius:20px;">`, null); 
        document.getElementById('modalActions').style.display='none'; 
    }
    function logout() { localStorage.clear(); location.reload(); }
    window.onload = () => { if(user) start(); else document.body.innerHTML = "Reconnectez-vous."; };
</script>
</body>
</html>
