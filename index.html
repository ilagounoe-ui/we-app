<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notre Univers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3; --online: #25D366;
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-size: cover; background-position: center; transition: background 0.5s ease; }
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeOut 0.2s ease-in-out forwards; animation-delay: 1.2s; }
        @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
        .loader { width: 40px; height: 40px; border: 3px solid var(--card); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 18px; font-size: 13px; background: var(--card); transition: 0.3s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; transform: scale(1.05); }
        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }
        .contact-item { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 25px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .contact-pfp { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #2a2a40; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .wa-badge { background: var(--online); color: white; font-size: 10px; min-width: 20px; height: 20px; border-radius: 10px; display: none; align-items: center; justify-content: center; margin-left: 8px; font-weight: bold; }
        #chatBox { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .head { padding: 50px 20px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 22px; max-width: 75%; font-size: 14px; }
        .m-me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .m-they { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a2e; width: 100%; max-width: 320px; padding: 30px; border-radius: 35px; border: 1px solid var(--accent); text-align: center; }
        .modal-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: white; margin: 10px 0; box-sizing: border-box; outline: none; }
        .option-btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 18px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; cursor: pointer; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; z-index: 50; }
    </style>
</head>
<body>

<div id="splash"><div class="loader"></div></div>

<div class="modal-overlay" id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--accent); margin:0 0 10px 0;">...</h3>
        <div id="modalError" style="color:var(--love); font-size:12px; margin-bottom:5px;"></div>
        <div id="modalBody"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="option-btn" onclick="closeModal()">Annuler</button>
            <button class="option-btn" style="background:var(--accent); color:black" id="modalConfirmBtn">OK</button>
        </div>
    </div>
</div>

<div id="authLayer" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--card); padding:40px 25px; border-radius:40px; width:100%; max-width:340px; text-align:center;">
        <h2 id="authTitle" style="font-family:'Pacifico'; color:var(--accent)">Connexion</h2>
        <input type="tel" class="modal-input" placeholder="Numéro" id="authPhone">
        <input type="password" class="modal-input" placeholder="Mot de passe" id="authPass">
        <button class="option-btn" style="background:var(--accent); color:black;" onclick="handleAuth()">ENTRER</button>
        <p onclick="toggleAuthMode()" id="authToggle" style="margin-top:20px; font-size:12px; opacity:0.6;">Pas de compte ? S'inscrire</p>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <h2 id="uNameDisp" style="margin:0; font-family:'Pacifico'; color:var(--accent);">Notre Univers</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchV('vChats', this)">Messages</div>
            <div class="tab" onclick="switchV('vCocon', this)">Cocon 🌹</div>
            <div class="tab" onclick="switchV('vSet', this)">Réglages</div>
        </div>
    </header>

    <div id="vChats" class="view active">
        <div id="chatList"></div>
        <div class="fab" onclick="addFriend()">+</div>
    </div>

    <div id="vCocon" class="view">
        <div style="background:linear-gradient(135deg, #6a11cb, var(--love)); padding:30px; border-radius:35px; text-align:center; margin-bottom:25px;">
            <h3 style="margin:0">Unis depuis</h3>
            <div style="display:flex; justify-content:center; gap:15px; margin-top:15px;">
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px;"><b id="d-day" style="font-size:24px">0</b><br><small>Jours</small></div>
                <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:20px;"><b id="d-hour" style="font-size:24px">0</b><br><small>Heures</small></div>
            </div>
        </div>
        <button onclick="askCoconCode()" style="width:100%; padding:22px; border-radius:28px; border:2px dashed var(--love); background:var(--card); color:var(--love); font-weight:bold;">💖 OUVRIR LE COCON</button>
    </div>

    <div id="vSet" class="view">
        <div id="pfpPreview" class="contact-pfp" style="width:100px; height:100px; margin:0 auto 20px; border:2px solid var(--accent);">👤</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="tab" style="background:var(--card)" onclick="openEdit('pseudo')">Pseudo</div>
            <div class="tab" style="background:var(--card)" onclick="openEdit('code')">Code Secret</div>
            <div class="tab" style="background:var(--card)" onclick="openEdit('startDate', true)">Date Début</div>
            <div class="tab" style="background:var(--love); color:white" onclick="logout()">Déconnexion</div>
        </div>
    </div>
</div>

<div id="chatBox">
    <div class="head"><span onclick="closeChat()" style="font-size:24px;">←</span><b id="cName">...</b></div>
    <div class="msg-area" id="mArea"></div>
    <div style="padding:15px; display:flex; gap:8px; background:rgba(0,0,0,0.2);">
        <input type="text" id="mIn" placeholder="Message..." style="flex:1; background:var(--card); border:none; padding:12px; border-radius:25px; color:white;">
        <button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%;">➔</button>
    </div>
</div>

<script>
    // Config Firebase (Remise en place)
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('nu_user'));
    let activeChatId = null;
    let isLoginMode = true;

    function handleAuth() {
        const phone = "u_" + document.getElementById('authPhone').value.replace(/\D/g,'');
        const pass = document.getElementById('authPass').value;
        if(isLoginMode) {
            db.ref('users/' + phone).once('value', s => {
                if(s.exists() && s.val().pass === pass) {
                    user = s.val(); saveUser(); location.reload();
                } else alert("Erreur d'identifiants");
            });
        } else {
            const newUser = { id: phone, pseudo: "Utilisateur", pass: pass, code: "0000", startDate: Date.now() };
            db.ref('users/' + phone).set(newUser).then(() => { user = newUser; saveUser(); location.reload(); });
        }
    }

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "Connexion" : "Inscription";
        document.getElementById('authToggle').innerText = isLoginMode ? "Pas de compte ? S'inscrire" : "Déjà inscrit ? Se connecter";
    }

    function saveUser() { localStorage.setItem('nu_user', JSON.stringify(user)); }

    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }

    function startApp() {
        document.getElementById('authLayer').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('uNameDisp').innerText = user.pseudo;
        loadContacts();
        updateTimer();
        setInterval(updateTimer, 60000);
    }

    function loadContacts() {
        db.ref('users/'+user.id+'/contacts').on('value', s => {
            const list = document.getElementById('chatList'); list.innerHTML = "";
            s.forEach(snap => {
                db.ref('users/'+snap.key).once('value', us => {
                    const u = us.val();
                    list.innerHTML += `<div class="contact-item" onclick="openChat('${u.id}','${u.pseudo}')">
                        <div class="contact-pfp">👤</div>
                        <b>${u.pseudo}</b>
                    </div>`;
                });
            });
        });
    }

    function openChat(id, name) {
        activeChatId = [user.id, id].sort().join('_');
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display = 'flex';
        db.ref('msgs/'+activeChatId).on('value', s => {
            const area = document.getElementById('mArea'); area.innerHTML = "";
            s.forEach(snap => {
                const m = snap.val();
                area.innerHTML += `<div class="bubble ${m.sid === user.id ? 'm-me' : 'm-they'}">${m.txt}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg() {
        const txt = document.getElementById('mIn').value;
        if(!txt) return;
        db.ref('msgs/'+activeChatId).push({ sid: user.id, txt: txt, t: Date.now() });
        document.getElementById('mIn').value = "";
    }

    function askCoconCode() {
        openModal("Code Secret", `<input type="password" id="modalInput" class="modal-input" placeholder="Code">`, (val) => {
            if(val === user.code) {
                window.location.href = "cocon.html";
            } else {
                document.getElementById('modalError').innerText = "Code incorrect";
            }
        });
    }

    function openEdit(field, isDate) {
        openModal("Modifier", `<input type="${isDate?'date':'text'}" id="modalInput" class="modal-input">`, (v) => {
            const finalVal = isDate ? new Date(v).getTime() : v;
            db.ref('users/'+user.id).update({[field]: finalVal}).then(() => {
                user[field] = finalVal; saveUser(); location.reload();
            });
        });
    }

    function addFriend() {
        openModal("Ajouter un ami", `<input type="tel" id="modalInput" class="modal-input" placeholder="Numéro">`, (tel) => {
            const friendId = "u_" + tel.replace(/\D/g,'');
            db.ref('users/'+friendId).once('value', s => {
                if(s.exists()) {
                    db.ref(`users/${user.id}/contacts/${friendId}`).set(true);
                    db.ref(`users/${friendId}/contacts/${user.id}`).set(true);
                    closeModal();
                } else alert("Utilisateur introuvable");
            });
        });
    }

    function openModal(t, b, a) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalBody').innerHTML = b;
        document.getElementById('customModal').style.display = 'flex';
        document.getElementById('modalConfirmBtn').onclick = () => a(document.getElementById('modalInput').value);
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    function closeChat() { document.getElementById('chatBox').style.display = 'none'; if(activeChatId) db.ref('msgs/'+activeChatId).off(); }
    function logout() { localStorage.clear(); location.reload(); }
    function updateTimer() { if(!user.startDate) return; const diff = Date.now() - user.startDate; document.getElementById('d-day').innerText = Math.floor(diff/86400000); document.getElementById('d-hour').innerText = Math.floor((diff/3600000)%24); }

    window.onload = () => { if(user) startApp(); else { document.getElementById('splash').style.display = 'none'; document.getElementById('authLayer').style.display = 'flex'; } };
</script>
</body>
</html>
