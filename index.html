 <!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Nous ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:linear-gradient(180deg,#ff9ecf,#1a0026);
font-family:Arial;
color:white;
text-align:center;
}

/* titre */

h1{
font-size:32px;
margin-bottom:10px;
}

/* photo */

.photo{
width:260px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-top:15px;
}

/* compteur */

#jours{
margin-top:15px;
font-size:22px;
}

/* bouton musique */

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:15px;
background:#ff4fa3;
color:white;
font-size:18px;
cursor:pointer;
}

iframe{
margin-top:20px;
border-radius:15px;
}

</style>
</head>

<body>

<h1>Nous ❤️</h1>

<img src="photo.jpg" class="photo">

<div id="jours"></div>

<button onclick="playMusic()">🎵 Notre musique</button>

<div id="music"></div>

<script>

const dateDebut = new Date("2025-01-01");

function calculerJours(){

const aujourd'hui = new Date();
const diff = aujourd'hui - dateDebut;

const jours = Math.floor(diff / (1000*60*60*24));

document.getElementById("jours").innerHTML =
"Nous sommes ensemble depuis ❤️ " + jours + " jours";

}

calculerJours();

function playMusic(){

document.getElementById("music").innerHTML =

'<iframe width="300" height="170" src="https://www.youtube.com/embed/0q6c0AKDKU8?autoplay=1" frameborder="0" allow="autoplay"></iframe>';

}

</script>

</body>
</html>photo.jpg
