<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Vision</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #ff2d55; --glow: #5856d6; --bg: #05070a; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); 
            color: white; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 0% 0%, #101424 0%, #05070a 100%);
        }

        /* --- NAVIGATION --- */
        .nav-bar { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .nav-item { font-size: 24px; opacity: 0.2; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .nav-active { opacity: 1; color: var(--accent); transform: translateY(-10px) scale(1.2); text-shadow: 0 0 15px var(--accent); }

        /* --- PAGES --- */
        .view { flex: 1; overflow-y: auto; padding: 25px; display: none; height: 100vh; padding-bottom: 120px; }
        .view-active { display: block; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- AMIS / INBOX CARDS --- */
        .friend-card { 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border-radius: 28px; padding: 18px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 15px; border: 1px solid var(--border); transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .friend-card:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .pfp-ring { padding: 3px; border-radius: 20px; background: linear-gradient(45deg, var(--accent), var(--glow)); }
        .pfp { width: 55px; height: 55px; border-radius: 17px; object-fit: cover; display: block; }

        /* --- COUPLE VAULT --- */
        #vaultLock { 
            position: fixed; inset: 0; background: var(--bg); z-index: 200; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1a1f35 0%, #05070a 100%);
        }
        .vault-circle { width: 120px; height: 120px; border-radius: 50%; border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 30px; box-shadow: 0 0 30px rgba(255,45,85,0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0px var(--accent); } 50% { box-shadow: 0 0 30px var(--accent); } 100% { box-shadow: 0 0 0px var(--accent); } }

        /* --- CHAT INTERFACE --- */
        #chatOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: none; flex-direction: column; }
        .chat-header { padding: 40px 25px 15px; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.02); }
        .msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 15px 20px; border-radius: 25px; font-size: 15px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #ff5e3a); color: white; border-bottom-right-radius: 5px; box-shadow: 0 10px 20px rgba(255,45,85,0.3); }
        .received { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-bottom-left-radius: 5px; }

        .input-area { padding: 20px; background: var(--bg); display: flex; gap: 12px; }
        .input-glass { flex: 1; background: var(--glass); border: 1px solid var(--border); border-radius: 22px; padding: 15px; color: white; outline: none; }
        .send-pill { width: 55px; height: 55px; border-radius: 22px; background: var(--accent); border: none; color: white; font-weight: 800; cursor: pointer; }

        /* --- TYPOGRAPHY --- */
        h1 { font-weight: 800; font-size: 32px; letter-spacing: -1.5px; margin: 0; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>

        <div id="inboxList"></div>

            <button onclick="openVault()" style="margin-top:20px; background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 30px; border-radius:12px; font-weight:600;">Entrer</button>

            </div>
        </div>
    </div>
