<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Redline v3.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #ff2d55; --primary: #5856d6; --bg: #050505; 
            --card: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
        }
        
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at 0% 0%, #1a1a2e 0%, #050505 50%); }

        .app-shell { height: 100vh; display: flex; flex-direction: column; display: none; }
        .top-nav { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 500; }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; background: linear-gradient(to right, var(--accent), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .view { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 220px; scrollbar-width: none; }
        .view-active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- CARDS & UI --- */
        .user-row { background: var(--card); border-radius: 25px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .pfp-img { width: 55px; height: 55px; border-radius: 20px; object-fit: cover; border: 1px solid var(--border); }
        
        .chat-container { background: var(--card); border-radius: 30px; padding: 20px; border: 1px solid var(--border); height: 380px; display: flex; flex-direction: column; }
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; scrollbar-width: none; }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 22px; margin-bottom: 8px; font-size: 14px; line-height: 1.4; }
        .mine { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .bubble-img { width: 100%; border-radius: 15px; margin-top: 5px; }

        /* --- MENUS & DROPDOWNS --- */
        .opt-dot { background: none; border: none; color: white; opacity: 0.5; font-size: 22px; cursor: pointer; padding: 5px; }
        .dropdown { position: absolute; right: 10px; top: 50px; background: #151515; border: 1px solid var(--border); border-radius: 15px; display: none; flex-direction: column; z-index: 10010; width: 180px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .dropdown button { background: none; border: none; color: white; padding: 14px; text-align: left; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* --- COUPLE ACTIONS --- */
        .action-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 15px; border: 1px solid var(--border); background: var(--card); color: white; font-size: 12px; font-weight: 600; cursor: pointer; }

        /* --- INPUTS & NAV --- */
        .input-area { position: fixed; bottom: 105px; left: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .msg-input { flex: 1; padding: 16px; border-radius: 22px; border: 1px solid var(--border); background: rgba(20,20,20,0.95); color: white; outline: none; }
        .send-btn { background: var(--accent); border: none; border-radius: 20px; width: 55px; color: white; font-size: 20px; }
        
        .bottom-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 70px; background: rgba(20,20,20,0.9); backdrop-filter: blur(25px); border-radius: 30px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { font-size: 26px; opacity: 0.3; cursor: pointer; }
        .nav-active { opacity: 1; color: var(--accent); }

        #overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:10005; flex-direction:column; }
        .tab-link { opacity: 0.4; font-weight: 600; font-size: 14px; cursor: pointer; padding-bottom: 8px; }
        .tab-active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body>

<div id="authLayer" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--card); padding:40px; border-radius:40px; text-align:center; width:80%;">
        <div class="logo" style="font-size:32px; margin-bottom:20px;">NEXUS</div>
        <input type="text" id="regName" placeholder="Ton Surnom" style="width:100%; padding:15px; border-radius:15px; background:#000; color:white; border:1px solid var(--border);">
        <button onclick="signUp()" style="width:100%; padding:15px; border-radius:15px; background:var(--accent); color:white; font-weight:800; border:none; margin-top:15px;">INITIALISER</button>
    </div>
</div>

<div class="app-shell" id="app">
    <div class="top-nav">
        <div class="logo">NEXUS</div>
        <img id="myAvatar" src="" style="width:45px; height:45px; border-radius:15px; border:2px solid var(--accent); object-fit:cover;">
    </div>

    <div id="viewCouple" class="view view-active">
        <div class="action-bar">
            <button class="btn-action" onclick="sendPhoto()">📷 Photo</button>
            <button class="btn-action" onclick="playGame()">🎮 Jeu Duo</button>
            <button class="btn-action" onclick="alert('Partage de localisation bientôt...')">📍 Lieu</button>
        </div>
        <div class="chat-container">
            <b id="couplePartnerTitle">Cocon Privé ❤️</b>
            <div id="coupleMsgs" class="msg-list"></div>
        </div>
        <div class="input-area" id="inputCouple">
            <input type="text" id="coupleIn" class="msg-input" placeholder="Message secret...">
            <button class="send-btn" onclick="pushMsg('couple')">➔</button>
        </div>
    </div>

    <div id="viewFriends" class="view">
        <div style="display:flex; gap:20px; margin-bottom:20px;">
            <div id="tab1" class="tab-link tab-active" onclick="switchSocialTab('chats')">CHATS</div>
            <div id="tab2" class="tab-link" onclick="switchSocialTab('discover')">DÉCOUVRIR</div>
        </div>
        <div id="sectionChats"><div id="activeChatsList"></div></div>
        <div id="sectionDiscover" style="display:none;"><div id="allUsersList"></div></div>

        <div id="overlay">
            <div class="top-nav" style="background:var(--card); border-bottom:1px solid var(--border);">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
                <b id="chatName">Chat</b>
                <button class="opt-dot" onclick="toggleDrop('chatOpt')">⋮</button>
                <div id="chatOpt" class="dropdown">
                    <button onclick="deleteConv()">Vider la conversation</button>
                    <button style="color:var(--accent)" onclick="blockUser()">Bloquer l'utilisateur</button>
                </div>
            </div>
            <div id="friendChatList" class="msg-list" style="padding: 20px;"></div>
            <div class="input-area" style="bottom: 30px; z-index:10006;">
                <input type="text" id="chatIn" class="msg-input" placeholder="Message..."><button class="send-btn" style="background:var(--primary)" onclick="pushMsg('direct')">➔</button>
            </div>
        </div>
    </div>

    <div id="viewSettings" class="view">
        <h3>Mon Nexus</h3>
        <div style="background:var(--card); padding:20px; border-radius:25px; border:1px solid var(--border);">
            <label style="font-size:11px; opacity:0.5;">MON STATUT</label>
            <input type="text" id="setStatus" placeholder="Ex: Disponible 🇬🇦">
            <label style="font-size:11px; opacity:0.5; margin-top:10px; display:block;">ESPACE COUPLE</label>
            <input type="text" id="setPartner" placeholder="Nom partenaire">
            <input type="password" id="setCoupleCode" placeholder="Code Secret">
            <button onclick="saveSettings()" style="width:100%; padding:15px; background:var(--accent); color:white; border-radius:15px; border:none; font-weight:800; margin-top:15px;">SAUVEGARDER</button>
        </div>
        <div id="blockedListUI" style="margin-top:20px;"></div>
    </div>

    <nav class="bottom-bar">
        <div class="nav-item nav-active" onclick="nav('viewCouple', this)">❤</div>
        <div class="nav-item" onclick="nav('viewFriends', this)">🌎</div>
        <div class="nav-item" onclick="nav('viewSettings', this)">⚙</div>
    </nav>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const KEY = 'nx_redline_v3_0';
    let user = JSON.parse(localStorage.getItem(KEY));
    let activeChatId = null, otherUserId = null;

    if(user) { document.getElementById('authLayer').style.display='none'; document.getElementById('app').style.display='flex'; init(); }

    function signUp() {
        const n = document.getElementById('regName').value;
        if(n) {
            const data = { name: n, id: 'u'+Date.now(), pfp: 'https://ui-avatars.com/api/?name='+n, code: '', partner: '', status: 'Nouveau sur Nexus', blocked: {}, ignored: {} };
            db.ref('users/'+data.id).set(data);
            localStorage.setItem(KEY, JSON.stringify(data));
            location.reload();
        }
    }

    function init() {
        document.getElementById('myAvatar').src = user.pfp;
        document.getElementById('setStatus').value = user.status || "";
        document.getElementById('setPartner').value = user.partner || "";
        document.getElementById('setCoupleCode').value = user.code || "";

        db.ref('users/'+user.id).on('value', s => { 
            user = s.val(); 
            localStorage.setItem(KEY, JSON.stringify(user));
            updateBlockedList();
        });

        // Découverte (Ignorer ajouté)
        db.ref('users').on('value', s => {
            const l = document.getElementById('allUsersList'); l.innerHTML = "";
            s.forEach(c => {
                const u = c.val();
                const isIgnored = user.ignored && user.ignored[u.id];
                const isBlocked = user.blocked && user.blocked[u.id];
                if(u.id !== user.id && !isIgnored && !isBlocked) {
                    l.innerHTML += `
                        <div class="user-row">
                            <img src="${u.pfp}" class="pfp-img" onclick="openDirect('${u.id}', '${u.name}')">
                            <div style="flex:1" onclick="openDirect('${u.id}', '${u.name}')"><b>${u.name}</b><br><small style="opacity:0.4">${u.status}</small></div>
                            <button class="opt-dot" onclick="toggleDrop('opt_${u.id}')">⋮</button>
                            <div id="opt_${u.id}" class="dropdown">
                                <button onclick="ignoreUser('${u.id}')">Ignorer cette personne</button>
                                <button style="color:var(--accent)" onclick="blockUser('${u.id}')">Bloquer</button>
                            </div>
                        </div>`;
                }
            });
        });

        // Liste des chats
        db.ref('users/'+user.id+'/lastChats').on('value', s => {
            const l = document.getElementById('activeChatsList'); l.innerHTML = "";
            s.forEach(c => {
                const d = c.val();
                db.ref('users/'+d.with).once('value', us => {
                    const u = us.val();
                    l.innerHTML = `<div class="user-row" onclick="openDirect('${u.id}', '${u.name}')"><img src="${u.pfp}" class="pfp-img"><div style="flex:1"><b>${u.name}</b><div style="font-size:12px;opacity:0.5">${d.lastTxt}</div></div></div>` + l.innerHTML;
                });
            });
        });

        if(user.code) {
            db.ref('couples/'+user.code+'/chat').limitToLast(30).on('value', s => {
                const b = document.getElementById('coupleMsgs'); b.innerHTML = "";
                s.forEach(c => {
                    const m = c.val();
                    const content = m.type === 'img' ? `<img src="${m.txt}" class="bubble-img">` : m.txt;
                    b.innerHTML += `<div class="chat-bubble ${m.sid===user.id?'mine':'theirs'}">${content}</div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
        }
    }

    // ACTIONS COUPLE
    function sendPhoto() {
        const url = prompt("Colle l'URL de ta photo ici :");
        if(url && user.code) db.ref('couples/'+user.code+'/chat').push({ sid: user.id, txt: url, type: 'img' });
    }

    function playGame() {
        const questions = ["Ton plus beau souvenir avec moi ?", "Action : Envoie-moi un selfie rigolo tout de suite !", "Vérité : Quelle est la chose que tu préfères chez moi ?", "Action : Chante 10 secondes de ta chanson préférée en vocal !"];
        const q = questions[Math.floor(Math.random()*questions.length)];
        db.ref('couples/'+user.code+'/chat').push({ sid: 'system', txt: "🎮 JEU : " + q });
    }

    // CONTRÔLES SOCIAL
    function ignoreUser(id) {
        if(confirm("Retirer cette personne de vos suggestions ?")) {
            db.ref('users/'+user.id+'/ignored/'+id).set(true);
        }
    }

    function blockUser(id = otherUserId) {
        if(confirm("Bloquer définitivement ?")) {
            db.ref('users/'+user.id+'/blocked/'+id).set(true);
            closeChat();
        }
    }

    function deleteConv() {
        if(confirm("Vider tout l'historique ?")) {
            db.ref('directs/'+activeChatId).remove();
            db.ref('users/'+user.id+'/lastChats/'+otherUserId).remove();
            closeChat();
        }
    }

    function pushMsg(mode) {
        const input = document.getElementById(mode === 'couple' ? 'coupleIn' : 'chatIn');
        if(!input.value) return;
        if(mode === 'couple') {
            db.ref('couples/'+user.code+'/chat').push({ sid: user.id, txt: input.value });
        } else {
            db.ref('directs/'+activeChatId).push({ sid: user.id, txt: input.value });
            db.ref('users/'+user.id+'/lastChats/'+otherUserId).set({ with: otherUserId, lastTxt: input.value });
            db.ref('users/'+otherUserId+'/lastChats/'+user.id).set({ with: user.id, lastTxt: input.value });
        }
        input.value = "";
    }

    function saveSettings() {
        const up = { partner: document.getElementById('setPartner').value, code: document.getElementById('setCoupleCode').value.toLowerCase(), status: document.getElementById('setStatus').value };
        db.ref('users/'+user.id).update(up).then(() => alert("Nexus mis à jour !"));
    }

    function updateBlockedList() {
        const bUI = document.getElementById('blockedListUI'); bUI.innerHTML = "";
        if(user.blocked) {
            bUI.innerHTML = "<small style='opacity:0.4'>BLOQUÉS : </small>";
            Object.keys(user.blocked).forEach(id => {
                bUI.innerHTML += `<button onclick="db.ref('users/${user.id}/blocked/${id}').remove()" style="background:var(--card); color:white; border:1px solid red; padding:5px 10px; border-radius:10px; font-size:10px; margin-right:5px;">Débloquer</button>`;
            });
        }
    }

    function nav(id, el) {
        document.getElementById('inputCouple').style.display = (id === 'viewCouple') ? 'flex' : 'none';
        document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        document.getElementById(id).classList.add('view-active'); el.classList.add('nav-active');
    }
    function toggleDrop(id) { document.querySelectorAll('.dropdown').forEach(d => d.style.display='none'); document.getElementById(id).style.display='flex'; }
    function openDirect(id, n) { otherUserId = id; activeChatId = user.id < id ? user.id+'_'+id : id+'_'+user.id; document.getElementById('overlay').style.display='flex'; document.getElementById('chatName').innerText = n; 
        db.ref('directs/'+activeChatId).on('value', s => { const b = document.getElementById('friendChatList'); b.innerHTML = ""; s.forEach(c => b.innerHTML += `<div class="chat-bubble ${c.val().sid===user.id?'mine':'theirs'}">${c.val().txt}</div>`); b.scrollTop = b.scrollHeight; });
    }
    function closeChat() { document.getElementById('overlay').style.display='none'; }
    function switchSocialTab(t) { document.getElementById('sectionChats').style.display = (t==='chats'?'block':'none'); document.getElementById('sectionDiscover').style.display = (t==='discover'?'block':'none'); document.getElementById('tab1').className = (t==='chats'?'tab-link tab-active':'tab-link'); document.getElementById('tab2').className = (t==='discover'?'tab-link tab-active':'tab-link'); }
</script>
</body>
</html>
