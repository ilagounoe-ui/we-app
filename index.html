 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Univers 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff4da6;
            --accent-glow: rgba(255, 77, 166, 0.5);
            --bg-grad: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            --card-bg: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-grad);
            overflow: hidden;
            color: var(--text-main);
        }

        /* Arrière-plan amélioré (image + dégradé) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 40%),
                url('94a99c728e9fab72bb967717213d2490.jpg') center/cover;
            filter: blur(10px) brightness(0.85);
            z-index: -1;
            transition: 1s;
        }

        /* --- La Card (Glassmorphism + Glow) --- */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            width: 90%;
            max-width: 380px;
            height: 600px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 0 30px var(--accent-glow);
            animation: fadeIn 0.8s ease;
        }

        /* --- Header --- */
        .header { 
            padding: 30px 20px 10px; 
            text-align: center; 
        }
        .profile-img { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            border: 4px solid white; 
            object-fit: cover; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.2), 0 0 20px var(--accent-glow);
        }

        /* --- Contenu --- */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 25px; 
            text-align: center; 
        }
        /* Style de la barre de défilement */
        .content::-webkit-scrollbar { width: 5px; }
        .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }

        .page { display: none; animation: slideUp 0.5s ease; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-weight: 700; font-size: 26px; margin: 10px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        h3 { font-weight: 600; font-size: 20px; margin-top: 0; }
        small { font-weight: 400; font-size: 14px; color: var(--text-sub); }

        /* --- Elements spécifiques --- */
        .box { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 18px; 
            border-radius: 25px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }
        
        #motDouxDisplay { font-style: italic; font-weight: 600; font-size: 16px; margin-top: 10px; color: #fff; }

        /* Grille album améliorée */
        .album-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding-bottom: 20px;
        }
        .album-img { 
            width: 100%; 
            height: 110px; 
            object-fit: cover; 
            border-radius: 15px; 
            border: 2px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .album-img:hover { transform: scale(1.05); border-color: white; }
        
        /* Inputs stylés */
        textarea, input[type="text"], input[type="date"] { 
            width: 100%; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 15px; 
            color: white; 
            padding: 12px; 
            box-sizing: border-box; 
            font-family: inherit;
            margin-bottom: 10px;
        }
        textarea:focus, input:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.15); }

        /* Boutons améliorés */
        button { 
            background: var(--accent); 
            background: linear-gradient(135deg, #ff4da6 0%, #ff7eb9 100%);
            border: none; 
            padding: 14px 25px; 
            border-radius: 50px; 
            color: white; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s ease; 
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 77, 166, 0.3);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 77, 166, 0.5); }
        button:active { transform: translateY(1px) scale(0.98); }

        /* --- Navigation du bas --- */
        .nav {
            display: flex;
            justify-content: space-around;
            padding: 20px 10px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 0 0 40px 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item { 
            cursor: pointer; 
            font-size: 26px; 
            opacity: 0.5; 
            transition: 0.4s ease; 
            position: relative;
        }
        .nav-item:hover { opacity: 0.8; }
        .nav-item.active-nav { 
            opacity: 1; 
            transform: scale(1.3) translateY(-5px); 
            text-shadow: 0 0 15px var(--accent);
        }
        /* Petit point sous l'icône active */
        .nav-item.active-nav::after {
            content: "";
            position: absolute;
            bottom: -10px; left: 50%;
            transform: translateX(-50%);
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Animation des cœurs */
        .heart {
            position: fixed;
            font-size: 25px;
            top: -10%;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1000;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img id="pfp" class="profile-img" src="" style="display:none;">
        <h2 id="userName">Coucou ! ✨</h2>
        <small id="ensembleDepuis"></small>
    </div>

    <div class="content">
        <div id="home" class="page active">
            <div class="box">
                <p style="margin:0; font-size: 13px; color: var(--text-sub);">💌 Mot doux du moment :</p>
                <p id="motDouxDisplay"></p>
            </div>
            <button onclick="sparkle()">❤️ Je pense à toi</button>
        </div>

        <div id="agenda" class="page">
            <h3>Notre Prochain RDV 🗓️</h3>
            <div class="box">
                <input type="text" id="eventTitle" placeholder="C'est quoi ? (ex: Resto, Ciné...)">
                <input type="date" id="eventDate">
                <button onclick="saveEvent()" style="font-size:11px;">Planifier le moment</button>
            </div>
            <div id="countdown" style="font-size: 18px; font-weight: 700; margin-top: 20px;"></div>
        </div>

        <div id="album" class="page">
            <h3>Nos Moments 📸</h3>
            <input type="file" id="photoAdd" style="display:none" onchange="addPhoto(this)" accept="image/*">
            <button onclick="document.getElementById('photoAdd').click()" class="box" style="width:100%; border:2px dashed rgba(255,255,255,0.3); background:transparent; color: var(--text-sub); text-transform: none; box-shadow: none; font-weight: 400;">
                + Ajouter une photo de nous
            </button>
            <div class="album-grid" id="albumGrid"></div>
        </div>

        <div id="chat" class="page">
            <h3>Mettre à jour le mot doux ✍️</h3>
            <div class="box">
                <textarea id="motDouxInput" rows="4" placeholder="Écris quelque chose de mignon que l'autre verra sur l'accueil..."></textarea>
                <button onclick="saveMotDoux()">Enregistrer le message</button>
            </div>
            <div style="margin-top: 30px;">
                <button class="secondary" style="background: rgba(0,0,0,0.3); font-size: 10px;" onclick="resetConfig()">⚙️ Réinitialiser (Date/Photo profil)</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="showPage('home', this)">🏠</div>
        <div class="nav-item" onclick="showPage('agenda', this)">📅</div>
        <div class="nav-item" onclick="showPage('album', this)">🖼️</div>
        <div class="nav-item" onclick="showPage('chat', this)">💬</div>
    </div>
</div>

<script>
    // --- NAVIGATION ---
    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active-nav');
    }

    // --- LOGIQUE (CONSERVÉE) ---
    window.onload = () => {
        // Init User & Date
        const name = localStorage.getItem('lastUser') || "Nous";
        document.getElementById('userName').innerText = name;
        const start = localStorage.getItem('couple_date');
        if(start) {
            const diff = Math.floor((new Date() - new Date(start)) / 86400000);
            document.getElementById('ensembleDepuis').innerText = diff + " jours ensemble 💞";
        } else {
            document.getElementById('ensembleDepuis').innerText = "Configure notre date !";
        }
        
        // Init Photo & Album
        const pfp = localStorage.getItem('couple_img');
        if(pfp) { document.getElementById('pfp').src = pfp; document.getElementById('pfp').style.display = 'inline-block'; }
        
        loadAlbum();
        loadEvent();
        
        // Init Mot doux
        const savedMotDoux = localStorage.getItem('motDoux') || "Je t'aime plus qu'hier ! ❤️";
        document.getElementById('motDouxDisplay').innerText = savedMotDoux;
        document.getElementById('motDouxInput').value = savedMotDoux;
    };

    // Agenda
    function saveEvent() {
        const title = document.getElementById('eventTitle').value;
        const date = document.getElementById('eventDate').value;
        if(title && date) {
            localStorage.setItem('event', JSON.stringify({title, date}));
            loadEvent();
            alert("Événement planifié !");
        }
    }

    function loadEvent() {
        const ev = JSON.parse(localStorage.getItem('event'));
        if(ev) {
            const diff = Math.ceil((new Date(ev.date) - new Date()) / 86400000);
            if(diff > 0) {
                document.getElementById('countdown').innerHTML = `Dans ${diff} jours : <br><span style="color:var(--accent);">${ev.title}</span> ✨`;
            } else if (diff === 0) {
                document.getElementById('countdown').innerHTML = `C'est AUJOURD'HUI : <br><span style="color:var(--accent);">${ev.title}</span> 🎉`;
            } else {
                document.getElementById('countdown').innerHTML = `L'événement est passé ! ⏱️`;
            }
        }
    }

    // Album (Amélioré pour ne pas stocker trop de Base64, mais reste local)
    function addPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                let album = JSON.parse(localStorage.getItem('album') || '[]');
                album.push(e.target.result);
                // Sécurité rudimentaire contre le dépassement du LocalStorage
                try {
                    localStorage.setItem('album', JSON.stringify(album));
                    loadAlbum();
                } catch(err) {
                    alert("Aïe, l'album est plein ! Essaie d'ajouter des photos moins lourdes.");
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function loadAlbum() {
        const album = JSON.parse(localStorage.getItem('album') || '[]');
        const grid = document.getElementById('albumGrid');
        if(album.length > 0) {
            grid.innerHTML = album.map(src => `<img src="${src}" class="album-img">`).join('');
        } else {
            grid.innerHTML = "<p style='grid-column: 1/3; opacity:0.5; font-size:12px;'>Aucune photo pour l'instant...</p>";
        }
    }

    // Messagerie / Mot doux
    function saveMotDoux() {
        const txt = document.getElementById('motDouxInput').value;
        if(txt) {
            localStorage.setItem('motDoux', txt);
            document.getElementById('motDouxDisplay').innerText = txt;
            alert("Mot doux mis à jour ! 🥰");
        }
    }

    function resetConfig() {
        if(confirm("Veux-tu réinitialiser la date du couple et la photo de profil ? (L'album sera conservé)")) {
            localStorage.removeItem('couple_date');
            localStorage.removeItem('couple_img');
            location.reload();
        }
    }

    // Animation sparkle (Cœurs)
    function sparkle() {
        for (let i = 0; i < 40; i++) {
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerText = ['❤️', '💖', '💝', '💕', '✨', '🌸'][Math.floor(Math.random() * 6)];
                heart.style.left = Math.random() * 100 + "vw";
                // Taille variable
                heart.style.fontSize = (Math.random() * 20 + 20) + "px";
                heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
                heart.style.opacity = Math.random();
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, i * 80);
        }
    }
</script>

</body>
</html>
