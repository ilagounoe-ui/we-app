    <style>
        /* --- TES VARIABLES ET STYLES DE BASE --- */
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        :root { 
            --accent: #bb86fc; --bg: #0f0c29; --card: rgba(255, 255, 255, 0.08);
            --love: #ff4b6e; --check: #00d2ff; --text-sub: #b3b3b3; --online: #25D366;
            --gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        }
        
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; 
            height: 100vh; overflow: hidden; background-attachment: fixed; background-size: cover; background-position: center; transition: background 0.5s ease;
        }

        /* --- DESIGN DES BULLES (VIOLET/GRIS) --- */
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 22px; max-width: 80%; font-size: 14.5px; position: relative; line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.2); word-wrap: break-word; }
        
        .m-me { 
            align-self: flex-end; background: #6200ee; color: white; 
            border-bottom-right-radius: 4px; 
        }
        
        .m-they { 
            align-self: flex-start; background: #2c2c3e; color: white; 
            border-bottom-left-radius: 4px; backdrop-filter: blur(5px);
        }

        /* --- UI & LAYOUT v.45 --- */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .loader { width: 50px; height: 50px; border: 4px solid var(--card); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .main-header { padding: 50px 20px 15px; background: rgba(15,12,41,0.95); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabs { display: flex; gap: 10px; margin-top: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 20px; font-size: 13px; background: var(--card); transition: 0.3s; cursor: pointer; }
        .tab.active { background: var(--accent); color: #000; font-weight: 600; }

        .view { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .view.active { display: block; }
        
        /* Tes styles pour modals et toasts conservés ici */
        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 14px 28px; border-radius: 30px; transition: 0.4s; z-index: 999999; }
        .toast.show { bottom: 50px; }
    </style>
</head>
<body onclick="unlockAudio()">

<div id="splash"><div class="loader"></div></div>

<div id="authLayer" style="position:fixed; inset:0; z-index:10000; display:none; align-items:center; justify-content:center; background:var(--bg);">
    <div style="background:var(--card); padding:40px; border-radius:45px; width:90%; text-align:center;">

        <input type="password" id="lPass" placeholder="Mot de passe" style="width:100%; margin:10px 0; padding:15px; border-radius:15px; background:rgba(255,255,255,0.05); border:none; color:white;">
        <button onclick="login()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--accent); color:black; font-weight:bold; margin-top:10px;">ENTRER</button>

</div>

<div id="mainApp" style="display:none;">
    <header class="main-header">
        <div style="display:flex; align-items:center; justify-content:space-between;">
            <h2 id="uNameDisp" oncontextmenu="if(prompt('Code Admin')==='1234') location.href='dashboard.html'; return false;" style="margin:0; font-family:'Pacifico'; color:var(--accent); cursor:pointer;">Pseudo</h2>

    <script>
    // --- CONFIGURATION FIREBASE v.45 ---
    const firebaseConfig = { 
        apiKey: "AIzaSyBtx8uE9hkBB86uA9p4gCCP3OHx3jdmfAs", 
        databaseURL: "https://notre-univers-d71a3-default-rtdb.firebaseio.com/" 
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // --- VARIABLES DE SESSION ---
    let user = JSON.parse(localStorage.getItem('nu_v33_user'));
    let activeId = null;
    let mediaRecorder, audioChunks = [];

    // --- INITIALISATION DE L'APP ---
    function setupApp() {
        if(!user) return;

        // 1. VERROU DE BANNISSEMENT (Écoute en temps réel)
        // Si tu bannis cet ID dans le dashboard, l'app se ferme ici
        db.ref('banned/' + user.id).on('value', snap => {
            if(snap.exists()) {
                alert("🔴 Votre accès a été révoqué par l'administrateur.");
                localStorage.clear();
                location.reload();
                return;
            }
        });

        // 2. AFFICHAGE DE L'INTERFACE
        document.getElementById('splash').style.display = 'none';
        if(document.getElementById('authLayer')) document.getElementById('authLayer').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('uNameDisp').innerText = user.pseudo;

        // 3. LANCEMENT DES SERVICES v.45
        updatePresence();
        loadContacts();
        
        // Notification système
        showToast("Session active : " + user.pseudo);
    }

    // --- SYSTÈME DE CONNEXION ---
    function login() {
        const phoneInput = document.getElementById('lPhone').value.trim();
        const passInput = document.getElementById('lPass').value;
        
        if(!phoneInput || !passInput) return showToast("Veuillez remplir les champs.");
        
        const ph = "u_" + phoneInput.replace(/\D/g,'');
        
        // Vérification si banni AVANT de connecter
        db.ref('banned/' + ph).once('value', bSnap => {
            if(bSnap.exists()) return alert("Ce compte est suspendu.");
            
            db.ref('users/' + ph).once('value', s => {
                if(s.exists() && s.val().pass === passInput) {
                    user = s.val();
                    localStorage.setItem('nu_v33_user', JSON.stringify(user));
                    setupApp();
                } else {
                    showToast("Identifiants incorrects.");
                }
            });
        });
    }

    // --- GESTION DES CONTACTS ---
    function loadContacts() {
        const list = document.getElementById('chatList');
        db.ref('users').on('value', snap => {
            list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                if(u.id !== user.id) {
                    const div = document.createElement('div');
                    div.className = "contact-item";
                    div.style = "display:flex; align-items:center; gap:15px; padding:15px; background:var(--card); margin-bottom:10px; border-radius:20px; cursor:pointer;";
                    div.innerHTML = `
                        <div style="width:45px; height:45px; border-radius:50%; background:var(--gradient); display:flex; align-items:center; justify-content:center; font-weight:bold;">${u.pseudo[0]}</div>
                        <div style="flex:1">
                            <div style="font-weight:600">${u.pseudo}</div>
                            <div style="font-size:11px; color:var(--text-sub)">${u.online ? 'En ligne' : 'Hors ligne'}</div>
                        </div>
                    `;
                    div.onclick = () => openChat(u.id, u.pseudo);
                    list.appendChild(div);
                }
            });
        });
    }

    // --- STATUT EN LIGNE ---
    function updatePresence() {
        const pRef = db.ref('users/' + user.id + '/online');
        db.ref('.info/connected').on('value', snap => {
            if (snap.val() === true) {
                pRef.onDisconnect().set(false);
                pRef.set(true);
            }
        });
    }

    // --- NAVIGATION ---
    function switchV(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
    }
         // --- LOGIQUE DE CHIFFREMENT E2EE (TA V.45 INTACTE) ---
    function encryptMsg(text) {
        try {
            return btoa(unescape(encodeURIComponent(text))); 
        } catch(e) { return text; }
    }

    function decryptMsg(encoded) {
        try {
            return decodeURIComponent(escape(atob(encoded)));
        } catch(e) { return encoded; }
    }

    // --- GESTION DU CHAT ---
    function openChat(id, name) {
        activeId = id;
        document.getElementById('cName').innerText = name;
        document.getElementById('chatBox').style.display = 'flex';
        loadMessages('msgs/' + activeId);
    }

    function loadMessages(path) {
        const area = document.getElementById('mArea');
        db.ref(path).on('value', snap => {
            area.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const isMe = m.sid === user.id;
                const div = document.createElement('div');
                div.className = `bubble ${isMe ? 'm-me' : 'm-they'}`;
                
                // Gestion texte ou audio
                if(m.type === 'audio') {
                    div.innerHTML = `<audio src="${m.txt}" controls style="width:200px; height:30px;"></audio>`;
                } else {
                    div.innerText = decryptMsg(m.txt);
                }
                
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function sendMsg(pathType) {
        const input = document.getElementById('mIn');
        const val = input.value.trim();
        if(!val) return;

        const path = pathType === 'cocon' ? 'cocon/' + activeId : 'msgs/' + activeId;
        
        db.ref(path).push({
            sid: user.id,
            txt: encryptMsg(val),
            t: Date.now(),
            type: 'text'
        });
        input.value = "";
    }

    // --- SYSTÈME DE TOASTS v.45 ---
    function showToast(msg) {
        const t = document.getElementById('toastAlert');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // --- GESTION AUDIO (RÉPARÉE) ---
    function unlockAudio() {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        if (context.state === 'suspended') context.resume();
    }

    async function startRecord() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            document.getElementById('micBtn').style.color = 'var(--love)';
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        } catch(err) { showToast("Micro bloqué"); }
    }

    function stopRecord() {
        if(!mediaRecorder) return;
        mediaRecorder.stop();
        document.getElementById('micBtn').style.color = 'white';
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/mp3' });
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('msgs/' + activeId).push({
                    sid: user.id,
                    txt: e.target.result, // Base64
                    type: 'audio',
                    t: Date.now()
                });
            };
            reader.readAsDataURL(blob);
        };
    }

    // --- LANCEMENT FINAL ---
    window.onload = () => {
        if(user) setupApp();
        else {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('authLayer').style.display = 'flex';
        }
    };

    function triggerBack() {
        document.getElementById('chatBox').style.display = 'none';
        if(activeId) db.ref('msgs/' + activeId).off();
    }
</script>
</body>
</html>
