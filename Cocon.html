<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Notre Univers - Cocon Privé</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; color: white; }

        /* --- INTERFACE DE NAVIGATION --- */
        #univers-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            z-index: 10; background: radial-gradient(circle at center, #1B2735 0%, #000 100%);
            transition: opacity 0.8s ease;
        }

        .profile-glow {
            width: 140px; height: 140px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255, 0, 119, 0.5);
            box-shadow: 0 0 30px rgba(255, 0, 119, 0.3);
            touch-action: none; transition: 0.3s;
        }
        .profile-glow:active { transform: scale(0.9); box-shadow: 0 0 50px #ff0077; }

        .bubble-grid { display: flex; gap: 20px; }
        .bubble {
            width: 100px; height: 100px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1); font-size: 13px;
        }
        .bubble svg { width: 30px; height: 30px; fill: white; margin-bottom: 8px; }

        /* --- CANVAS D'ANIMATION --- */
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; display: none; /* Apparaît quand activé */
        }
        canvas { display: block; }
        
        #close-magic {
            position: absolute; top: 30px; right: 30px; z-index: 100;
            background: rgba(255,255,255,0.2); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; font-size: 20px;
        }
    </style>
</head>
<body>

<audio id="backgroundMusic" loop>
    <source src="until_i_found_you.mp3" type="audio/mpeg">
</audio>

<div id="univers-ui">
    <div class="central-hub">
        <div id="secret-trigger" class="profile-glow">
            <svg width="60" height="60" viewBox="0 0 24 24"><path d="M12 2L14.4 7.6L20 10L14.4 12.4L12 18L9.6 12.4L4 10L9.6 7.6L12 2Z" fill="#FBBF24"/></svg>
        </div>
        <p style="text-align: center; letter-spacing: 3px; margin-top: 15px; opacity: 0.7;">NOTRE UNIVERS</p>
    </div>

    <div class="bubble-grid">
        <div class="bubble" onclick="alert('Chat Firebase...')">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span>Murmures</span>
        </div>
        <div class="bubble" onclick="alert('Album Photo...')">
            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            <span>Galerie</span>
        </div>
    </div>
</div>

<div id="canvas-container">
    <button id="close-magic">✕</button>
    <canvas id="canvas1"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas1');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const ui = document.getElementById('univers-ui');
const container = document.getElementById('canvas-container');
const audio = document.getElementById('backgroundMusic');
const trigger = document.getElementById('secret-trigger');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIG MATRIX ---
const characters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ❤❤❤";
const fontSize = 16;
let columns = Math.ceil(canvas.width / fontSize);
let drops = Array(columns).fill(1);

// --- CONFIG PARTICULES ---
let particles = [];
const texts = ["3", "2", "1", "You", "Are", "My", "Love", "I ❤️ You"];
let currentTextIndex = 0;
let animationActive = false;

class Particle {
    constructor(x, y) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.destX = x; this.destY = y;
        this.vx = 0; this.vy = 0;
        this.ease = 0.1; this.friction = 0.9;
    }
    update() {
        this.vx += (this.destX - this.x) * this.ease;
        this.vy += (this.destY - this.y) * this.ease;
        this.vx *= this.friction; this.vy *= this.friction;
        this.x += this.vx; this.y += this.vy;
    }
    draw() {
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill();
    }
}

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ff0077";
    ctx.font = fontSize + "px monospace";
    for (let i = 0; i < drops.length; i++) {
        const text = characters.charAt(Math.floor(Math.random() * characters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}

function initText(text) {
    particles = [];
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
    const textFontSize = Math.min(canvas.width / 6, 100);
    tempCtx.fillStyle = "white";
    tempCtx.font = `bold ${textFontSize}px Arial`;
    tempCtx.textAlign = "center";
    tempCtx.fillText(text, canvas.width / 2, canvas.height / 2);
    const data = tempCtx.getImageData(0, 0, canvas.width, canvas.height).data;
    for (let y = 0; y < canvas.height; y += 7) {
        for (let x = 0; x < canvas.width; x += 7) {
            if (data[(y * canvas.width + x) * 4 + 3] > 128) particles.push(new Particle(x, y));
        }
    }
}

function animate() {
    if(!animationActive) return;
    drawMatrix();
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

// --- LOGIQUE SECRET (APPUI LONG) ---
let timer;
trigger.addEventListener('touchstart', (e) => {
    e.preventDefault();
    timer = setTimeout(() => {
        ui.style.opacity = "0";
        setTimeout(() => {
            ui.style.display = "none";
            container.style.display = "block";
            animationActive = true;
            audio.play();
            initText(texts[0]);
            animate();
            startTextCycle();
        }, 800);
    }, 1500);
});
trigger.addEventListener('touchend', () => clearTimeout(timer));

function startTextCycle() {
    const interval = setInterval(() => {
        if(!animationActive) { clearInterval(interval); return; }
        currentTextIndex++;
        if (currentTextIndex >= texts.length) currentTextIndex = 3;
        initText(texts[currentTextIndex]);
    }, 2000);
}

document.getElementById('close-magic').onclick = () => {
    animationActive = false;
    audio.pause();
    audio.currentTime = 0;
    container.style.display = "none";
    ui.style.display = "flex";
    setTimeout(() => ui.style.opacity = "1", 50);
};
</script>
</body>
</html>
